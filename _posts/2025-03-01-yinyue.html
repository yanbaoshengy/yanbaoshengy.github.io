<script>
document.addEventListener('DOMContentLoaded', function() {
    let touchStartX = 0;
    let touchEndX = 0;
    let currentSongIndex = 0;

    // 添加触摸事件监听
    document.querySelector('.music-player').addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].clientX;
    }, false);

    document.querySelector('.music-player').addEventListener('touchend', function(e) {
        touchEndX = e.changedTouches[0].clientX;
        handleSwipe();
    }, false);

    function handleSwipe() {
        const swipeThreshold = 50;
        const swipeDistance = touchEndX - touchStartX;

        if (Math.abs(swipeDistance) > swipeThreshold) {
            if (swipeDistance > 0 && currentSongIndex > 0) {
                // 向右滑动，播放上一首
                playSong(currentSongIndex - 1);
            } else if (swipeDistance < 0 && currentSongIndex < songs.length - 1) {
                // 向左滑动，播放下一首
                playSong(currentSongIndex + 1);
            }
        }
    }

        },
        {
            title: '드라마-IU',
            artist: '韩国',
            url: 'https://raw.githubusercontent.com/Yan-ziJun/yan-zijun.github.io/main/music/xiju.mp3'
        },
        {
            title: '이 마음이 찾아오면-kassy',
            artist: '韩国',
            url: 'https://raw.githubusercontent.com/Yan-ziJun/yan-zijun.github.io/main/music/Whenlovecomesby.mp3'
        },
        {
            title: 'Universe-本月少女',
            artist: '韩国',
            url: 'https://raw.githubusercontent.com/Yan-ziJun/yan-zijun.github.io/main/music/Universe.mp3'
        },
        {
            title: 'FALLIN′-lovelz',
            artist: '韩国',
            url: 'https://raw.githubusercontent.com/Yan-ziJun/yan-zijun.github.io/main/music/FALLIN.mp3'
        },
        {
            title: '닫힌 엔딩-SHAUN',
            artist: '韩国',
            url: 'https://raw.githubusercontent.com/Yan-ziJun/yan-zijun.github.io/main/music/ClosedEnding.mp3'
        }
    ];
    
    // 按歌手分组歌曲
    function groupSongsByArtist(songs) {
        const groups = {};
        songs.forEach(song => {
            if (!groups[song.artist]) {
                groups[song.artist] = [];
            }
            groups[song.artist].push(song);
        });
        return groups;
    }
    
    // 创建歌手文件夹和歌曲列表
    const songGroups = groupSongsByArtist(songs);
    Object.entries(songGroups).forEach(([artist, artistSongs]) => {
        const artistFolder = document.createElement('div');
        artistFolder.className = 'artist-folder';
        
        const artistHeader = document.createElement('div');
        artistHeader.className = 'artist-header';
        artistHeader.innerHTML = `
            <span class="folder-icon">▶</span>
            <span>${artist}</span>
        `;
        
        const songsList = document.createElement('div');
        songsList.className = 'artist-songs';
        
        artistSongs.forEach((song, index) => {
            const songItem = document.createElement('div');
            songItem.className = 'song-item';
            songItem.textContent = song.title;
            songItem.onclick = () => playSong(songs.indexOf(song));
            songsList.appendChild(songItem);
        });
        
        artistHeader.onclick = () => {
            // 关闭其他已展开的歌手列表
            document.querySelectorAll('.artist-header.expanded').forEach(header => {
                if (header !== artistHeader) {
                    header.classList.remove('expanded');
                    header.nextElementSibling.classList.remove('expanded');
                }
            });
            
            // 切换当前歌手列表
            artistHeader.classList.toggle('expanded');
            songsList.classList.toggle('expanded');
        };
        
        artistFolder.appendChild(artistHeader);
        artistFolder.appendChild(songsList);
        playlist.appendChild(artistFolder);
    });
    
    // 播放选中的歌曲
    function playSong(index) {
        const song = songs[index];
        
        // 显示加载状态
        document.getElementById('current-song-title').textContent = '加载中...';
        
        // 预加载音频
        audioPlayer.src = song.url;
        audioPlayer.load();
        
        // 当音频可以播放时
        audioPlayer.oncanplay = function() {
            audioPlayer.play();
            document.getElementById('current-song-title').textContent = song.title;
            document.getElementById('current-song-artist').textContent = song.artist;
            
            // 更新活动状态
            document.querySelectorAll('.song-item').forEach((item) => {
                item.classList.remove('active');
            });
            document.querySelectorAll('.song-item')[index].classList.add('active');
            
            currentSongIndex = index;
        };
        
        // 错误处理
        audioPlayer.onerror = function() {
            document.getElementById('current-song-title').textContent = '加载失败';
            console.error('音频加载失败:', song.url);
        };
    }
    
    // 自动播放第一首歌
    if (songs.length > 0) {
        playSong(0);
    }
    
    // 添加搜索功能
    const searchInput = document.querySelector('.search-input');
    const searchResults = document.querySelector('.search-results');
    
    searchInput.addEventListener('input', function(e) {
        const searchTerm = e.target.value.toLowerCase();
        if (!searchTerm) {
            searchResults.innerHTML = '';
            searchResults.classList.remove('active');
            return;
        }
        
        const matchedSongs = songs.filter(song => 
            song.title.toLowerCase().includes(searchTerm) ||
            song.artist.toLowerCase().includes(searchTerm)
        );
        
        if (matchedSongs.length > 0) {
            searchResults.innerHTML = matchedSongs.map((song, index) => `
                <div class="song-item" data-song-index="${songs.indexOf(song)}">
                    ${song.title} - ${song.artist}
                </div>
            `).join('');
            
            // 为搜索结果添加点击事件监听
            searchResults.querySelectorAll('.song-item').forEach(item => {
                item.addEventListener('click', function() {
                    const songIndex = parseInt(this.dataset.songIndex);
                    playSong(songIndex);
                    searchResults.classList.remove('active');
                    searchInput.value = '';
                });
            });
            
            searchResults.classList.add('active');
        } else {
            searchResults.innerHTML = '<div class="song-item">未找到相关歌曲</div>';
            searchResults.classList.add('active');
        }
    });
    
    // 点击其他地方关闭搜索结果
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-box')) {
            searchResults.classList.remove('active');
        }
    });
});
</script>
