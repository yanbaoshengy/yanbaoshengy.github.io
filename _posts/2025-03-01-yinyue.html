        <ul id="playlist">
            <!-- 歌曲列表将通过JavaScript动态加载 -->
        </ul>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let touchStartX = 0;
    let touchEndX = 0;
    let currentSongIndex = 0;

    // 添加触摸事件监听
    document.querySelector('.music-player').addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].clientX;
    }, false);

    document.querySelector('.music-player').addEventListener('touchend', function(e) {
        touchEndX = e.changedTouches[0].clientX;
        handleSwipe();
    }, false);

    function handleSwipe() {
        const swipeThreshold = 50;
        const swipeDistance = touchEndX - touchStartX;

        if (Math.abs(swipeDistance) > swipeThreshold) {
            if (swipeDistance > 0 && currentSongIndex > 0) {
                // 向右滑动，播放上一首
                playSong(currentSongIndex - 1);
            } else if (swipeDistance < 0 && currentSongIndex < songs.length - 1) {
                // 向左滑动，播放下一首
                playSong(currentSongIndex + 1);
            }
        }
    }
    const audioPlayer = document.getElementById('audio-player');
    const playlist = document.getElementById('playlist');
    
    // 歌曲列表数据
    const songs = [
        {
            title: 'Perfect Version Of Me',
            artist: 'Vicky宣宣',
            url: 'https://raw.githubusercontent.com/Yan-ziJun/yan-zijun.github.io/main/music/Perfect%20Version%20Of%20Me.mp3'
        },
        {
            title: '一荤一素',
            artist: '毛不易',
            url: 'https://raw.githubusercontent.com/Yan-ziJun/yan-zijun.github.io/main/music/yihunyisu.mp3'
        },
        {
            title: '无名的人',
            artist: '毛不易',
            url: 'https://raw.githubusercontent.com/Yan-ziJun/yan-zijun.github.io/main/music/wumingderen.mp3'
        },
        {
            title: '一程山路',
            artist: '毛不易',
            url: 'https://raw.githubusercontent.com/Yan-ziJun/yan-zijun.github.io/main/music/yichengshanlu.mp3'
        },
        // {
        //     title: '泡沫',
        //     artist: '邓紫棋',
        //     url: 'https://raw.githubusercontent.com/用户名/仓库名/main/邓紫棋/泡沫.mp3'
        // }
    ];
    
    // 按歌手分组歌曲
    function groupSongsByArtist(songs) {
        const groups = {};
        songs.forEach(song => {
            if (!groups[song.artist]) {
                groups[song.artist] = [];
            }
            groups[song.artist].push(song);
        });
        return groups;
    }
    
    // 创建歌手文件夹和歌曲列表
    const songGroups = groupSongsByArtist(songs);
    Object.entries(songGroups).forEach(([artist, artistSongs]) => {
        const artistFolder = document.createElement('div');
        artistFolder.className = 'artist-folder';
        
        const artistHeader = document.createElement('div');
        artistHeader.className = 'artist-header';
        artistHeader.innerHTML = `
            <span class="folder-icon">▶</span>
            <span>${artist}</span>
        `;
        
        const songsList = document.createElement('div');
        songsList.className = 'artist-songs';
        
        artistSongs.forEach((song, index) => {
            const songItem = document.createElement('div');
            songItem.className = 'song-item';
            songItem.textContent = song.title;
            songItem.onclick = () => playSong(songs.indexOf(song));
            songsList.appendChild(songItem);
        });
        
        artistHeader.onclick = () => {
            artistHeader.classList.toggle('expanded');
            songsList.classList.toggle('expanded');
        };
        
        artistFolder.appendChild(artistHeader);
        artistFolder.appendChild(songsList);
        playlist.appendChild(artistFolder);
    });
    
    // 播放选中的歌曲
    function playSong(index) {
        const song = songs[index];
        
        // 显示加载状态
        document.getElementById('current-song-title').textContent = '加载中...';
        
        // 预加载音频
        audioPlayer.src = song.url;
        audioPlayer.load();
        
        // 当音频可以播放时
        audioPlayer.oncanplay = function() {
            audioPlayer.play();
            document.getElementById('current-song-title').textContent = song.title;
            document.getElementById('current-song-artist').textContent = song.artist;
            
            // 更新活动状态
            document.querySelectorAll('.song-item').forEach((item) => {
                item.classList.remove('active');
            });
            document.querySelectorAll('.song-item')[index].classList.add('active');
            
            currentSongIndex = index;
        };
        
        // 错误处理
        audioPlayer.onerror = function() {
            document.getElementById('current-song-title').textContent = '加载失败';
            console.error('音频加载失败:', song.url);
        };
    }
    
    // 自动播放第一首歌
    if (songs.length > 0) {
        playSong(0);
    }
});
</script>
