<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #faf8ef;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 60px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .score-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .score-box {
            background-color: #bbada0;
            padding: 10px 25px;
            border-radius: 6px;
            color: white;
        }

        .score-box .label {
            font-size: 13px;
            text-transform: uppercase;
        }

        .score-box .value {
            font-size: 25px;
            font-weight: bold;
        }

        .game-container {
            background-color: #bbada0;
            border-radius: 6px;
            padding: 15px;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 15px;
        }

        .cell {
            background-color: rgba(238, 228, 218, 0.35);
            border-radius: 6px;
        }

        .tile-container {
            position: absolute;
            top: 15px;
            left: 15px;
            display: grid;
            grid-template-columns: repeat(4, 100px);
            grid-template-rows: repeat(4, 100px);
            gap: 15px;
        }

        .tile {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            font-weight: bold;
            border-radius: 6px;
            transition: all 0.15s ease;
        }

        .tile-2 { background-color: #eee4da; color: #776e65; }
        .tile-4 { background-color: #ede0c8; color: #776e65; }
        .tile-8 { background-color: #f2b179; color: #f9f6f2; }
        .tile-16 { background-color: #f59563; color: #f9f6f2; }
        .tile-32 { background-color: #f67c5f; color: #f9f6f2; }
        .tile-64 { background-color: #f65e3b; color: #f9f6f2; }
        .tile-128 { background-color: #edcf72; color: #f9f6f2; font-size: 35px; }
        .tile-256 { background-color: #edcc61; color: #f9f6f2; font-size: 35px; }
        .tile-512 { background-color: #edc850; color: #f9f6f2; font-size: 35px; }
        .tile-1024 { background-color: #edc53f; color: #f9f6f2; font-size: 30px; }
        .tile-2048 { background-color: #edc22e; color: #f9f6f2; font-size: 30px; }

        .new-game-btn {
            background-color: #8f7a66;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        .new-game-btn:hover {
            background-color: #9f8b77;
        }

        .game-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(238, 228, 218, 0.73);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
        }

        .game-message.active {
            display: flex;
        }

        .game-message h2 {
            font-size: 60px;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-message.win h2 {

        }

        .instructions {

</head>
<body>
    <div class="container">
        <h1>2048</h1>
        <div class="score-container">
            <div class="score-box">
                <div class="label">分数</div>
                <div class="value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="label">最高分</div>
                <div class="value" id="best-score">0</div>
            </div>
        </div>
        <div class="game-container">
            <div class="grid">
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
                <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
            </div>
            <div class="tile-container" id="tile-container"></div>
            <div class="game-message" id="game-message">
                <h2 id="message-text">游戏结束!</h2>
                <button class="new-game-btn" onclick="initGame()">再来一局</button>
            </div>
        </div>
        <button class="new-game-btn" onclick="initGame()">新游戏</button>
       
    </div>

    <script>
        let board = [];
        let score = 0;
        let bestScore = localStorage.getItem('2048-best-score') || 0;
        let gameOver = false;
        let won = false;

        function initGame() {
            board = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            gameOver = false;
            won = false;
            document.getElementById('game-message').classList.remove('active', 'win');
            document.getElementById('best-score').textContent = bestScore;
            addRandomTile();
            addRandomTile();
            updateDisplay();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) {
                        emptyCells.push({i, j});
                    }
                }
            }
            if (emptyCells.length > 0) {
                const randomCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[randomCell.i][randomCell.j] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function updateDisplay() {
            const container = document.getElementById('tile-container');
            container.innerHTML = '';
            document.getElementById('score').textContent = score;

            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${board[i][j]}`;
                        tile.textContent = board[i][j];
                        tile.style.gridRow = i + 1;
                        tile.style.gridColumn = j + 1;
                        container.appendChild(tile);
                    }
                }
            }
        }

        function move(direction) {
            if (gameOver) return;

            let moved = false;
            const oldBoard = JSON.stringify(board);

            switch(direction) {
                case 'up':
                    for (let j = 0; j < 4; j++) {
                        for (let i = 1; i < 4; i++) {
                            if (board[i][j] !== 0) {
                                let k = i;
                                while (k > 0 && board[k-1][j] === 0) {
                                    board[k-1][j] = board[k][j];
                                    board[k][j] = 0;
                                    k--;
                                    moved = true;
                                }
                                if (k > 0 && board[k-1][j] === board[k][j]) {
                                    board[k-1][j] *= 2;
                                    score += board[k-1][j];
                                    board[k][j] = 0;
                                    moved = true;
                                }
                            }
                        }
                    }
                    break;

                case 'down':
                    for (let j = 0; j < 4; j++) {
                        for (let i = 2; i >= 0; i--) {
                            if (board[i][j] !== 0) {
                                let k = i;
                                while (k < 3 && board[k+1][j] === 0) {
                                    board[k+1][j] = board[k][j];
                                    board[k][j] = 0;
                                    k++;
                                    moved = true;
                                }
                                if (k < 3 && board[k+1][j] === board[k][j]) {
                                    board[k+1][j] *= 2;
                                    score += board[k+1][j];
                                    board[k][j] = 0;
                                    moved = true;
                                }
                            }
                        }
                    }
                    break;

                case 'left':
                    for (let i = 0; i < 4; i++) {
                        for (let j = 1; j < 4; j++) {
                            if (board[i][j] !== 0) {
                                let k = j;
                                while (k > 0 && board[i][k-1] === 0) {
                                    board[i][k-1] = board[i][k];
                                    board[i][k] = 0;
                                    k--;
                                    moved = true;
                                }
                                if (k > 0 && board[i][k-1] === board[i][k]) {
                                    board[i][k-1] *= 2;
                                    score += board[i][k-1];
                                    board[i][k] = 0;
                                    moved = true;
                                }
                            }
                        }
                    }
                    break;

                case 'right':
                    for (let i = 0; i < 4; i++) {
                        for (let j = 2; j >= 0; j--) {
                            if (board[i][j] !== 0) {
                                let k = j;
                                while (k < 3 && board[i][k+1] === 0) {
                                    board[i][k+1] = board[i][k];
                                    board[i][k] = 0;
                                    k++;
                                    moved = true;
                                }
                                if (k < 3 && board[i][k+1] === board[i][k]) {
                                    board[i][k+1] *= 2;
                                    score += board[i][k+1];
                                    board[i][k] = 0;
                                    moved = true;
                                }
                            }
                        }
                    }
                    break;
            }

            if (moved) {
                addRandomTile();
                updateDisplay();

                if (score > bestScore) {
                    bestScore = score;
                    localStorage.setItem('2048-best-score', bestScore);
                    document.getElementById('best-score').textContent = bestScore;
                }

                checkWin();
                checkGameOver();
            }
        }

        function checkWin() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 2048 && !won) {
                        won = true;
                        const messageBox = document.getElementById('game-message');
                        messageBox.classList.add('active', 'win');
                        document.getElementById('message-text').textContent = '恭喜获胜!';
                    }
                }
            }
        }

        function checkGameOver() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) return;
                    if (i < 3 && board[i][j] === board[i+1][j]) return;
                    if (j < 3 && board[i][j] === board[i][j+1]) return;
                }
            }

            gameOver = true;
            const messageBox = document.getElementById('game-message');
            messageBox.classList.add('active');
            messageBox.classList.remove('win');
            document.getElementById('message-text').textContent = '游戏结束!';
        }

        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    e.preventDefault();
                    move('up');
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    move('down');
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    move('left');
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    move('right');
                    break;
            }
        });

        let touchStartX, touchStartY;

        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;

            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 50) {
                    if (diffX > 0) {
                        move('right');
                    } else {
                        move('left');
                    }
                }
            } else {
                if (Math.abs(diffY) > 50) {
                    if (diffY > 0) {
                        move('down');
                    } else {
                        move('up');
                    }
                }
            }

            touchStartX = null;
            touchStartY = null;
        });

        initGame();
    </script>
</body>
</html>
