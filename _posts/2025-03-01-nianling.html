        let timerInterval;

        function updateTimer(birthdate) {
            const now = new Date();
            const timeDiff = now - birthdate;

            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

            document.getElementById('lifeTimeResult').innerHTML = 
                `已经生活了：${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
        }

        function calculateAge() {
            const birthdateInput = document.getElementById('birthdate').value;
            const birthtime = document.getElementById('birthtime').value;
            const birthdate = new Date(birthdateInput + 'T' + birthtime);
            
            if (isNaN(birthdate.getTime())) {
                alert('请选择有效的出生日期和时间！');
                return;
            }

            const now = new Date();
            const result = document.getElementById('result');
            result.style.display = 'block';

            // 显示公历日期

                year: 'numeric',
                month: 'long',
                day: 'numeric',

            });

                2098: new Date('2098-02-01'), 2099: new Date('2099-01-21'), 2100: new Date('2100-02-09')
            };

            // 修改虚岁计算方法：出生时为一岁，每过一个春节长一岁
            let virtualAge = 1; // 出生时为一岁
            const birthYear = birthdate.getFullYear();
            const currentYear = now.getFullYear();
            
            // 计算从出生年到当前年经历了多少个春节
            for (let year = birthYear; year <= currentYear; year++) {
                // 如果该年有春节记录，且出生日期在该年春节前，且当前日期在该年春节后或等于春节
                if (lunarNewYearDates[year] && 
                    (year > birthYear || birthdate < lunarNewYearDates[year]) && 
                    (year < currentYear || now >= lunarNewYearDates[year])) {
                    virtualAge++;
                }
            }

            // 计算生肖
            const zodiacAnimals = ['鼠', '牛', '虎', '兔', '龙', '蛇', '马', '羊', '猴', '鸡', '狗', '猪'];
            
            // 获取生肖年份
            function getLunarYear(date) {
                const year = date.getFullYear();
                const lunarNewYear = lunarNewYearDates[year];
                
                if (lunarNewYear) {
                    // 创建日期的副本，只保留年月日部分，忽略时间部分
                    const dateOnly = new Date(date.getFullYear(), date.getMonth(), date.getDate());
                    const lunarNewYearOnly = new Date(lunarNewYear.getFullYear(), lunarNewYear.getMonth(), lunarNewYear.getDate());
                    
                    // 如果在春节前，应该算上一年的生肖
                    if (dateOnly < lunarNewYearOnly) {
                        return year - 1;
                    }
                }
                return year;
            }

            const lunarYear = getLunarYear(birthdate);
            // 修正生肖计算公式：使用正确的对应关系
            const zodiacIndex = (lunarYear - 4) % 12;
            const zodiacAnimal = zodiacAnimals[zodiacIndex];
            
            // 计算星座
            const constellations = [
                {name: '摩羯座', startMonth: 12, startDay: 22, endMonth: 1, endDay: 19},
                {name: '水瓶座', startMonth: 1, startDay: 20, endMonth: 2, endDay: 18},
                {name: '双鱼座', startMonth: 2, startDay: 19, endMonth: 3, endDay: 20},

                {name: '金牛座', startMonth: 4, startDay: 20, endMonth: 5, endDay: 20},

                {name: '巨蟹座', startMonth: 6, startDay: 21, endMonth: 7, endDay: 22},

            ];

            const month = birthdate.getMonth() + 1;
            const day = birthdate.getDate();
            let constellation = '';

            // 更简洁的星座判断逻辑
            for (const sign of constellations) {
                if ((month === sign.startMonth && day >= sign.startDay) || 
                    (month === sign.endMonth && day <= sign.endDay)) {
                    constellation = sign.name;
                    break;
                }
            }

            // 计算已生活时间
            const timeDiff = now.getTime() - birthdate.getTime();
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const remainingTime = timeDiff % (1000 * 60 * 60 * 24);
            const hours = Math.floor(remainingTime / (1000 * 60 * 60));
            const remainingMinutes = remainingTime % (1000 * 60 * 60);
            const minutes = Math.floor(remainingMinutes / (1000 * 60));
            const seconds = Math.floor((remainingMinutes % (1000 * 60)) / 1000);

            // 添加生日倒计时计算
            const nextBirthday = new Date(now.getFullYear(), birthdate.getMonth(), birthdate.getDate());
            if (nextBirthday < now) {
                nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);

            // 清除可能存在的旧定时器
            if (window.lunarCountdownTimer) {
                clearInterval(window.lunarCountdownTimer);
            }
            
            function updateLunarCountdown() {
                try {
                    const now = new Date();
                    // 确保Lunar对象存在
                    if (typeof Lunar === 'undefined') {
                        console.error("Lunar库未加载");
                        document.getElementById('lunarBirthdayCountdown').innerHTML = 
                            `农历生日计算中...（Lunar库未加载）`;
                        return;
                    }
                    
                    try {
                        // 获取出生日期的农历日期
                        const birthLunar = Lunar.fromDate(birthdate);
                        const nowLunar = Lunar.fromDate(now);
                        
                        // 计算下一个农历生日年份
                        let nextYear = nowLunar.getYear();
                        if (nowLunar.getMonth() > birthLunar.getMonth() || 
                            (nowLunar.getMonth() === birthLunar.getMonth() && 
                             nowLunar.getDay() >= birthLunar.getDay())) {
                            nextYear++;
                        }
                        
                        // 修正这里：正确使用API获取下一个农历生日的公历日期
                        const nextLunarBirthday = Lunar.fromYmd(
                            nextYear,
                            birthLunar.getMonth(),
                            birthLunar.getDay()
                        ).getSolar();
                        
                        // 获取公历日期对象
                        const nextDate = new Date(
                            nextLunarBirthday.getYear(), 
                            nextLunarBirthday.getMonth() - 1, 
                            nextLunarBirthday.getDay()
                        );
                        
                        // 计算时间差
                        const diff = nextDate.getTime() - now.getTime();
                        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                        
                        // 更新显示
                        document.getElementById('lunarBirthdayCountdown').innerHTML = 
                            `距离下次农历生日：${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
                    } catch (innerError) {
                        console.error("农历日期计算错误:", innerError);
                        document.getElementById('lunarBirthdayCountdown').innerHTML = 
                            `农历生日计算错误: ${innerError.message}`;
                    }
                } catch (e) {
                    console.error("农历生日计算外部错误:", e);
                    document.getElementById('lunarBirthdayCountdown').innerHTML = 
                        `农历生日计算错误: ${e.message}`;
                }
            }
            
            // 立即执行一次
            updateLunarCountdown();
            
            // 设置定时器每秒更新一次
            window.lunarCountdownTimer = setInterval(updateLunarCountdown, 1000);
        }

        let updateInterval;
        function startRealTimeUpdate(birthdate) {
            if (updateInterval) {
                clearInterval(updateInterval);
            }

            updateInterval = setInterval(() => {
                const now = new Date();
                
                // 计算生命时间
                const timeDiff = now.getTime() - birthdate.getTime();
                const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
                const remainingTime = timeDiff % (1000 * 60 * 60 * 24);
                const hours = Math.floor(remainingTime / (1000 * 60 * 60));
                const remainingMinutes = remainingTime % (1000 * 60 * 60);
                const minutes = Math.floor(remainingMinutes / (1000 * 60));
                const seconds = Math.floor((remainingMinutes % (1000 * 60)) / 1000);

                // 计算距离下次生日的时间
                const nextBirthday = new Date(now.getFullYear(), birthdate.getMonth(), birthdate.getDate());
                if (nextBirthday < now) {
                    nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);
                }
                const birthdayDiff = nextBirthday.getTime() - now.getTime();
                const birthdayDays = Math.floor(birthdayDiff / (1000 * 60 * 60 * 24));
                const birthdayHours = Math.floor((birthdayDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const birthdayMinutes = Math.floor((birthdayDiff % (1000 * 60 * 60)) / (1000 * 60));
                const birthdaySeconds = Math.floor((birthdayDiff % (1000 * 60)) / 1000);

                document.getElementById('lifeTimeResult').innerHTML = 
                    `已经生活了：${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
                document.getElementById('birthdayCountdownResult').innerHTML = 
                    `距离下次公历生日：${birthdayDays}天 ${birthdayHours}小时 ${birthdayMinutes}分钟 ${birthdaySeconds}秒`;
            }, 1000);
        }

        // 添加农历日期转换函数（简化版本）
        // 修改农历日期转换函数
        function getLunarDate(date) {
            const lunar = Lunar.fromDate(date);
            const year = lunar.getYearInGanZhi(); // 获取干支纪年
            const month = lunar.getMonthInChinese(); // 获取农历月份
            const day = lunar.getDayInChinese(); // 获取农历日期
            const hour = lunar.getTimeZhi(); // 获取时辰
            
            // 获取节气信息
            const jieQi = lunar.getJieQi();
            const jieQiText = jieQi ? ` (${jieQi})` : '';
            
            // 获取农历节日
            const festivals = lunar.getFestivals();
            const festivalText = festivals.length > 0 ? ` [${festivals.join(', ')}]` : '';
            
            return `农历${year}年 ${month}月${day} ${hour}时${jieQiText}${festivalText}`;
        }
    </script>
