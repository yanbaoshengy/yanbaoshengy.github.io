<body>
    <h1>年龄计算器</h1>
    
    <div class="container">
        <div class="input-group">
            <label for="birthdate">选择出生日期:</label>
            <input type="date" id="birthdate" required>
            <label for="birthtime">选择出生时间:</label>
            <input type="time" id="birthtime" required value="00:00">
        </div>

        <button onclick="calculateAge()">计算</button>

        <div id="result">
            <div class="result-item" id="ageResult"></div>
            <div class="result-item" id="virtualAgeResult"></div>
            <div class="result-item" id="zodiacResult"></div>
            <div class="result-item" id="constellationResult"></div>
            <div class="result-item" id="lifeTimeResult"></div>
        </div>

        <div class="instructions">
            <h2>使用说明</h2>
            <div class="instructions-content">
                <div class="instructions-section">
                    <h3>基本功能</h3>
                    <ul>
                        <li>计算周岁和虚岁年龄</li>
                        <li>查看生肖和星座</li>
                        <li>显示已生活时间</li>
                        <li>实时更新计时</li>
                    </ul>
                </div>
                <div class="instructions-section">
                    <h3>名词解释</h3>
                    <ul>
                        <li>周岁：从出生之日起计算的实际年龄</li>
                        <li>虚岁：传统计年龄的方法,出生时算1岁</li>
                        <li>生肖：十二生肖属相</li>
                        <li>星座：根据阳历出生日期判断的星座</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        let timerInterval;

        function updateTimer(birthdate) {
            const now = new Date();
            const timeDiff = now - birthdate;

            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);

            document.getElementById('lifeTimeResult').innerHTML = 
                `已经生活了：${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
        }

        function calculateAge() {
            const birthdateInput = document.getElementById('birthdate').value;
            const birthtime = document.getElementById('birthtime').value;
            const birthdate = new Date(birthdateInput + 'T' + birthtime);
            
            if (isNaN(birthdate.getTime())) {
                alert('请选择有效的出生日期和时间！');
                return;
            }

            const now = new Date();
            const result = document.getElementById('result');
            result.style.display = 'block';

            // 清除之前的定时器
            if (timerInterval) {
                clearInterval(timerInterval);
            }

            // 计算周岁
            let age = now.getFullYear() - birthdate.getFullYear();
            const monthDiff = now.getMonth() - birthdate.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && now.getDate() < birthdate.getDate())) {
                age--;
            }

            // 计算虚岁
            const virtualAge = age + 1;

            // 计算生肖
            const zodiacAnimals = ['鼠', '牛', '虎', '兔', '龙', '蛇', '马', '羊', '猴', '鸡', '狗', '猪'];
            const zodiacYear = birthdate.getFullYear() % 12;
            const zodiacAnimal = zodiacAnimals[zodiacYear];

            // 计算星座
            const constellations = [
                {name: '摩羯座', startMonth: 12, startDay: 22},
                {name: '水瓶座', startMonth: 1, startDay: 20},
                {name: '双鱼座', startMonth: 2, startDay: 19},
                {name: '白羊座', startMonth: 3, startDay: 21},
                {name: '金牛座', startMonth: 4, startDay: 20},
                {name: '双子座', startMonth: 5, startDay: 21},
                {name: '巨蟹座', startMonth: 6, startDay: 22},
                {name: '狮子座', startMonth: 7, startDay: 23},
                {name: '处女座', startMonth: 8, startDay: 23},
                {name: '天秤座', startMonth: 9, startDay: 23},
                {name: '天蝎座', startMonth: 10, startDay: 24},
                {name: '射手座', startMonth: 11, startDay: 23},
                {name: '摩羯座', startMonth: 12, startDay: 22}
            ];

            const month = birthdate.getMonth() + 1;
            const day = birthdate.getDate();
            let constellation = '';

            for (let i = 0; i < constellations.length; i++) {
                if (month === constellations[i].startMonth && day >= constellations[i].startDay ||
                    month === constellations[i].startMonth + 1 && day < constellations[i + 1]?.startDay) {
                    constellation = constellations[i].name;
                    break;
                }
            }

            // 计算已生活时间
            const timeDiff = now.getTime() - birthdate.getTime();
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            const remainingTime = timeDiff % (1000 * 60 * 60 * 24);
            const hours = Math.floor(remainingTime / (1000 * 60 * 60));
            const remainingMinutes = remainingTime % (1000 * 60 * 60);
            const minutes = Math.floor(remainingMinutes / (1000 * 60));
            const seconds = Math.floor((remainingMinutes % (1000 * 60)) / 1000);

            // 更新显示结果
            document.getElementById('ageResult').innerHTML = `周岁：${age}岁`;
            document.getElementById('virtualAgeResult').innerHTML = `虚岁：${virtualAge}岁`;
            document.getElementById('zodiacResult').innerHTML = `生肖：${zodiacAnimal}`;
            document.getElementById('constellationResult').innerHTML = `星座：${constellation}`;
            document.getElementById('lifeTimeResult').innerHTML = 
                `已经生活了：${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;

            // 启动实时更新
            startRealTimeUpdate(birthdate);
        }

        let updateInterval;
        function startRealTimeUpdate(birthdate) {
            // 清除之前的定时器
            if (updateInterval) {
                clearInterval(updateInterval);
            }

            // 每秒更新一次生活时间
            updateInterval = setInterval(() => {
                const now = new Date();
                const timeDiff = now.getTime() - birthdate.getTime();
                const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
                const remainingTime = timeDiff % (1000 * 60 * 60 * 24);
                const hours = Math.floor(remainingTime / (1000 * 60 * 60));
                const remainingMinutes = remainingTime % (1000 * 60 * 60);
                const minutes = Math.floor(remainingMinutes / (1000 * 60));
                const seconds = Math.floor((remainingMinutes % (1000 * 60)) / 1000);

                document.getElementById('lifeTimeResult').innerHTML = 
                    `已经生活了：${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
            }, 1000);
        }
    </script>
</body>
