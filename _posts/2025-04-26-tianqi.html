    <style>
        body {

            margin: 5px 0;

            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .forecast-item {
            background-color: #e9ecef;
            padding: 10px;
            border-radius: 4px;
            flex: 1 1 180px; /* Flex basis for responsiveness */
            min-width: 150px;
        }
        #loading, #error {
            text-align: center;
            color: #dc3545;
            font-weight: bold;
            margin-top: 20px;
        }
        #loading {
            color: #007bff;
        }
        strong {
            color: #555;
        }
    </style>

        // 天气代码到描述的映射 (示例，需要根据实际API返回的代码补充)
        function getWindDirection(degrees) {
            if (degrees === null || degrees === undefined) return '未知';
            const directions = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
            const index = Math.round(degrees / 45) % 8;
            return directions[index];
        }

        // 格式化日期时间
        function formatDateTime(isoString) {
            if (!isoString) return 'N/A';
            try {
                const date = new Date(isoString);
                return date.toLocaleString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return isoString; // Fallback if parsing fails
            }
        }

        // 格式化日期
        function formatDate(isoString) {
             if (!isoString) return 'N/A';
            try {
                const date = new Date(isoString);
                return date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
            } catch (e) {
                return isoString; // Fallback if parsing fails
            }
        }

        // 格式化小时
        function formatHour(isoString) {
            if (!isoString) return 'N/A';
            try {
                const date = new Date(isoString);
                return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return isoString; // Fallback if parsing fails
            }
        }

                weatherDisplayDiv.style.display = 'block';

            } catch (error) {
                console.error('获取天气数据时出错:', error);
                loadingDiv.style.display = 'none';
                errorDiv.textContent = `加载天气数据失败: ${error.message}. 请注意，由于浏览器安全限制 (CORS)，直接调用此API可能被阻止。请检查浏览器控制台获取更多信息。`;
                errorDiv.style.display = 'block';
            }
        }

        // 页面加载完成后获取默认数据 (北京)
        document.addEventListener('DOMContentLoaded', () => {
            fetchWeatherData(); // 获取默认天气

            // 为查询按钮添加事件监听器
            const fetchBtn = document.getElementById('fetchWeatherBtn');
            const locationInput = document.getElementById('locationInput');
            fetchBtn.addEventListener('click', () => {
                const newLocationKey = locationInput.value.trim();
                if (newLocationKey) {
                    fetchWeatherData(newLocationKey);
                } else {
                    alert('请输入有效的地区代码！');
                }
            });
        });
    </script>
</body>
</html>
