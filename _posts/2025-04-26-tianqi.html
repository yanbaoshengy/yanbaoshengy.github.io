        function formatDateTime(isoString) {
            if (!isoString) return 'N/A';
            try {
                const date = new Date(isoString);
                return date.toLocaleString('zh-CN', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric', 
                    hour: '2-digit', 
                    minute: '2-digit',
                    second: '2-digit'  // 添加秒的显示
                });
            } catch (e) {
                return isoString;
            }
        }

        // 格式化日期
        function formatDate(isoString) {
             if (!isoString) return 'N/A';
            try {

            } catch (e) {
                return isoString; // Fallback if parsing fails

        // 填充地区选择列表
        function populateLocationList(searchTerm = '') {
            const listElement = document.getElementById('locationList');
            listElement.className = 'location-grid';  // 更改类名
            listElement.innerHTML = ''; // Clear existing items
            const lowerSearchTerm = searchTerm.toLowerCase();

            for (const province in predefinedLocations) {
                let provinceHasVisibleCities = false;
                const provinceCities = [];

                for (const city in predefinedLocations[province]) {
                    const cityLower = city.toLowerCase();
                    if (cityLower.includes(lowerSearchTerm)) {
                        provinceHasVisibleCities = true;
                        const cityItem = document.createElement('div');
                        // Highlight the matching text
                        const highlightedCity = searchTerm
                            ? city.replace(new RegExp(searchTerm, 'gi'), match => `<span class="highlight">${match}</span>`)
                            : city;
                        cityItem.innerHTML = highlightedCity;
                        cityItem.className = 'city-item';
                        cityItem.dataset.locationId = predefinedLocations[province][city];
                        cityItem.dataset.locationName = `${province} - ${city}`;
                        cityItem.addEventListener('click', handleLocationSelection);
                        provinceCities.push(cityItem);
                    }
                }

                if (provinceHasVisibleCities) {
                    const provinceHeader = document.createElement('div');
                    provinceHeader.textContent = province;
                    provinceHeader.className = 'province-header';
                    listElement.appendChild(provinceHeader);
                    provinceCities.forEach(cityItem => listElement.appendChild(cityItem));
                }
            }
        }

        // 处理地区选择
        function handleLocationSelection(event) {
            const locationId = event.target.dataset.locationId;
            const locationName = event.target.dataset.locationName;
            document.getElementById('location-selection').style.display = 'none';
            fetchWeatherForLocation(locationId, locationName);
        }

        async function fetchWeatherForLocation(locationParam, locationName) {
            const apiKey = '3fc0349919754c0289521bd69b065d8c'; 
            const apiHost = 'jy65nm68e3.re.qweatherapi.com'; 
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const weatherDisplayDiv = document.getElementById('weather-display');

            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            weatherDisplayDiv.style.display = 'none';

            try {
                
                const nowUrl = `https://${apiHost}/v7/weather/now?location=${locationParam}&key=${apiKey}&lang=zh`;
                const forecastUrl = `https://${apiHost}/v7/weather/7d?location=${locationParam}&key=${apiKey}&lang=zh`;

                
                const hourlyUrl = `https://${apiHost}/v7/weather/72h?location=${locationParam}&key=${apiKey}&lang=zh`;
                const [nowResponse, forecastResponse, hourlyResponse] = await Promise.all([
                    fetch(nowUrl),
                    fetch(forecastUrl),
                    fetch(hourlyUrl)
                ]);

                // 检查响应状态
                if (!nowResponse.ok || !forecastResponse.ok || !hourlyResponse.ok) {
                    let errorMsg = '';
                    if (!nowResponse.ok) errorMsg += `实时天气获取失败: ${nowResponse.status} ${nowResponse.statusText}. `;
                    if (!forecastResponse.ok) errorMsg += `天气预报获取失败: ${forecastResponse.status} ${forecastResponse.statusText}.`;
                    try {
                        if (!nowResponse.ok) errorMsg += ` Details: ${await nowResponse.text()}`;
                        if (!forecastResponse.ok) errorMsg += ` Details: ${await forecastResponse.text()}`;
                    } catch {}
                    throw new Error(errorMsg);
                }

                const [nowData, forecastData, hourlyData] = await Promise.all([
                    nowResponse.json(),
                    forecastResponse.json(),
                    hourlyResponse.json()
                ]);

                
                if (nowData.code !== '200' || forecastData.code !== '200' || hourlyData.code !== '200') {
                    let errorMsg = '';
                    if (nowData.code !== '200') errorMsg += `实时天气API错误: ${nowData.code}. `;
                    if (forecastData.code !== '200') errorMsg += `天气预报API错误: ${forecastData.code}.`;
                    throw new Error(errorMsg);
                }

                
                const now = nowData.now;
                document.getElementById('locationName').textContent = locationName; // 使用传入的地点名称
                document.getElementById('obsTime').textContent = formatDateTime(now.obsTime);
                document.getElementById('currentTemp').textContent = `${now.temp}℃`;
                document.getElementById('feelsLike').textContent = `${now.feelsLike}℃`;
                document.getElementById('currentWeatherText').textContent = now.text;
                document.getElementById('currentWindDir').textContent = now.windDir;
                document.getElementById('currentWindScale').textContent = now.windScale;
                document.getElementById('currentHumidity').textContent = `${now.humidity}%`;
                document.getElementById('precip').textContent = `${now.precip} mm`;
                document.getElementById('pressure').textContent = `${now.pressure} hPa`;

                
                const todayForecast = forecastData.daily[0];
                document.getElementById('weather').textContent = todayForecast.textDay;
                document.getElementById('temperature').textContent = `${todayForecast.tempMin}℃ ~ ${todayForecast.tempMax}℃`;
                document.getElementById('windDirection').textContent = todayForecast.windDirDay;
                document.getElementById('windScale').textContent = `${todayForecast.windScaleDay}级`;
                document.getElementById('pubTime').textContent = formatDateTime(forecastData.updateTime);
                document.getElementById('humidity').textContent = `${todayForecast.humidity}%`;

                
                // 处理24小时预报数据
                const forecastHourlyDiv = document.getElementById('forecastHourly');
                forecastHourlyDiv.innerHTML = '';
                hourlyData.hourly.forEach(hour => {
                    const item = document.createElement('div');
                    item.classList.add('hourly-forecast-item');
                    item.innerHTML = `
                        <p><strong>${formatHour(hour.fxTime)}</strong></p>
                        <p>${hour.text}</p>
                        <p style="font-size: 1.2em; color: #0056b3;">${hour.temp}℃</p>
                        <p>${hour.windDir} ${hour.windScale}级</p>
                        <p>湿度: ${hour.humidity}%</p>
                        <p>降水: ${hour.precip}mm</p>
                        <p>降水概率: ${hour.pop}%</p>
                    `;
                    forecastHourlyDiv.appendChild(item);
                });

                const forecastDailyDiv = document.getElementById('forecastDaily');
                forecastDailyDiv.innerHTML = '';
                forecastData.daily.slice(1).forEach(day => {
                    const item = document.createElement('div');
                    item.classList.add('forecast-item');
                    item.innerHTML = `
                        <p><strong>日期:</strong> ${day.fxDate}</p>
                        <p><strong>天气:</strong> ${day.textDay}</p>
                        <p><strong>温度:</strong> ${day.tempMin}℃ ~ ${day.tempMax}℃</p>
                        <p><strong>风向:</strong> ${day.windDirDay} ${day.windScaleDay}级</p>
                    `;
                    forecastDailyDiv.appendChild(item);
                });

                
                weatherDisplayDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
            } catch (error) {
                console.error('获取天气数据失败:', error);
                errorDiv.textContent = `加载天气数据失败: ${error.message}`;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
                // 如果是因为获取特定地点天气失败，可以选择显示地区选择列表
                // populateLocationList();
                // document.getElementById('location-selection').style.display = 'block';
            }
        }

        // 尝试获取地理位置并获取天气
        async function fetchWeatherData() {
            const apiKey = '3fc0349919754c0289521bd69b065d8c';
            const apiHost = 'jy65nm68e3.re.qweatherapi.com';
            let locationParam = '101010100'; //
            let locationName = '北京 (默认)';
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const weatherDisplayDiv = document.getElementById('weather-display');
            const locationSelectionDiv = document.getElementById('location-selection');

            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            weatherDisplayDiv.style.display = 'none';
            locationSelectionDiv.style.display = 'none';

            try {
                // 1. 获取地理位置 (保持不变)
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
                    });
                    locationParam = `${position.coords.longitude.toFixed(2)},${position.coords.latitude.toFixed(2)}`;
                    locationName = `经度: ${position.coords.longitude.toFixed(2)}, 纬度: ${position.coords.latitude.toFixed(2)}`;
                    console.log('Using geolocation:', locationParam);
                    // 使用获取到的经纬度获取天气
                    fetchWeatherForLocation(locationParam, `当前位置 (${locationName})`);
                } catch (geoError) {
                    console.warn('Geolocation failed or timed out, showing location selection:', geoError.message);
                    // 地理位置获取失败或超时，显示地区选择列表
                    loadingDiv.style.display = 'none';
                    populateLocationList(); // Populate initially without search term
                    locationSelectionDiv.style.display = 'block';

                    // Add event listener for search input
                    const locationSearchInput = document.getElementById('locationSearch');
                    locationSearchInput.addEventListener('input', (event) => {
                        populateLocationList(event.target.value);
                    });

                    // 此处不再继续执行后续的天气获取逻辑，等待用户选择
                    return; // 退出函数
                }

                // // 后续代码移至 fetchWeatherForLocation 函数中，这里不再需要
                // // 2. 构建实时天气和7天预报的 API URL
                // const nowUrl = `https://${apiHost}/v7/weather/now?location=${locationParam}&key=${apiKey}&lang=zh`;
                // const forecastUrl = `https://${apiHost}/v7/weather/7d?location=${locationParam}&key=${apiKey}&lang=zh`;
                // ... (省略移走的代码)
            } catch (error) { // 恢复对 fetchWeatherData 中可能发生的其他错误的捕获 (虽然主要逻辑已移走)
                console.error('在 fetchWeatherData 中发生意外错误:', error);
                errorDiv.textContent = `加载初始化过程失败: ${error.message}`;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
            }
        }

        // 检测系统夜间模式
        function checkDarkMode() {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (isDark) {
                document.body.classList.add('dark-mode');
            }

            // 监听系统主题变化
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (e.matches) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            });
        }

        // 页面加载完成后获取默认数据
        document.addEventListener('DOMContentLoaded', () => {
            checkDarkMode();
            fetchWeatherData(); // Start the process: try geolocation first
        });
    </script>
