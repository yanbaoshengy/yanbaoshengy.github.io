<body>
    <div class="game-container">
        <div class="game-header">
            <h1 class="game-title">五子棋游戏</h1>
        </div>
        
        <div class="game-info">
            <div class="status-display" id="status">等待开始游戏</div>
            <div class="player-info" id="playerInfo">您: 黑子 | AI: 白子</div>
        </div>
        
        <div class="difficulty-selector">
            <label for="difficulty">难度:</label>
            <select id="difficulty">
                <option value="easy">简单</option>
                <option value="medium" selected>中等</option>
                <option value="hard">困难</option>
                <option value="expert">专家</option>
            </select>
            
            <label for="colorSelect">执棋:</label>
            <select id="colorSelect">
                <option value="1" selected>黑子</option>
                <option value="2">白子</option>
            </select>
        </div>
        
        <div class="controls">
            <button id="newGame">新游戏</button>
            <button id="undo">悔棋</button>
            <button id="hint">提示</button>
        </div>
        
        <div class="game-board-container">
            <canvas id="gameCanvas" width="480" height="480"></canvas>
        </div>
    </div>
    
    <div class="win-modal" id="winModal">
        <div class="win-content">
            <div class="win-message" id="winMessage"></div>
            <button id="playAgain">再玩一局</button>
            <div class="stats" id="gameStats"></div>
        </div>
    </div>

    <script>
        // 游戏常量
        const BOARD_SIZE = 15;
        let CELL_SIZE = 30;
        let PADDING = 30;
        
        // 响应式调整常量
        function adjustBoardSize() {
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;
            
            if (screenWidth <= 360) {
                CELL_SIZE = 18;
                PADDING = 20;
            } else if (screenWidth <= 480) {
                CELL_SIZE = 20;
                PADDING = 25;
            } else if (screenWidth <= 768) {
                CELL_SIZE = 22;
                PADDING = 25;
            } else {
                CELL_SIZE = 30;
                PADDING = 30;
            }
            
            // 重新计算画布尺寸
            const canvasSize = BOARD_SIZE * CELL_SIZE + PADDING * 2;
            canvas.width = canvasSize;
            canvas.height = canvasSize;
        }
        
        // 游戏状态
        let board = [];
        let gameOver = false;
        let currentPlayer = 1; // 1: 黑子, 2: 白子
        let playerColor = 1; // 1: 玩家执黑, 2: 玩家执白
        let gameHistory = [];
        let wins = 0;
        let losses = 0;
        let draws = 0;
        let lastOpponentMove = null; // 记录对手最后一次落子位置
        
        // DOM元素
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDisplay = document.getElementById('status');
        const newGameBtn = document.getElementById('newGame');
        const undoBtn = document.getElementById('undo');
        const hintBtn = document.getElementById('hint');
        const winModal = document.getElementById('winModal');
        const winMessage = document.getElementById('winMessage');
        const playAgainBtn = document.getElementById('playAgain');
        const gameStats = document.getElementById('gameStats');
        const difficultySelect = document.getElementById('difficulty');
        const colorSelector = document.getElementById('colorSelect');
        
        // 初始化游戏
        function initGame() {
            // 调整棋盘尺寸
            adjustBoardSize();
            
            // 初始化棋盘
            board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(0));
            gameOver = false;
            
            // 获取玩家选择的颜色
            playerColor = parseInt(colorSelector.value);
            
            // 更新玩家信息显示
            const playerColorName = playerColor === 1 ? '黑子' : '白子';
            const aiColorName = playerColor === 1 ? '白子' : '黑子';
            document.getElementById('playerInfo').textContent = `您: ${playerColorName} | AI: ${aiColorName}`;
            
            // 如果玩家选择白棋，则AI先下黑棋
            currentPlayer = playerColor;
            
            // 清空历史记录
            gameHistory = [];
            
            // 重置对手最后一步记录
            lastOpponentMove = null;
            
            // 更新状态显示
            updateStatus();
            
            // 绘制棋盘
            drawBoard();
            
            // 如果AI先下（玩家执白），则AI下第一步
            if (playerColor === 2) {
                setTimeout(() => {
                    if (!gameOver) {
                        aiMove();
                    }
                }, 500);
            }
            
            // 隐藏胜利弹窗
            winModal.style.display = 'none';
        }
        
        // 绘制棋盘
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格线
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                // 水平线
                ctx.beginPath();
                ctx.moveTo(PADDING, PADDING + i * CELL_SIZE);
                ctx.lineTo(canvas.width - PADDING, PADDING + i * CELL_SIZE);
                ctx.stroke();
                
                // 垂直线
                ctx.beginPath();
                ctx.moveTo(PADDING + i * CELL_SIZE, PADDING);
                ctx.lineTo(PADDING + i * CELL_SIZE, canvas.height - PADDING);
                ctx.stroke();
            }
            
            // 绘制天元和星位
            const center = Math.floor(BOARD_SIZE / 2);
            const starPoints = [
                [3, 3], [3, 11], [11, 3], [11, 11], [7, 7]
            ];
            
            ctx.fillStyle = '#000';
            starPoints.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.arc(PADDING + x * CELL_SIZE, PADDING + y * CELL_SIZE, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // 绘制棋子
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] !== 0) {
                        drawPiece(col, row, board[row][col]);
                    }
                }
            }
            
            // 绘制对手最后一步的高亮标记（在所有棋子绘制完成后）
            if (lastOpponentMove && 
                lastOpponentMove.row >= 0 && lastOpponentMove.row < BOARD_SIZE &&
                lastOpponentMove.col >= 0 && lastOpponentMove.col < BOARD_SIZE &&
                board[lastOpponentMove.row][lastOpponentMove.col] !== 0) {
                drawLastMoveHighlight(lastOpponentMove.col, lastOpponentMove.row);
            }
        }
        
        // 绘制对手最后一步的高亮标记
        function drawLastMoveHighlight(col, row) {
            const x = PADDING + col * CELL_SIZE;
            const y = PADDING + row * CELL_SIZE;
            
            // 绘制高亮圆圈（外圈）
            ctx.beginPath();
            ctx.arc(x, y, CELL_SIZE / 2 + 6, 0, Math.PI * 2);
            ctx.strokeStyle = '#ff4444'; // 红色高亮
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // 绘制高亮圆圈（内圈）
            ctx.beginPath();
            ctx.arc(x, y, CELL_SIZE / 2 + 3, 0, Math.PI * 2);
            ctx.strokeStyle = '#ff6666';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 添加发光效果
            ctx.beginPath();
            ctx.arc(x, y, CELL_SIZE / 2 + 8, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 68, 68, 0.2)';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            // 添加脉冲效果（小点）
            ctx.beginPath();
            ctx.arc(x, y, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#ff4444';
            ctx.fill();
        }
        
        // 绘制棋子
        function drawPiece(col, row, player) {
            const x = PADDING + col * CELL_SIZE;
            const y = PADDING + row * CELL_SIZE;
            
            ctx.beginPath();
            ctx.arc(x, y, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
            
            if (player === 1) { // 玩家(黑子)
                // 创建渐变效果
                const gradient = ctx.createRadialGradient(
                    x - 3, y - 3, 1,
                    x, y, CELL_SIZE / 2 - 2
                );
                gradient.addColorStop(0, '#333');
                gradient.addColorStop(1, '#000');
                ctx.fillStyle = gradient;
            } else { // AI(白子)
                // 创建渐变效果
                const gradient = ctx.createRadialGradient(
                    x - 3, y - 3, 1,
                    x, y, CELL_SIZE / 2 - 2
                );
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, '#ccc');
                ctx.fillStyle = gradient;
            }
            
            ctx.fill();
            
            // 添加边框
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
        
        // 检查是否获胜
        function checkWin(row, col, player) {
            const directions = [
                [1, 0],   // 水平
                [0, 1],   // 垂直
                [1, 1],   // 对角线
                [1, -1]   // 反对角线
            ];
            
            for (let [dx, dy] of directions) {
                let count = 1;
                
                // 正向检查
                for (let i = 1; i < 5; i++) {
                    const newRow = row + i * dy;
                    const newCol = col + i * dx;
                    
                    if (
                        newRow >= 0 && newRow < BOARD_SIZE &&
                        newCol >= 0 && newCol < BOARD_SIZE &&
                        board[newRow][newCol] === player
                    ) {
                        count++;
                    } else {
                        break;
                    }
                }
                
                // 反向检查
                for (let i = 1; i < 5; i++) {
                    const newRow = row - i * dy;
                    const newCol = col - i * dx;
                    
                    if (
                        newRow >= 0 && newRow < BOARD_SIZE &&
                        newCol >= 0 && newCol < BOARD_SIZE &&
                        board[newRow][newCol] === player
                    ) {
                        count++;
                    } else {
                        break;
                    }
                }
                
                if (count >= 5) {
                    return true;
                }
            }
            
            return false;
        }
        
        // 检查平局
        function checkDraw() {
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] === 0) {
                        return false;
                    }
                }
            }
            return true;
        }
        
        // 玩家落子
        function playerMove(col, row) {
            // 检查是否轮到玩家下棋
            if (gameOver || board[row][col] !== 0 || currentPlayer !== playerColor) {
                return false;
            }
            
            // 记录历史
            gameHistory.push({
                row: row,
                col: col,
                player: currentPlayer
            });
            
            // 玩家落子时，不需要记录lastOpponentMove，因为对手是AI
            // AI的最后一步会在AI落子时记录
            
            // 落子
            board[row][col] = currentPlayer;
            drawBoard(); // 重新绘制整个棋盘以更新高亮标记
            
            // 检查获胜
            if (checkWin(row, col, currentPlayer)) {
                gameOver = true;
                wins++;
                showWinMessage('恭喜！您赢了！');
                return true;
            }
            
            // 检查平局
            if (checkDraw()) {
                gameOver = true;
                draws++;
                showWinMessage('平局！');
                return true;
            }
            
            // 切换到AI回合
            currentPlayer = playerColor === 1 ? 2 : 1;
            updateStatus();
            
            // AI下棋
            setTimeout(() => {
                if (!gameOver) {
                    aiMove();
                }
            }, 500);
            
            return true;
        }
        
        // AI下棋
        function aiMove() {
            if (gameOver) return;
            
            // 确定AI的颜色（与玩家相反）
            const aiColor = playerColor === 1 ? 2 : 1;
            
            // 检查是否轮到AI下棋
            if (currentPlayer !== aiColor) return;
            
            const difficulty = difficultySelect.value;
            let bestMove;
            
            // 根据难度选择AI策略
            if (difficulty === 'easy') {
                bestMove = getRandomMove();
            } else if (difficulty === 'medium') {
                bestMove = getMediumAIMove();
            } else if (difficulty === 'hard') {
                bestMove = getHardAIMove();
            } else {
                // 专家难度 - 使用增强版AI
                bestMove = getExpertAIMove();
            }
            
            if (bestMove) {
                const { row, col } = bestMove;
                
                // 记录历史
                gameHistory.push({
                    row: row,
                    col: col,
                    player: currentPlayer
                });
                
                // 记录AI的最后一步（对手的最后一步）
                lastOpponentMove = { row: row, col: col };
                
                // 落子
                board[row][col] = currentPlayer;
                drawBoard(); // 重新绘制整个棋盘以更新高亮标记
                
                // 检查获胜
                if (checkWin(row, col, currentPlayer)) {
                    gameOver = true;
                    losses++;
                    showWinMessage('很遗憾，AI获胜了！');
                    return;
                }
                
                // 检查平局
                if (checkDraw()) {
                    gameOver = true;
                    draws++;
                    showWinMessage('平局！');
                    return;
                }
                
                // 切换到玩家回合
                currentPlayer = playerColor;
                updateStatus();
            }
        }
        
        // 随机移动（简单难度）
        function getRandomMove() {
            // 确定AI的颜色
            const aiColor = playerColor === 1 ? 2 : 1;
            const opponentColor = playerColor === 1 ? 1 : 2;
            
            // 首先尝试获胜
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] === 0) {
                        board[row][col] = aiColor;
                        if (checkWin(row, col, aiColor)) {
                            board[row][col] = 0;
                            return { row, col };
                        }
                        board[row][col] = 0;
                    }
                }
            }
            
            // 然后阻止玩家获胜
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] === 0) {
                        board[row][col] = opponentColor;
                        if (checkWin(row, col, opponentColor)) {
                            board[row][col] = 0;
                            return { row, col };
                        }
                        board[row][col] = 0;
                    }
                }
            }
            
            // 优先选择中心位置
            const center = Math.floor(BOARD_SIZE / 2);
            if (board[center][center] === 0) {
                return { row: center, col: center };
            }
            
            // 优先选择靠近已有棋子的位置
            const strategicMoves = [];
            const randomMoves = [];
            
            for (let row = 0; row < BOARD_SIZE; row++) {

        // Minimax算法的根节点

        // Minimax算法实现

            }
            
            // 检查游戏结束状态

                    if (board[row][col] !== 0) {

            if (isMaximizing) {

                const possibleMoves = getPossibleMoves();
                
                for (const move of possibleMoves) {
                    board[move.row][move.col] = aiColor;
                    const eval = minimax(depth - 1, false, alpha, beta, aiColor, opponentColor);
                    board[move.row][move.col] = 0; // 恢复
                    maxEval = Math.max(maxEval, eval);
                    alpha = Math.max(alpha, eval);
                    if (beta <= alpha) break; // Alpha-Beta剪枝
                }
                
                return maxEval;
            } else {
                let minEval = Infinity;
                const possibleMoves = getPossibleMoves();
                
                for (const move of possibleMoves) {
                    board[move.row][move.col] = opponentColor;
                    const eval = minimax(depth - 1, true, alpha, beta, aiColor, opponentColor);
                    board[move.row][move.col] = 0; // 恢复
                    minEval = Math.min(minEval, eval);
                    beta = Math.min(beta, eval);
                    if (beta <= alpha) break; // Alpha-Beta剪枝
                }
                
                return minEval;
            }

            for (let [dx, dy] of directions) {
                let count = 1;
                
                // 正向检查
                for (let i = 1; i < 5; i++) {
                    const newRow = row + i * dy;
                    const newCol = col + i * dx;
                    
                    if (
                        newRow >= 0 && newRow < BOARD_SIZE &&
                        newCol >= 0 && newCol < BOARD_SIZE
                    ) {
                        if (board[newRow][newCol] === player) {
                            count++;
                        } else {
                            break;
                        }
                    } else {
                        break;
                    }
                }
                
                // 反向检查
                for (let i = 1; i < 5; i++) {
                    const newRow = row - i * dy;
                    const newCol = col - i * dx;
                    
                    if (
                        newRow >= 0 && newRow < BOARD_SIZE &&
                        newCol >= 0 && newCol < BOARD_SIZE
                    ) {
                        if (board[newRow][newCol] === player) {
                            count++;
                        } else {
                            break;
                        }
                    } else {
                        break;
                    }
                }
                
                // 检查是否形成冲四（总共4个子）
                if (count === 4) {
                    return true;
                }
            }
            
            return false;
        }
        
        // 检查是否形成活三（两边都没有阻挡的三子）
        function hasOpenThree(row, col, player) {
            const directions = [
                [1, 0], [0, 1], [1, 1], [1, -1]
            ];
            
            for (let [dx, dy] of directions) {
                let count = 1;
                let openStart = 0;
                let openEnd = 0;
                
                // 正向检查
                for (let i = 1; i < 4; i++) {
                    const newRow = row + i * dy;
                    const newCol = col + i * dx;
                    
                    if (
                        newRow >= 0 && newRow < BOARD_SIZE &&
                        newCol >= 0 && newCol < BOARD_SIZE
                    ) {
                        if (board[newRow][newCol] === player) {
                            count++;
                        } else if (board[newRow][newCol] === 0) {
                            if (i === 1) openStart = 1;
                            break;
                        } else {
                            break;
                        }
                    } else {
                        break;
                    }
                }
                
                // 反向检查
                for (let i = 1; i < 4; i++) {
                    const newRow = row - i * dy;
                    const newCol = col - i * dx;
                    
                    if (
                        newRow >= 0 && newRow < BOARD_SIZE &&
                        newCol >= 0 && newCol < BOARD_SIZE
                    ) {
                        if (board[newRow][newCol] === player) {
                            count++;
                        } else if (board[newRow][newCol] === 0) {
                            if (i === 1) openEnd = 1;
                            break;
                        } else {
                            break;
                        }
                    } else {
                        break;
                    }
                }
                
                // 检查是否形成活三（总共3个子，两端开放）
                if (count === 3 && openStart + openEnd === 2) {
                    return true;
                }
            }
            
            return false;
        }
        
        // 检查是否形成双活三
        function hasDoubleOpenThree(row, col, player) {
            const directions = [
                [1, 0], [0, 1], [1, 1], [1, -1]
            ];
            
            let openThreeCount = 0;
            
            for (let [dx, dy] of directions) {
                let count = 1;
                let openStart = 0;
                let openEnd = 0;
                
                // 正向检查
                for (let i = 1; i < 4; i++) {
                    const newRow = row + i * dy;
                    const newCol = col + i * dx;
                    
                    if (
                        newRow >= 0 && newRow < BOARD_SIZE &&
                        newCol >= 0 && newCol < BOARD_SIZE
                    ) {
                        if (board[newRow][newCol] === player) {
                            count++;
                        } else if (board[newRow][newCol] === 0) {
                            if (i === 1) openStart = 1;
                            break;
                        } else {
                            break;
                        }
                    } else {
                        break;
                    }
                }
                
                // 反向检查
                for (let i = 1; i < 4; i++) {
                    const newRow = row - i * dy;
                    const newCol = col - i * dx;
                    
                    if (
                        newRow >= 0 && newRow < BOARD_SIZE &&
                        newCol >= 0 && newCol < BOARD_SIZE
                    ) {
                        if (board[newRow][newCol] === player) {
                            count++;
                        } else if (board[newRow][newCol] === 0) {
                            if (i === 1) openEnd = 1;
                            break;
                        } else {
                            break;
                        }
                    } else {
                        break;
                    }
                }
                
                // 检查是否形成活三（总共3个子，两端开放）
                if (count === 3 && openStart + openEnd === 2) {
                    openThreeCount++;
                    if (openThreeCount >= 2) {
                        return true;
                    }
                }
            }
            
            return false;
        }
        
        // 增强版评估位置得分
        function evaluatePosition(row, col, player) {
            let score = 0;
            const directions = [
                [1, 0], [0, 1], [1, 1], [1, -1]
            ];
            
            for (let [dx, dy] of directions) {
                let count = 1;
                let blockedStart = 0;
                let blockedEnd = 0;
                let spaceStart = 0;
                let spaceEnd = 0;
                
                // 正向检查
                for (let i = 1; i < 6; i++) {
                    const newRow = row + i * dy;
                    const newCol = col + i * dx;
                    
                    if (
                        newRow >= 0 && newRow < BOARD_SIZE &&
                        newCol >= 0 && newCol < BOARD_SIZE
                    ) {
                        if (board[newRow][newCol] === player) {
                            count++;
                        } else if (board[newRow][newCol] !== 0) {
                            blockedEnd = 1;
                            break;
                        } else {
                            // 遇到空格
                            if (i === 1) spaceStart = 1;
                            // 检查跳一格的情况
                            const nextRow = row + (i + 1) * dy;
                            const nextCol = col + (i + 1) * dx;
                            if (nextRow >= 0 && nextRow < BOARD_SIZE && nextCol >= 0 && nextCol < BOARD_SIZE && 
                                board[nextRow][nextCol] === player && i < 4) {
                                count++;
                                i++; // 跳过一格
                            }
                            break;
                        }
                    } else {
                        blockedEnd = 1;
                        break;
                    }
                }
                
                // 反向检查
                for (let i = 1; i < 6; i++) {
                    const newRow = row - i * dy;
                    const newCol = col - i * dx;
                    
                    if (
                        newRow >= 0 && newRow < BOARD_SIZE &&
                        newCol >= 0 && newCol < BOARD_SIZE
                    ) {
                        if (board[newRow][newCol] === player) {
                            count++;
                        } else if (board[newRow][newCol] !== 0) {
                            blockedStart = 1;
                            break;
                        } else {
                            // 遇到空格
                            if (i === 1) spaceEnd = 1;
                            // 检查跳一格的情况
                            const nextRow = row - (i + 1) * dy;
                            const nextCol = col - (i + 1) * dx;
                            if (nextRow >= 0 && nextRow < BOARD_SIZE && nextCol >= 0 && nextCol < BOARD_SIZE && 
                                board[nextRow][nextCol] === player && i < 4) {
                                count++;
                                i++; // 跳过一格
                            }
                            break;
                        }
                    } else {
                        blockedStart = 1;
                        break;
                    }
                }
                
                const blocked = blockedStart + blockedEnd;
                const openEnds = 2 - blocked;
                
                // 增强版评分系统
                if (count >= 5) {
                    score += 1000000; // 五子连珠 - 最高优先级
                } else if (count === 4) {
                    if (blocked === 0) score += 50000;  // 活四
                    else if (blocked === 1) score += 1000; // 冲四
                } else if (count === 3) {
                    if (blocked === 0) score += 5000;   // 活三
                    else if (blocked === 1) score += 100; // 睡三
                } else if (count === 2) {
                    if (blocked === 0) score += 500;    // 活二
                    else if (blocked === 1) score += 50;  // 睡二
                } else if (count === 1 && openEnds === 2) {
                    score += 10; // 单活子
                }
                
                // 额外奖励：连续性和开放性
                if (openEnds === 2 && count >= 2) {
                    score += count * 20; // 两端开放的奖励
                }
            }
            
            // 中心位置奖励
            const center = Math.floor(BOARD_SIZE / 2);
            const distanceToCenter = Math.abs(row - center) + Math.abs(col - center);
            const centerBonus = Math.max(0, (10 - distanceToCenter) * 5);
            score += centerBonus;
            
            // 边角惩罚（边角位置通常不太理想）
            if ((row === 0 || row === BOARD_SIZE - 1) && (col === 0 || col === BOARD_SIZE - 1)) {
                score -= 20; // 四个角落
            } else if (row === 0 || row === BOARD_SIZE - 1 || col === 0 || col === BOARD_SIZE - 1) {
                score -= 10; // 边缘位置
            }
            
            return score;
        }
        
        // 获取位置评分（中心位置评分更高）
        function getPositionScore(row, col) {
            const center = Math.floor(BOARD_SIZE / 2);
            const distanceToCenter = Math.abs(row - center) + Math.abs(col - center);
            
            // 中心位置评分最高，向外递减
            if (distanceToCenter <= 2) {
                return 15; // 中心区域
            } else if (distanceToCenter <= 4) {
                return 10; // 中间区域
            } else if (distanceToCenter <= 6) {
                return 5;  // 外围区域
            } else {
                return 2;  // 边缘区域
            }
        }
        
        // 根据启发式函数对移动进行排序
        function sortMovesByHeuristic(moves, aiColor, opponentColor) {
            const scoredMoves = moves.map(move => {
                const row = move.row;
                const col = move.col;
                
                // 计算启发式分数
                let heuristicScore = 0;
                
                // 位置评分
                heuristicScore += getPositionScore(row, col) * 2;
                
                // 评估该位置的进攻潜力
                board[row][col] = aiColor;
                const attackScore = evaluatePosition(row, col, aiColor);
                
                // 评估该位置的防守潜力
                board[row][col] = opponentColor;
                const defendScore = evaluatePosition(row, col, opponentColor);
                
                // 恢复棋盘
                board[row][col] = 0;
                
                // 综合评分（偏向进攻）
                heuristicScore += attackScore * 1.5 + defendScore * 1.2;
                
                return {
                    row: row,
                    col: col,
                    score: heuristicScore
                };
            });
            
            // 按分数降序排序
            scoredMoves.sort((a, b) => b.score - a.score);
            
            // 返回排序后的移动
            return scoredMoves.map(move => ({ row: move.row, col: move.col }));
        }
        
        // 战略性随机移动（优先选择中心区域）
        function getStrategicRandomMove() {
            const center = Math.floor(BOARD_SIZE / 2);
            const emptyCells = [];
            
            // 按距离中心的远近分类空位
            const closeMoves = []; // 靠近中心的移动
            const farMoves = [];   // 远离中心的移动
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] === 0) {
                        const distanceToCenter = Math.abs(row - center) + Math.abs(col - center);
                        
                        if (distanceToCenter <= 4) {
                            closeMoves.push({ row, col });
                        } else {
                            farMoves.push({ row, col });
                        }
                    }
                }
            }
            
            // 优先选择靠近中心的位置，但不完全排除边缘位置
            if (closeMoves.length > 0 && Math.random() > 0.3) {
                const randomIndex = Math.floor(Math.random() * closeMoves.length);
                return closeMoves[randomIndex];
            } else if (farMoves.length > 0) {
                const randomIndex = Math.floor(Math.random() * farMoves.length);
                return farMoves[randomIndex];
            } else if (closeMoves.length > 0) {
                const randomIndex = Math.floor(Math.random() * closeMoves.length);
                return closeMoves[randomIndex];
            }
            
            // 如果没有有效移动，返回null
            return null;
        }
        
        // 更新状态显示
        function updateStatus() {
            if (gameOver) {
                statusDisplay.textContent = '游戏结束';
            } else if (currentPlayer === playerColor) {
                const playerColorName = playerColor === 1 ? '黑子' : '白子';
                statusDisplay.textContent = `您的回合 (${playerColorName})`;
            } else {
                const aiColorName = playerColor === 1 ? '白子' : '黑子';
                statusDisplay.textContent = `AI思考中... (${aiColorName})`;
            }
        }
        
        // 显示胜利消息
        function showWinMessage(message) {
            winMessage.textContent = message;
            gameStats.textContent = `胜: ${wins} | 负: ${losses} | 平: ${draws}`;
            winModal.style.display = 'flex';
        }
        
        // 悔棋
        function undoMove() {
            if (gameHistory.length >= 2) {
                // 撤销AI和玩家的最后两步
                for (let i = 0; i < 2; i++) {
                    if (gameHistory.length > 0) {
                        const lastMove = gameHistory.pop();
                        board[lastMove.row][lastMove.col] = 0;
                    }
                }
                
                // 更新lastOpponentMove为新的最后一步（如果存在）
                if (gameHistory.length > 0) {
                    const lastMove = gameHistory[gameHistory.length - 1];
                    // 如果最后一步是AI的（与玩家颜色不同），则记录为对手的最后一步
                    if (lastMove.player !== playerColor) {
                        lastOpponentMove = { row: lastMove.row, col: lastMove.col };
                    } else {
                        // 如果最后一步是玩家的，清除对手最后一步记录
                        lastOpponentMove = null;
                    }
                } else {
                    // 没有历史记录了，清除对手最后一步记录
                    lastOpponentMove = null;
                }
                
                // 恢复到玩家的回合
                currentPlayer = playerColor;
                gameOver = false;
                drawBoard();
                updateStatus();
            }
        }
        
        // 提示
        function showHint() {
            if (gameOver || currentPlayer !== playerColor) return;
            
            // 使用增强版评估找到最佳位置
            let bestScore = -1;
            let bestMove = null;
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col] === 0) {
                        const score = evaluatePosition(row, col, playerColor);
                        if (score > bestScore) {
                            bestScore = score;
                            bestMove = { row, col };
                        }
                    }
                }
            }
            
            if (bestMove) {
                // 在提示位置绘制一个半透明的棋子
                const x = PADDING + bestMove.col * CELL_SIZE;
                const y = PADDING + bestMove.row * CELL_SIZE;
                
                ctx.globalAlpha = 0.5;
                ctx.beginPath();
                ctx.arc(x, y, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
                if (playerColor === 1) {
                    ctx.fillStyle = '#000'; // 黑子
                } else {
                    ctx.fillStyle = '#fff'; // 白子
                }
                ctx.fill();
                ctx.globalAlpha = 1.0;
                
                // 2秒后清除提示
                setTimeout(() => {
                    drawBoard();
                }, 2000);
            }
        }
        
        // 获取触摸或鼠标位置
        function getEventPosition(e) {
            const rect = canvas.getBoundingClientRect();
            let x, y;
            
            if (e.touches && e.touches.length > 0) {
                // 触摸事件
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                // 鼠标事件
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }
            
            return { x, y };
        }
        
        // 处理点击/触摸事件
        function handleCanvasClick(e) {
            if (gameOver || currentPlayer !== playerColor) return;
            
            const { x, y } = getEventPosition(e);
            
            // 转换为棋盘坐标
            const col = Math.round((x - PADDING) / CELL_SIZE);
            const row = Math.round((y - PADDING) / CELL_SIZE);
            
            if (
                row >= 0 && row < BOARD_SIZE &&
                col >= 0 && col < BOARD_SIZE
            ) {
                playerMove(col, row);
            }
        }
        
        // 事件监听器
        canvas.addEventListener('click', handleCanvasClick);
        
        // 触摸事件支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 防止页面滚动
            handleCanvasClick(e);
        });
        
        // 窗口大小改变时重新调整棋盘
        window.addEventListener('resize', () => {
            adjustBoardSize();
            drawBoard();
        });
        
        // 屏幕方向改变时重新调整
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                adjustBoardSize();
                drawBoard();
            }, 300); // 延迟处理以确保尺寸正确
        });
        
        // 防止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        
        // 防止页面缩放
        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });
        
        document.addEventListener('gesturechange', function (e) {
            e.preventDefault();
        });
        
        document.addEventListener('gestureend', function (e) {
            e.preventDefault();
        });
        
        newGameBtn.addEventListener('click', initGame);
        undoBtn.addEventListener('click', undoMove);
        hintBtn.addEventListener('click', showHint);
        playAgainBtn.addEventListener('click', initGame);
        
        // 难度和颜色选择器事件监听
        difficultySelect.addEventListener('change', initGame);
        colorSelector.addEventListener('change', initGame);
        
        // 初始化游戏
        initGame();
    </script>
