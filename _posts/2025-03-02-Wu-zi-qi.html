<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋游戏</title>
    <style>
        :root {
            --board-size: min(90vw, 450px);
            --grid-size: calc(var(--board-size) / 15);
        }
        body {
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            background: #f7f3eb;
        }
        .wuziqidiv {
            overflow: hidden;
            padding: 15px;
            background: linear-gradient(45deg, #f3e4c6, #e7d5b7);
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin: 0 auto;
            max-width: var(--board-size);
            animation: boardAppear 0.6s ease-out;
        }
        canvas {
            display: block;
            width: var(--board-size);
            height: var(--board-size);
            cursor: pointer;
            border: none;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(189,146,93,0.25);
            background: linear-gradient(to right bottom, #f9f3e7, #f1e5d2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            touch-action: none;
        }
        canvas:active {
            transform: scale(0.98);
            box-shadow: 0 0 15px rgba(189,146,93,0.2);
        }
        .btn-wrap {
            display: flex;
            flex-direction: row;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
            padding: 0 10px;
        }
        .btn-wrap div {
            position: relative;
            overflow: hidden;
        }
        .btn-wrap div>span {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            color: #fff;
            background: linear-gradient(135deg, #ff7b29, #ff6500);
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(255,101,0,0.2);
            font-size: 0.95rem;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-wrap div>span:active {
            transform: translateY(1px);
            box-shadow: 0 2px 5px rgba(255,101,0,0.15);
        }
        @keyframes pieceAppear {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes boardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .wuziqidiv {
                padding: 10px;
            }
            .btn-wrap div>span {
                padding: 0.5rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="wuziqidiv">
        <canvas id="chess"></canvas>
    </div>
    <div class="btn-wrap" style="text-align:center!important;">
        <div id="restart" onclick="window.location.reload()">
            <span>重新开始</span>
        </div>
    </div>
    <script>
        var chess = document.getElementById('chess');
        var context = chess.getContext('2d');
        var me = true;
        var over = false;
        var chressBord = [];
        var wins = [];
        var count = 0;
        var myWin = [];
        var computerWin = [];
        var gesize = 15;

        chess.width = 450;
        chess.height = 450;

        for (var i = 0; i < gesize; i++) {
            chressBord[i] = [];
            for (var j = 0; j < gesize; j++) {
                chressBord[i][j] = 0;
            }
        }

        for (var i = 0; i < gesize; i++) {
            wins[i] = [];
            for (var j = 0; j < gesize; j++) {
                wins[i][j] = [];
            }
        }

        var count = 0;
        for (var i = 0; i < gesize; i++) {
            for (var j = 0; j < gesize - 4; j++) {
                for (var k = 0; k < 5; k++) {
                    wins[i][j + k][count] = true;
                }
                count++;
            }
        }

        for (var i = 0; i < gesize; i++) {
            for (var j = 0; j < gesize - 4; j++) {
                for (var k = 0; k < 5; k++) {
                    wins[j + k][i][count] = true;
                }
                count++;
            }
        }

        for (var i = 0; i < gesize - 4; i++) {
            for (var j = 0; j < gesize - 4; j++) {
                for (var k = 0; k < 5; k++) {
                    wins[i + k][j + k][count] = true;
                }
                count++;
            }
        }

        for (var i = 0; i < gesize - 4; i++) {
            for (var j = gesize - 1; j > 3; j--) {
                for (var k = 0; k < 5; k++) {
                    wins[i + k][j - k][count] = true;
                }
                count++;
            }
        }

        for (var i = 0; i < count; i++) {
            myWin[i] = 0;
            computerWin[i] = 0;
        }

        context.strokeStyle = '#bd925d';

        var drawChessBoard = function() {
            const size = chess.width;
            const gridSize = size / 15;
            const padding = gridSize / 2;
            
            context.lineWidth = 1;
            context.strokeStyle = 'rgba(189,146,93,0.8)';
            
            // 绘制棋盘背景
            context.fillStyle = 'rgba(243,228,198,0.5)';
            context.fillRect(0, 0, size, size);
            
            // 绘制网格线
            for (var i = 0; i < gesize; i++) {
                context.beginPath();
                context.moveTo(padding + i * gridSize, padding);
                context.lineTo(padding + i * gridSize, size - padding);
                context.moveTo(padding, padding + i * gridSize);
                context.lineTo(size - padding, padding + i * gridSize);
                context.stroke();
                context.closePath();
            }
            
            // 绘制棋盘中心点
            context.beginPath();
            context.arc(225, 225, 4, 0, 2 * Math.PI);
            context.fillStyle = 'rgba(189,146,93,0.8)';
            context.fill();
            context.closePath();
        };

        var oneStep = function(i, j, me) {
            const size = chess.width;
            const gridSize = size / 15;
            const padding = gridSize / 2;
            const pieceSize = gridSize * 0.4;
            
            const x = padding + i * gridSize;
            const y = padding + j * gridSize;
            
            // 绘制阴影
            context.save();
            context.shadowColor = 'rgba(0,0,0,0.3)';
            context.shadowBlur = 3;
            context.shadowOffsetX = 2;
            context.shadowOffsetY = 2;
            
            context.beginPath();
            context.arc(x, y, pieceSize, 0, 2 * Math.PI);
            context.closePath();
            
            // 创建渐变
            var gradient = context.createRadialGradient(
                x + pieceSize/3, y - pieceSize/3,
                pieceSize,
                x + pieceSize/3, y - pieceSize/3,
                0
            );
            
            if (me) {
                gradient.addColorStop(0, '#0A0A0A');
                gradient.addColorStop(1, '#636766');
            } else {
                gradient.addColorStop(0, '#D1D1D1');
                gradient.addColorStop(1, '#F9F9F9');
            }
            
            context.fillStyle = gradient;
            context.fill();
            
            // 添加高光效果
            context.beginPath();
            context.arc(
                x - pieceSize/3,
                y - pieceSize/3,
                pieceSize/4,
                0,
                2 * Math.PI
            );
            context.fillStyle = me ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.3)';
            context.fill();
            
            context.restore();
            
            // 添加落子动画
            context.save();
            context.globalAlpha = 0;
            let opacity = 0;
            const animate = () => {
                opacity += 0.1;
                context.globalAlpha = opacity;
                if (opacity < 1) {
                    requestAnimationFrame(animate);
                }
            };
            animate();
            context.restore();
        };

        var computerAI = function() {
            var myScore = [];
            var computerScore = [];
            var max = 0;
            var u = 0, v = 0;
            for (var i = 0; i < gesize; i++) {
                myScore[i] = [];
                computerScore[i] = [];
                for (var j = 0; j < gesize; j++) {
                    myScore[i][j] = 0;
                    computerScore[i][j] = 0;
                }
            }
            for (var i = 0; i < gesize; i++) {
                for (var j = 0; j < gesize; j++) {
                    if (chressBord[i][j] == 0) {
                        for (var k = 0; k < count; k++) {
                            if (wins[i][j][k]) {
                                if (myWin[k] == 1) {
                                    myScore[i][j] += 200;
                                } else if (myWin[k] == 2) {
                                    myScore[i][j] += 400;
                                } else if (myWin[k] == 3) {
                                    myScore[i][j] += 2000;
                                } else if (myWin[k] == 4) {
                                    myScore[i][j] += 10000;
                                }
                                if (computerWin[k] == 1) {
                                    computerScore[i][j] += 220;
                                } else if (computerWin[k] == 2) {
                                    computerScore[i][j] += 420;
                                } else if (computerWin[k] == 3) {
                                    computerScore[i][j] += 2100;
                                } else if (computerWin[k] == 4) {
                                    computerScore[i][j] += 20000;
                                }
                            }
                        }
                        if (myScore[i][j] > max) {
                            max = myScore[i][j];
                            u = i;
                            v = j;
                        } else if (myScore[i][j] == max) {
                            if (computerScore[i][j] > computerScore[u][v]) {
                                u = i;
                                v = j;
                            }
                        }
                        if (computerScore[i][j] > max) {
                            max = computerScore[i][j];
                            u = i;
                            v = j;
                        } else if (computerScore[i][j] == max) {
                            if (myScore[i][j] > myScore[u][v]) {
                                u = i;
                                v = j;
                            }
                        }
                    }
                }
            }
            oneStep(u, v, false);
            chressBord[u][v] = 2;
            for (var k = 0; k < count; k++) {
                if (wins[u][v][k]) {
                    computerWin[k]++;
                    myWin[k] = 6;
                    if (computerWin[k] == 5) {
                        alert('很遗憾，你输了！');
                        over = true;
                    }
                }
            }
            if (!over) {
                me = !me;
            }
        };

        function handleMove(e) {
            if (over || !me) return;
            
            // 获取触摸/点击位置
            const rect = chess.getBoundingClientRect();
            const size = chess.width;
            const gridSize = size / 15;
            const padding = gridSize / 2;
            
            let x, y;
            if (e.type.startsWith('touch')) {
                const touch = e.touches[0] || e.changedTouches[0];
                x = touch.clientX - rect.left;
                y = touch.clientY - rect.top;
            } else {
                x = e.offsetX;
                y = e.offsetY;
            }
            
            // 计算棋盘格位置
            const i = Math.floor((x - padding + gridSize/2) / gridSize);
            const j = Math.floor((y - padding + gridSize/2) / gridSize);
            
            // 确保在有效范围内
            if (i < 0 || i >= gesize || j < 0 || j >= gesize) return;
            
            if (chressBord[i][j] == 0) {
                oneStep(i, j, me);
                chressBord[i][j] = 1;
                
                for (var k = 0; k < count; k++) {
                    if (wins[i][j][k]) {
                        myWin[k]++;
                        computerWin[k] = 6;
                        if (myWin[k] == 5) {
                            setTimeout(() => {
                                alert('恭喜你赢了！');
                                over = true;
                            }, 100);
                        }
                    }
                }
                
                if (!over) {
                    me = !me;
                    setTimeout(computerAI, 300); // 添加延迟使移动更自然
                }
            }
        }
        
        // 添加触摸和鼠标事件监听
        chess.addEventListener('touchstart', handleMove, { passive: true });
        chess.addEventListener('click', handleMove);
        
        // 防止触摸滚动
        chess.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        drawChessBoard();
    </script>
</body>
</html>
