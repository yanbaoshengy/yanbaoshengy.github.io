    <script>
        const BOARD_SIZE = 15;
        const EMPTY = 0;
        const BLACK = 1;
        const WHITE = 2;

        let board = [];
        let currentPlayer = BLACK;
        let gameOver = false;
        let moveHistory = [];
        let gameMode = 'pvp';
        let aiDifficulty = 'hard';
        let aiColor = WHITE;
        let aiThinking = false;
        let firstMovePreference = 'player';
        
        let zobristTable = {};
        let killerMoves = [];
        let historyTable = {};
        let transpositionTable = {};
        let nodesSearched = 0;
        let searchStartTime = 0;
        let searchTimeLimit = 5000;
        
        const ELITE_AI_CONFIG = {
            searchDepth: 8,
            candidateRange: 3,
            searchTime: 8000,
            useTranspositionTable: true,
            useIterativeDeepening: true,
            useNullMovePruning: true,
            useFutilityPruning: true,
            useLateMoveReduction: true,
            useAspirationWindows: true,
            aspirationWindow: 80,
            useSingularExtensions: true,
            useLateMovePruning: true,
            lateMoveReductionDepth: 5,
            futilityMargin: 500,
            nullMoveReduction: 2,
            useQuiescenceSearch: true,
            quiescenceDepth: 3,
            useMoveCountPruning: true,
            useStandPatPruning: true,
            standPatMargin: 5000
        };
        
        function initAITables() {
            zobristTable = {};
            transpositionTable = {};
            killerMoves = [];
            historyTable = {};
            for (let i = 0; i < 30; i++) {
                killerMoves[i] = [null, null];
            }
        }
        
        function getZobristHash(boardState) {
            let hash = 0;
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] !== EMPTY) {
                        const idx = boardState[i][j] === BLACK ? 0 : 1;
                        if (!zobristTable[i]) zobristTable[i] = [];
                        if (!zobristTable[i][j]) zobristTable[i][j] = [0, 0];
                        if (zobristTable[i][j][idx] === 0) {
                            zobristTable[i][j][idx] = Math.floor(Math.random() * 0xFFFFFFFF);
                        }
                        hash ^= zobristTable[i][j][idx];
                    }
                }
            }
            return hash;
        }
        
        function getTranspositionTable(hash, depth, alpha, beta) {
            const entry = transpositionTable[hash];
            if (entry && entry.depth >= depth) {
                if (entry.flag === 'exact') return entry.score;
                if (entry.flag === 'lower' && entry.score >= beta) return entry.score;
                if (entry.flag === 'upper' && entry.score <= alpha) return entry.score;
            }
            return null;
        }
        
        function setTranspositionTable(hash, depth, score, flag) {
            if (!ELITE_AI_CONFIG.useTranspositionTable) return;
            if (!transpositionTable[hash] || transpositionTable[hash].depth < depth) {
                transpositionTable[hash] = { depth, score, flag };
            }
        }
        
        function recordKillerMove(depth, move) {
            if (depth < killerMoves.length) {
                if (killerMoves[depth][0] && 
                    killerMoves[depth][0].row === move.row && 
                    killerMoves[depth][0].col === move.col) return;
                killerMoves[depth][1] = killerMoves[depth][0];
                killerMoves[depth][0] = move;
            }
        }
        
        function recordHistoryMove(move, depth) {
            const key = `${move.row},${move.col}`;
            if (!historyTable[key]) historyTable[key] = 0;
            historyTable[key] += 1 << depth;
        }
        
        function getHistoryScore(move) {
            const key = `${move.row},${move.col}`;
            return historyTable[key] || 0;
        }

        const PATTERN_WEIGHTS = {
            five: 100000,
            liveFour: 10000,
            jumpFour: 5000,
            sleepFour: 1000,
            liveThree: 500,
            jumpThree: 200,
            sleepThree: 100,
            liveTwo: 50,
            jumpTwo: 20,
            sleepTwo: 10,
            liveOne: 2,
            center: 5,
            mobility: 0.1,
            flexibility: 0.5,
            threat: 2000
        };

        let patternLearningData = {
            commonPatterns: {},
            successfulMoves: {},
            positionalScores: {},
            gameCount: 0,
            winCount: 0
        };

        function analyzePositionNeural(boardState, player) {
            const opponent = player === BLACK ? WHITE : BLACK;
            let totalScore = 0;
            
            const myPatterns = analyzePatternsAdvanced(boardState, player);
            const oppPatterns = analyzePatternsAdvanced(boardState, opponent);
            
            totalScore += myPatterns.score * PATTERN_WEIGHTS.five;
            totalScore -= oppPatterns.score * PATTERN_WEIGHTS.five * 1.08;
            
            if (myPatterns.patterns.five > 0) totalScore += PATTERN_WEIGHTS.five * 2;
            if (oppPatterns.patterns.five > 0) totalScore -= PATTERN_WEIGHTS.five * 2;
            
            const fourThreats = countThreats(boardState, player, 4);
            const oppFourThreats = countThreats(boardState, opponent, 4);
            totalScore += fourThreats * PATTERN_WEIGHTS.threat * 1.5;
            totalScore -= oppFourThreats * PATTERN_WEIGHTS.threat * 1.8;
            
            const threeThreats = countThreats(boardState, player, 3);
            const oppThreeThreats = countThreats(boardState, opponent, 3);
            totalScore += threeThreats * PATTERN_WEIGHTS.liveThree * 0.8;
            totalScore -= oppThreeThreats * PATTERN_WEIGHTS.liveThree * 1.0;
            
            const doubleThreat = detectDoubleThreat(boardState, player);
            const oppDoubleThreat = detectDoubleThreat(boardState, opponent);
            if (doubleThreat) totalScore += 50000;
            if (oppDoubleThreat) totalScore -= 60000;
            
            const bridgeThreat = detectBridgeThreat(boardState, player);
            const oppBridgeThreat = detectBridgeThreat(boardState, opponent);
            if (bridgeThreat) totalScore += 30000;
            if (oppBridgeThreat) totalScore -= 35000;
            
            const tripleThreat = detectTripleThreat(boardState, player);
            const oppTripleThreat = detectTripleThreat(boardState, opponent);
            if (tripleThreat) totalScore += 100000;
            if (oppTripleThreat) totalScore -= 120000;
            
            const forkThreat = detectForkThreat(boardState, player);
            const oppForkThreat = detectForkThreat(boardState, opponent);
            if (forkThreat) totalScore += 45000;
            if (oppForkThreat) totalScore -= 55000;
            
            const myBrokenFour = detectBrokenFour(boardState, player);
            const oppBrokenFour = detectBrokenFour(boardState, opponent);
            totalScore += myBrokenFour * PATTERN_WEIGHTS.threat * 1.2;
            totalScore -= oppBrokenFour * PATTERN_WEIGHTS.threat * 1.5;
            
            const myOverline = detectOverline(boardState, player);
            const oppOverline = detectOverline(boardState, opponent);
            if (myOverline) totalScore += 80000;
            if (oppOverline) totalScore -= 90000;
            
            const threatChainScore = detectThreatChain(boardState, player);
            const oppThreatChainScore = detectThreatChain(boardState, opponent);
            totalScore += threatChainScore * 0.5;
            totalScore -= oppThreatChainScore * 0.6;
            
            const criticalThreats = detectCriticalThreats(boardState, player);
            const oppCriticalThreats = detectCriticalThreats(boardState, opponent);
            totalScore += criticalThreats * 0.8;
            totalScore -= oppCriticalThreats * 1.0;
            
            const mobilityScore = evaluateMobilityAdvanced(boardState, player);
            totalScore += mobilityScore * PATTERN_WEIGHTS.mobility * 2;
            
            const flexibilityScore = evaluateFlexibilityAdvanced(boardState, player);
            totalScore += flexibilityScore * PATTERN_WEIGHTS.flexibility * 2;
            
            const controlScore = evaluateControl(boardState, player);
            totalScore += controlScore * 10;
            
            const connectionScore = evaluateConnection(boardState, player);
            totalScore += connectionScore * PATTERN_WEIGHTS.liveTwo * 0.5;
            
            const shapeScore = evaluateShape(boardState, player);
            totalScore += shapeScore * 100;
            
            const learnedBonus = evaluateLearnedPatterns(boardState, player);
            totalScore += learnedBonus;
            
            return totalScore;
        }

        function detectDoubleThreat(boardState, player) {
            const opponent = player === BLACK ? WHITE : BLACK;
            const threats = [];
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === player) {
                        for (const [dr, dc] of DIRECTIONS) {
                            const pattern = analyzeDirectionAdvanced(boardState, i, j, dr, dc, player);
                            if (pattern.type === 'liveThree' || pattern.type === 'jumpThree') {
                                threats.push({ row: i, col: j, dr, dc, type: pattern.type });
                            }
                        }
                    }
                }
            }
            
            for (let i = 0; i < threats.length; i++) {
                for (let j = i + 1; j < threats.length; j++) {
                    const t1 = threats[i];
                    const t2 = threats[j];
                    if (t1.type === 'liveThree' && t2.type === 'liveThree') {
                        const dist = Math.abs((t1.row + t1.col) - (t2.row + t2.col));
                        if (dist >= 4 && isIndependentThreats(boardState, t1, t2, player)) {
                            return true;
                        }
                    }
                }
            }
            
            return false;
        }

        function detectBridgeThreat(boardState, player) {
            const opponent = player === BLACK ? WHITE : BLACK;
            let bridgeCount = 0;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === player) {
                        for (const [dr, dc] of DIRECTIONS) {
                            const bridge = checkBridge(boardState, i, j, dr, dc, player);
                            if (bridge) bridgeCount++;
                        }
                    }
                }
            }
            
            return bridgeCount >= 2;
        }

        function checkBridge(boardState, row, col, dr, dc, player) {
            const opponent = player === BLACK ? WHITE : BLACK;
            
            let count = 0;
            let spaces = 0;
            
            for (let i = 1; i <= 4; i++) {
                const r = row + i * dr;
                const c = col + i * dc;
                if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) break;
                if (boardState[r][c] === player) count++;
                else if (boardState[r][c] === EMPTY) { spaces++; break; }
                else break;
            }
            
            for (let i = 1; i <= 4; i++) {
                const r = row - i * dr;
                const c = col - i * dc;
                if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) break;
                if (boardState[r][c] === player) count++;
                else if (boardState[r][c] === EMPTY) { spaces++; break; }
                else break;
            }
            
            return count === 2 && spaces === 2;
        }

        function detectTripleThreat(boardState, player) {
            const opponent = player === BLACK ? WHITE : BLACK;
            const threats = [];
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === player) {
                        for (const [dr, dc] of DIRECTIONS) {
                            const pattern = analyzeDirectionAdvanced(boardState, i, j, dr, dc, player);
                            if (pattern.type === 'liveThree' || pattern.type === 'jumpThree') {
                                threats.push({ row: i, col: j, dr, dc, type: pattern.type });
                            }
                        }
                    }
                }
            }
            
            const liveThreeThreats = threats.filter(t => t.type === 'liveThree');
            const combinations = [];
            
            for (let i = 0; i < liveThreeThreats.length; i++) {
                for (let j = i + 1; j < liveThreeThreats.length; j++) {
                    for (let k = j + 1; k < liveThreeThreats.length; k++) {
                        const t1 = liveThreeThreats[i];
                        const t2 = liveThreeThreats[j];
                        const t3 = liveThreeThreats[k];
                        
                        if (isIndependentThreats(boardState, t1, t2, player) &&
                            isIndependentThreats(boardState, t1, t3, player) &&
                            isIndependentThreats(boardState, t2, t3, player)) {
                            return true;
                        }
                    }
                }
            }
            
            return false;
        }

        function detectForkThreat(boardState, player) {
            const opponent = player === BLACK ? WHITE : BLACK;
            let forkCount = 0;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === EMPTY) {
                        boardState[i][j] = player;
                        const patterns = analyzePatternsAdvanced(boardState, player);
                        
                        const liveThreeCount = patterns.patterns.liveThree + patterns.patterns.jumpThree;
                        const liveFourCount = patterns.patterns.liveFour + patterns.patterns.jumpFour;
                        
                        if (liveThreeCount >= 2 || (liveThreeCount >= 1 && liveFourCount >= 1)) {
                            forkCount++;
                        }
                        
                        boardState[i][j] = EMPTY;
                        
                        if (forkCount >= 2) return true;

        function detectOverline(boardState, player) {

                    if (boardState[i][j] === player) {
                        for (const [dr, dc] of DIRECTIONS) {

                                if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) { blocked = true; break; }
                                if (boardState[r][c] === opponent) { blocked = true; break; }
                                if (boardState[r][c] === player) count++;
                                else break;
                            }
                            
                            if (!blocked && count >= 6) return true;
                            
                            blocked = false;
                            for (let len = 1; len <= 6; len++) {
                                const r = i - len * dr;
                                const c = j - len * dc;

                                if (boardState[r][c] === opponent) { blocked = true; break; }

        function evaluateConnection(boardState, player) {

                    if (dist <= 3) {

                        const midCol = Math.floor((p1.col + p2.col) / 2);
                        if (boardState[midRow][midCol] === EMPTY || 
                            (midRow === p1.row && midCol === p1.col) ||
                            (midRow === p2.row && midCol === p2.col)) {
                            myConnections += (4 - dist);

                }

            let oppConnections = 0;

                            (midRow === p2.row && midCol === p2.col)) {
                            oppConnections += (4 - dist);
                        }

            }
            
            connection = myConnections - oppConnections * 1.2;

        function evaluateShape(boardState, player) {

        function evaluateLearnedPatterns(boardState, player) {

        function analyzePatternsAdvanced(boardState, player) {
            let score = 0;
            const patterns = {
                five: 0,
                liveFour: 0,
                jumpFour: 0,
                sleepFour: 0,
                liveThree: 0,
                jumpThree: 0,
                sleepThree: 0,
                liveTwo: 0,
                jumpTwo: 0,
                sleepTwo: 0,
                liveOne: 0
            };
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === player) {
                        for (const [dr, dc] of DIRECTIONS) {
                            const pattern = analyzeDirectionAdvanced(boardState, i, j, dr, dc, player);
                            switch (pattern.type) {
                                case 'five': patterns.five++; score += SCORES.FIVE; break;
                                case 'liveFour': patterns.liveFour++; score += SCORES.LIVE_FOUR; break;
                                case 'jumpFour': patterns.jumpFour++; score += SCORES.JUMP_FOUR; break;
                                case 'sleepFour': patterns.sleepFour++; score += SCORES.SLEEP_FOUR; break;
                                case 'liveThree': patterns.liveThree++; score += SCORES.LIVE_THREE; break;
                                case 'jumpThree': patterns.jumpThree++; score += SCORES.JUMP_THREE; break;
                                case 'sleepThree': patterns.sleepThree++; score += SCORES.SLEEP_THREE; break;
                                case 'liveTwo': patterns.liveTwo++; score += SCORES.LIVE_TWO; break;
                                case 'jumpTwo': patterns.jumpTwo++; score += SCORES.JUMP_TWO; break;
                                case 'sleepTwo': patterns.sleepTwo++; score += SCORES.SLEEP_TWO; break;
                                case 'liveOne': patterns.liveOne++; score += SCORES.LIVE_ONE; break;
                            }
                        }
                    }
                }
            }
            
            return { score, patterns };
        }

        function analyzeDirectionAdvanced(boardState, row, col, dr, dc, player) {
            const opponent = player === BLACK ? WHITE : BLACK;
            
            const cells = [];
            for (let i = -5; i <= 5; i++) {
                const r = row + i * dr;
                const c = col + i * dc;
                if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE) {
                    cells.push(boardState[r][c]);
                } else {
                    cells.push(null);
                }
            }
            
            if (cells[5] !== player) return { type: 'none' };
            
            const lineStr = cells.map(c => {
                if (c === player) return '1';
                if (c === EMPTY) return '0';
                return '2';
            }).join('');
            
            let myCount = 0;
            for (let i = 0; i < lineStr.length; i++) {
                if (lineStr[i] === '1') myCount++;
            }
            
            if (myCount >= 5) return { type: 'five' };
            
            for (let i = 0; i < lineStr.length - 4; i++) {
                const window = lineStr.substring(i, i + 5);
                const counts = { '1': 0, '0': 0 };
                for (let j = 0; j < 5; j++) {
                    counts[window[j]] = (counts[window[j]] || 0) + 1;
                }
                
                if (counts['1'] === 4 && counts['0'] === 1) {
                    const before = i > 0 ? lineStr[i - 1] : null;
                    const after = i + 5 < lineStr.length ? lineStr[i + 5] : null;
                    
                    const beforeIsEmpty = before === null || before === '0';
                    const afterIsEmpty = after === null || after === '0';
                    
                    if (beforeIsEmpty && afterIsEmpty) {
                        return { type: 'liveFour' };
                    } else if (beforeIsEmpty || afterIsEmpty) {
                        return { type: 'jumpFour' };
                    } else {
                        return { type: 'sleepFour' };
                    }
                }
                
                if (counts['1'] === 3 && counts['0'] === 2) {
                    const before = i > 0 ? lineStr[i - 1] : null;
                    const after = i + 5 < lineStr.length ? lineStr[i + 5] : null;
                    
                    const beforeIsEmpty = before === null || before === '0';
                    const afterIsEmpty = after === null || after === '0';
                    
                    if (beforeIsEmpty && afterIsEmpty) {
                        return { type: 'liveThree' };
                    } else if (beforeIsEmpty || afterIsEmpty) {
                        return { type: 'jumpThree' };
                    } else {
                        return { type: 'sleepThree' };
                    }
                }
                
                if (counts['1'] === 2 && counts['0'] === 3) {
                    const before = i > 0 ? lineStr[i - 1] : null;
                    const after = i + 5 < lineStr.length ? lineStr[i + 5] : null;
                    
                    const beforeIsEmpty = before === null || before === '0';
                    const afterIsEmpty = after === null || after === '0';
                    
                    if (beforeIsEmpty && afterIsEmpty) {
                        return { type: 'liveTwo' };
                    } else if (beforeIsEmpty || afterIsEmpty) {
                        return { type: 'jumpTwo' };
                    } else {
                        return { type: 'sleepTwo' };
                    }
                }
            }
            
            for (let i = 0; i < lineStr.length - 3; i++) {
                const window = lineStr.substring(i, i + 4);
                const counts = { '1': 0, '0': 0 };
                for (let j = 0; j < 4; j++) {
                    counts[window[j]] = (counts[window[j]] || 0) + 1;
                }
                
                if (counts['1'] === 2 && counts['0'] === 2) {
                    const before = i > 0 ? lineStr[i - 1] : null;
                    const after = i + 4 < lineStr.length ? lineStr[i + 4] : null;
                    
                    const beforeIsEmpty = before === null || before === '0';
                    const afterIsEmpty = after === null || after === '0';
                    
                    if (beforeIsEmpty && afterIsEmpty) {
                        return { type: 'liveTwo' };
                    }
                }
            }
            
            for (let i = 0; i < lineStr.length - 5; i++) {
                const window = lineStr.substring(i, i + 6);
                const counts = { '1': 0, '0': 0 };
                for (let j = 0; j < 6; j++) {
                    counts[window[j]] = (counts[window[j]] || 0) + 1;
                }
                
                if (counts['1'] === 4 && counts['0'] === 2) {
                    const before = i > 0 ? lineStr[i - 1] : null;
                    const after = i + 6 < lineStr.length ? lineStr[i + 6] : null;
                    
                    const beforeIsEmpty = before === null || before === '0';
                    const afterIsEmpty = after === null || after === '0';
                    
                    if ((beforeIsEmpty || i === 0) && (afterIsEmpty || i + 6 >= lineStr.length)) {
                        return { type: 'liveThree' };
                    } else if (beforeIsEmpty || afterIsEmpty) {
                        return { type: 'jumpThree' };
                    }
                }
            }
            
            if (myCount >= 1) return { type: 'liveOne' };
            
            return { type: 'none' };
        }

        function countThreats(boardState, player, threatLevel) {
            let threatCount = 0;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === player) {
                        for (const [dr, dc] of DIRECTIONS) {
                            if (isThreat(boardState, i, j, dr, dc, player, threatLevel)) {
                                threatCount++;
                            }
                        }
                    }
                }
            }
            
            return threatCount;
        }

        function isThreat(boardState, row, col, dr, dc, player, level) {
            const opponent = player === BLACK ? WHITE : BLACK;
            let count = 1;
            let openEnds = 0;
            
            for (let dir = 1; dir <= 5; dir++) {
                const r = row + dir * dr;
                const c = col + dir * dc;
                if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) break;
                if (boardState[r][c] === opponent) break;
                if (boardState[r][c] === EMPTY) {
                    openEnds++;
                    break;
                }
                count++;
            }
            
            for (let dir = 1; dir <= 5; dir++) {
                const r = row - dir * dr;
                const c = col - dir * dc;
                if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) break;
                if (boardState[r][c] === opponent) break;
                if (boardState[r][c] === EMPTY) {
                    openEnds++;
                    break;
                }
                count++;
            }
            
            if (level === 4) return count >= 4 && openEnds >= 1;
            if (level === 3) return count >= 3 && openEnds >= 2;
            
            return false;
        }

        function evaluateMobility(boardState, player) {
            let mobility = 0;
            const opponent = player === BLACK ? WHITE : BLACK;
            const allMoves = getNeighborMoves(boardState, 2);
            
            for (const move of allMoves) {
                const original = boardState[move.row][move.col];
                boardState[move.row][move.col] = player;
                const patterns = analyzePatternsAdvanced(boardState, player);

                boardState[move.row][move.col] = original;

        }

        function evaluateFlexibility(boardState, player) {
            let flexibility = 0;
            const allMoves = getNeighborMoves(boardState, 2);
            
            for (const move of allMoves) {
                if (boardState[move.row][move.col] === EMPTY) {
                    for (const [dr, dc] of DIRECTIONS) {
                        let extension = 0;
                        for (let i = 1; i <= 4; i++) {
                            const r = move.row + i * dr;
                            const c = move.col + i * dc;
                            if (r < 0 || r >= BOARD_SIZE || c < 0 || c >= BOARD_SIZE) break;
                            if (boardState[r][c] === EMPTY) extension++;
                            else break;
                        }
                        flexibility += extension * 0.1;
                    }
                }
            }
            
            return flexibility;
        }

        function getNeighborMoves(boardState, distance) {
            const moves = [];
            const center = Math.floor(BOARD_SIZE / 2);
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] !== EMPTY) {
                        for (let di = -distance; di <= distance; di++) {
                            for (let dj = -distance; dj <= distance; dj++) {
                                const ni = i + di;
                                const nj = j + dj;
                                if (ni >= 0 && ni < BOARD_SIZE && nj >= 0 && nj < BOARD_SIZE &&
                                    boardState[ni][nj] === EMPTY) {
                                    const key = `${ni},${nj}`;
                                    if (!moves.some(m => `${m.row},${m.col}` === key)) {
                                        const distToCenter = Math.abs(ni - center) + Math.abs(nj - center);
                                        moves.push({ row: ni, col: nj, priority: distToCenter });
                                    }
                                }
                            }
                        }
                    }
                }
            }
            
            if (moves.length === 0) {
                return [{ row: center, col: center }];
            }
            
            return moves.sort((a, b) => a.priority - b.priority);
        }

        function detectEndgamePatterns(boardState, player) {
            const patterns = {
                doubleThreat: false,
                fork: false,
                blockedFour: false,
                semiOpenFour: false
            };
            
            const opponent = player === BLACK ? WHITE : BLACK;
            const threats = [];
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === player) {
                        for (const [dr, dc] of DIRECTIONS) {
                            const threat = analyzeDirectionAdvanced(boardState, i, j, dr, dc, player);
                            if (threat.type === 'liveThree' || threat.type === 'jumpThree') {
                                threats.push({ row: i, col: j, dr, dc, type: threat.type });
                            }
                        }
                    }
                }
            }
            
            let doubleThree = 0;
            for (let i = 0; i < threats.length; i++) {
                for (let j = i + 1; j < threats.length; j++) {
                    const t1 = threats[i];
                    const t2 = threats[j];
                    if (t1.type === 'liveThree' && t2.type === 'liveThree') {
                        if (isIndependentThreats(boardState, t1, t2, player)) {
                            doubleThree++;
                        }
                    }
                }
            }
            
            if (doubleThree >= 2) patterns.doubleThreat = true;
            if (doubleThree >= 2) patterns.fork = true;
            
            return patterns;
        }

        function isIndependentThreats(boardState, t1, t2, player) {
            const r1 = t1.row + 5 * t1.dr;
            const c1 = t1.col + 5 * t1.dc;
            const r2 = t2.row + 5 * t2.dr;
            const c2 = t2.col + 5 * t2.dc;
            
            return Math.abs(r1 - r2) > 1 || Math.abs(c1 - c2) > 1;
        }

        function learnFromGame(winner, moveHistory) {
            if (winner === null) return;
            
            patternLearningData.gameCount++;
            if (winner === aiColor) {
                patternLearningData.winCount++;
            }
            
            const learningFactor = 0.02;
            const maxLearningMoves = Math.min(8, moveHistory.length);
            
            for (let i = 0; i < maxLearningMoves; i++) {
                const moveIndex = moveHistory.length - 1 - i;
                const move = moveHistory[moveIndex];
                
                if (!move || move.player !== winner) continue;
                
                const key = `${move.row},${move.col}`;
                
                if (!patternLearningData.successfulMoves[key]) {
                    patternLearningData.successfulMoves[key] = { count: 0, wins: 0 };
                }
                patternLearningData.successfulMoves[key].count++;
                patternLearningData.successfulMoves[key].wins++;
                
                patternLearningData.commonPatterns[key] = (patternLearningData.commonPatterns[key] || 0) + learningFactor;
                
                for (const [dr, dc] of DIRECTIONS) {
                    const neighborKey = `${move.row + dr},${move.col + dc}`;
                    patternLearningData.positionalScores[neighborKey] = (patternLearningData.positionalScores[neighborKey] || 0) + learningFactor * 0.5;
                }
            }
            
            const learningRate = patternLearningData.winCount / Math.max(1, patternLearningData.gameCount);
            if (learningRate < 0.4) {
                for (const key in patternLearningData.commonPatterns) {
                    patternLearningData.commonPatterns[key] *= 0.99;
                }
            }
        }

        function getLearnedScore(row, col) {
            const key = `${row},${col}`;
            return patternLearningData.commonPatterns[key] || 0;
        }

        const SCORES = {

        const OPENING_BOOK = {

        function getOpeningBookMove(boardState, player) {
            const pieceCount = countPieces(boardState);
            
            if (pieceCount === 0 && player === BLACK) {
                const bestMove = OPENING_BOOK.firstMoves.reduce((best, move) => 
                    move.score > best.score ? move : best, { score: -1 });
                return { row: bestMove.row, col: bestMove.col, source: 'openingBook', type: 'first' };
            }
            
            if (pieceCount === 1) {
                const firstMove = findFirstMove(boardState);
                if (firstMove) {
                    const secondMoves = OPENING_BOOK.secondMoves;
                    for (const sm of secondMoves) {
                        const response = findRelativeMove(boardState, firstMove, sm.relative);
                        if (response) {
                            return { row: response.row, col: response.col, source: 'openingBook', type: 'second', pattern: sm.pattern };
                        }
                    }
                }
            }
            
            if (pieceCount >= 2) {
                const move = findMatchingOpening(boardState);
                if (move) {
                    return move;
                }
            }
            
            return null;
        }

        function countPieces(boardState) {
            let count = 0;
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] !== EMPTY) count++;
                }
            }
            return count;
        }

        function findFirstMove(boardState) {
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] !== EMPTY) {
                        return { row: i, col: j };
                    }
                }
            }
            return null;
        }

        function findRelativeMove(boardState, anchor, directions) {
            for (const [dr, dc] of directions) {
                const nr = anchor.row + dr;
                const nc = anchor.col + dc;
                if (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && 
                    boardState[nr][nc] === EMPTY) {
                    return { row: nr, col: nc };
                }
            }
            return null;
        }

        function findMatchingOpening(boardState) {
            const pieces = getPiecePositions(boardState);
            if (pieces.length < 2) return null;
            
            for (const opening of OPENING_BOOK.openings) {
                if (pieces.length < opening.moves.length) continue;
                
                let match = true;
                for (const [r, c] of opening.moves) {
                    const found = pieces.some(p => Math.abs(p.row - r) <= 1 && Math.abs(p.col - c) <= 1);
                    if (!found) {
                        match = false;
                        break;
                    }
                }
                
                if (match && opening.response) {
                    const anchor = pieces[pieces.length - 1];
                    const response = findRelativeMove(boardState, anchor, opening.response.map(r => [r[0], r[1]]));
                    if (response) {
                        return { row: response.row, col: response.col, source: 'openingBook', type: 'named', name: opening.name };
                    }
                }
            }
            
            return null;
        }

        function getPiecePositions(boardState) {
            const pieces = [];
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] !== EMPTY) {
                        pieces.push({ row: i, col: j, player: boardState[i][j] });
                    }
                }
            }
            return pieces;
        }

        function normalizePosition(pieces) {
            if (pieces.length === 0) return [];
            
            const minRow = Math.min(...pieces.map(p => p.row));
            const minCol = Math.min(...pieces.map(p => p.col));
            
            return pieces.map(p => ({
                row: p.row - minRow,
                col: p.col - minCol,
                player: p.player
            }));
        }

        function initBoard() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(EMPTY));
