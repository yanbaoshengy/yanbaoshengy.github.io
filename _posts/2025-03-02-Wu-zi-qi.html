        function getAIDepth() {
            const depthMap = { 'easy': 3, 'medium': 5, 'hard': 8 };
            return depthMap[aiDifficulty] || 8;
        }

        function countInDirectionFast(boardState, row, col, dr, dc, player) {
            let count = 0;
            let r = row + dr;
            let c = col + dc;
            while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && boardState[r][c] === player) {
                count++;
                r += dr;
                c += dc;
            }
            return count;
        }

        function checkWinFast(boardState, row, col) {
            const player = boardState[row][col];
            for (const [dr, dc] of DIRECTIONS) {
                if (countInDirectionFast(boardState, row, col, dr, dc, player) + 
                    countInDirectionFast(boardState, row, col, -dr, -dc, player) + 1 >= 5) {
                    return true;
                }
            }
            return false;
        }

        function getLineAnalysis(boardState, row, col, dr, dc, player) {
            let count = 0;
            let emptyHead = 0;
            let emptyTail = 0;
            let blockedHead = 0;
            let blockedTail = 0;
            
            let r = row - dr, c = col - dc;
            while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE) {
                if (boardState[r][c] === EMPTY) {
                    emptyHead++;
                    break;
                } else if (boardState[r][c] !== player) {
                    blockedHead++;
                    break;
                }
                count++;
                r -= dr;
                c -= dc;
            }
            
            r = row + dr, c = col + dc;
            while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE) {
                if (boardState[r][c] === EMPTY) {
                    emptyTail++;
                    break;
                } else if (boardState[r][c] !== player) {
                    blockedTail++;
                    break;
                }
                count++;
                r += dr;
                c += dc;
            }
            
            return { count, emptyHead, emptyTail, blockedHead, blockedTail };
        }

        function evaluateLinePattern(count, emptyHead, emptyTail, blockedHead, blockedTail) {
            const openEnds = (emptyHead > 0 ? 1 : 0) + (emptyTail > 0 ? 1 : 0);
            const isBlocked = blockedHead > 0 && blockedTail > 0;
            const isOneSideOpen = emptyHead > 0 || emptyTail > 0;
            const isJumpPattern = emptyHead > 0 && emptyTail > 0;
            
            if (count >= 5) return { score: SCORES.FIVE, type: 'FIVE' };
            
            if (count === 4) {
                if (openEnds === 2) {
                    if (isBlocked) {
                        return { score: SCORES.JUMP_FOUR, type: 'JUMP_FOUR' };
                    }
                    return { score: SCORES.LIVE_FOUR, type: 'LIVE_FOUR' };
                }
                if (openEnds === 1) return { score: SCORES.SLEEP_FOUR, type: 'SLEEP_FOUR' };
            }
            
            if (count === 3) {
                if (openEnds === 2) {
                    if (isBlocked) {
                        return { score: SCORES.JUMP_THREE, type: 'JUMP_THREE' };
                    }
                    return { score: SCORES.LIVE_THREE, type: 'LIVE_THREE' };
                }
                if (openEnds === 1) {
                    if (!isBlocked) return { score: SCORES.SLEEP_THREE, type: 'SLEEP_THREE' };
                }
            }
            
            if (count === 2) {
                if (openEnds === 2) {
                    if (isBlocked) {
                        return { score: SCORES.JUMP_TWO, type: 'JUMP_TWO' };
                    }
                    return { score: SCORES.LIVE_TWO, type: 'LIVE_TWO' };
                }
                if (openEnds === 1) return { score: SCORES.SLEEP_TWO, type: 'SLEEP_TWO' };
            }
            
            if (count === 1 && openEnds === 2) return { score: SCORES.LIVE_ONE, type: 'LIVE_ONE' };
            
            return { score: 0, type: 'NONE' };
        }

        function analyzePatterns(boardState, player) {
            let totalScore = 0;
            let patterns = { 
                four: 0, 
                jumpFour: 0,
                three: 0, 
                jumpThree: 0,
                two: 0,
                liveFour: 0,
                sleepFour: 0,
                liveThree: 0,
                jumpThreeCount: 0,
                sleepThree: 0,
                liveTwo: 0,
                jumpTwo: 0,
                sleepTwo: 0
            };
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === player) {
                        for (const [dr, dc] of DIRECTIONS) {
                            const analysis = getLineAnalysis(boardState, i, j, dr, dc, player);
                            if (analysis.count >= 2) {
                                const eval = evaluateLinePattern(
                                    analysis.count, 
                                    analysis.emptyHead, 
                                    analysis.emptyTail,
                                    analysis.blockedHead,
                                    analysis.blockedTail
                                );
                                totalScore += eval.score;
                                
                                if (eval.type === 'LIVE_FOUR') {
                                    patterns.four++;
                                    patterns.liveFour++;
                                }
                                if (eval.type === 'SLEEP_FOUR') {
                                    patterns.four++;
                                    patterns.sleepFour++;
                                }
                                if (eval.type === 'LIVE_THREE') {
                                    patterns.three++;
                                    patterns.liveThree++;
                                }
                                if (eval.type === 'SLEEP_THREE') {
                                    patterns.three++;
                                    patterns.sleepThree++;
                                }
                                if (eval.type === 'LIVE_TWO') {
                                    patterns.two++;
                                    patterns.liveTwo++;
                                }
                                if (eval.type === 'SLEEP_TWO') {
                                    patterns.two++;
                                    patterns.sleepTwo++;
                                }
                            }
                        }
                    }
                }
            }
            
            return { score: totalScore, patterns };
        }

        function evaluatePosition(boardState, player) {
            let score = 0;
            const opponent = player === BLACK ? WHITE : BLACK;
            
            const myEval = analyzePatterns(boardState, player);
            const oppEval = analyzePatterns(boardState, opponent);
            
            score += myEval.score;
            score -= oppEval.score;
            
            if (myEval.patterns.liveFour >= 1) {
                score += SCORES.LIVE_FOUR * 0.5;
            }
            if (myEval.patterns.sleepFour >= 1) {
                score += SCORES.SLEEP_FOUR * 0.3;
            }
            if (myEval.patterns.liveThree >= 2) {
                score += SCORES.LIVE_THREE * 0.5;
            }
            if (myEval.patterns.liveThree >= 1 && myEval.patterns.sleepFour >= 1) {
                score += SCORES.LIVE_FOUR * 0.8;
            }
            
            if (oppEval.patterns.liveFour >= 1) {
                score -= SCORES.LIVE_FOUR * 0.5;
            }
            if (oppEval.patterns.sleepFour >= 1) {
                score -= SCORES.SLEEP_FOUR * 0.3;
            }
            if (oppEval.patterns.liveThree >= 2) {
                score -= SCORES.LIVE_THREE * 0.5;
            }
            if (oppEval.patterns.liveThree >= 1 && oppEval.patterns.sleepFour >= 1) {
                score -= SCORES.LIVE_FOUR * 0.8;
            }
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === player) {
                        score += CENTER_WEIGHT[i][j] * 2;
                    }
                }
            }
            
            return score;
        }

        function getAllThreats(boardState, player) {
            const threats = [];
            const opponent = player === BLACK ? WHITE : BLACK;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === EMPTY) {
                        boardState[i][j] = player;
                        if (checkWinFast(boardState, i, j)) {
                            threats.push({ row: i, col: j, type: 'WIN' });
                        }
                        boardState[i][j] = EMPTY;
                        
                        boardState[i][j] = opponent;
                        const patterns = analyzePatterns(boardState, player);
                        boardState[i][j] = EMPTY;
                        
                        if (patterns.patterns.four > 0) {
                            threats.push({ row: i, col: j, type: 'FOUR' });
                        }
                        if (patterns.patterns.three > 0) {
                            threats.push({ row: i, col: j, type: 'THREE' });
                        }
                    }
                }
            }
            
            return threats;
        }

        function getCandidateMoves(boardState) {
            const candidates = new Set();
            const range = aiDifficulty === 'hard' ? 3 : 2;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] !== EMPTY) {
                        for (let di = -range; di <= range; di++) {
                            for (let dj = -range; dj <= range; dj++) {
                                const ni = i + di;
                                const nj = j + dj;
                                if (ni >= 0 && ni < BOARD_SIZE && nj >= 0 && nj < BOARD_SIZE && boardState[ni][nj] === EMPTY) {
                                    candidates.add(`${ni},${nj}`);
                                }
                            }
                        }
                    }
                }
            }
            
            if (candidates.size === 0) {
                return [{ row: 7, col: 7 }];
            }
            
            return Array.from(candidates).map(s => {
                const [row, col] = s.split(',').map(Number);
                return { row, col };
            });
        }

        function orderMoves(moves, boardState, player) {
            const scored = moves.map(m => {
                let score = 0;
                boardState[m.row][m.col] = player;
                
                const myEval = analyzePatterns(boardState, player);
                score += myEval.score * 10;
                if (myEval.patterns.liveFour > 0) score += SCORES.LIVE_FOUR * 2;
                if (myEval.patterns.sleepFour > 0) score += SCORES.SLEEP_FOUR * 1.5;
                if (myEval.patterns.liveThree > 0) score += SCORES.LIVE_THREE * 3;
                if (myEval.patterns.jumpThreeCount > 0) score += SCORES.JUMP_THREE * 2;
                if (myEval.patterns.sleepThree > 0) score += SCORES.SLEEP_THREE * 1.5;
                if (myEval.patterns.liveTwo > 0) score += SCORES.LIVE_TWO * 2;
                
                boardState[m.row][m.col] = player === BLACK ? WHITE : BLACK;
                const oppEval = analyzePatterns(boardState, player === BLACK ? WHITE : BLACK);
                score -= oppEval.score * 10;
                if (oppEval.patterns.liveFour > 0) score -= SCORES.LIVE_FOUR * 3;
                if (oppEval.patterns.sleepFour > 0) score -= SCORES.SLEEP_FOUR * 2;
                if (oppEval.patterns.liveThree > 0) score -= SCORES.LIVE_THREE * 2;
                if (oppEval.patterns.jumpThreeCount > 0) score -= SCORES.JUMP_THREE * 1.5;
                if (oppEval.patterns.sleepThree > 0) score -= SCORES.SLEEP_THREE;
                
                boardState[m.row][m.col] = EMPTY;
                score += CENTER_WEIGHT[m.row][m.col] * 10;
                
                boardState[m.row][m.col] = player;
                if (checkWinFast(boardState, m.row, m.col)) {
                    score += SCORES.FIVE * 10;
                }
                boardState[m.row][m.col] = EMPTY;
                
                boardState[m.row][m.col] = player === BLACK ? WHITE : BLACK;
                if (checkWinFast(boardState, m.row, m.col)) {
                    score -= SCORES.FIVE * 10;
                }
                boardState[m.row][m.col] = EMPTY;
                
                return { ...m, score };
            });
            
            return scored.sort((a, b) => b.score - a.score).map(m => ({ row: m.row, col: m.col }));
        }

        function iterativeDeepening(boardState, maxDepth) {
            let bestMove = null;
            let bestValue = -Infinity;
            
            for (let depth = 1; depth <= maxDepth; depth++) {
                const moves = getCandidateMoves(boardState);
                const orderedMoves = orderMoves(moves, boardState, aiColor);
                
                let depthBestMove = null;
                let depthBestValue = -Infinity;
                
                for (const move of orderedMoves.slice(0, depth === maxDepth ? 20 : 10)) {
                    boardState[move.row][move.col] = aiColor;
                    const value = alphaBetaeta(boardState, 1, -Infinity, Infinity, false, depth);
                    boardState[move.row][move.col] = EMPTY;
                    
                    if (value > depthBestValue) {
                        depthBestValue = value;
                        depthBestMove = move;
                    }
                }
                
                if (depthBestMove) {
                    bestMove = depthBestMove;
                    bestValue = depthBestValue;
                }
            }
            
            return bestMove;
        }

        function alphaBetaeta(boardState, depth, alpha, beta, maximizingPlayer, maxDepth, nullMovePrune = true) {
            nodesSearched++;
            
            if (Date.now() - searchStartTime > searchTimeLimit) {
                throw 'timeout';
            }
            
            const player = maximizingPlayer ? aiColor : (aiColor === BLACK ? WHITE : BLACK);
            const opponent = player === BLACK ? WHITE : BLACK;
            
            const winMove = findWinningMove(boardState, player);
            if (winMove) {
                return SCORES.FIVE - depth * 1000;
            }
            
            const loseMove = findWinningMove(boardState, opponent);
            if (loseMove) {
                return -SCORES.FIVE + depth * 1000;
            }
            
            if (depth >= maxDepth) {
                if (ELITE_AI_CONFIG.useQuiescenceSearch) {
                    return quiescenceSearch(boardState, alpha, beta, 0, ELITE_AI_CONFIG.quiescenceDepth);
                }
                return analyzePositionNeural(boardState, aiColor);
            }
            
            if (nullMovePrune && depth >= 2 && depth <= maxDepth - 2) {
                boardState[0][0] = opponent;
                const nullEval = -alphaBetaeta(boardState, depth + 2, -beta, -beta + 1, !maximizingPlayer, maxDepth, false);
                boardState[0][0] = EMPTY;
                
                if (nullEval >= beta) {
                    return beta;
                }
            }
            
            const candidates = getCandidateMovesAdvanced(boardState, depth === 0 ? aiColor : player);
            let orderedMoves = orderMovesAdvanced(candidates, boardState, player, depth);
            
            if (orderedMoves.length === 0) return 0;
            
            let bestMove = null;
            
            if (maximizingPlayer) {
                let maxEval = -Infinity;
                for (let i = 0; i < orderedMoves.length; i++) {
                    const move = orderedMoves[i];
                    boardState[move.row][move.col] = player;
                    
                    const eval = alphaBetaeta(boardState, depth + 1, alpha, beta, false, maxDepth);
                    
                    boardState[move.row][move.col] = EMPTY;
                    
                    if (eval > maxEval) {
                        maxEval = eval;
                        bestMove = move;
                    }
                    
                    alpha = Math.max(alpha, eval);
                    if (beta <= alpha) {
                        if (!move.killer) {
                            recordKillerMove(depth, move);
                        }
                        recordHistoryMove(move, depth);
                        break;
                    }
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (let i = 0; i < orderedMoves.length; i++) {
                    const move = orderedMoves[i];
                    boardState[move.row][move.col] = player;
                    
                    const eval = alphaBetaeta(boardState, depth + 1, alpha, beta, true, maxDepth);
                    
                    boardState[move.row][move.col] = EMPTY;
                    
                    if (eval < minEval) {
                        minEval = eval;
                        bestMove = move;
                    }
                    
                    beta = Math.min(beta, eval);
                    if (beta <= alpha) {
                        if (!move.killer) {
                            recordKillerMove(depth, move);
                        }
                        recordHistoryMove(move, depth);
                        break;
                    }
                }
                return minEval;
            }
        }
        
        function quiescenceSearch(boardState, alpha, beta, depth, maxDepth) {
            nodesSearched++;
            
            if (Date.now() - searchStartTime > searchTimeLimit) {
                throw 'timeout';
            }
            
            const standPat = analyzePositionNeural(boardState, aiColor);
            
            if (standPat >= beta) return beta;
            if (standPat > alpha) alpha = standPat;
            
            if (depth >= maxDepth) return standPat;
            
            const player = aiColor;
            const opponent = player === BLACK ? WHITE : BLACK;
            
            const captures = getCaptureMoves(boardState, player);
            
            if (captures.length === 0) return standPat;
            
            const orderedCaptures = orderCaptureMoves(captures, boardState, player);
            
            for (const move of orderedCaptures) {
                boardState[move.row][move.col] = player;
                
                const score = -quiescenceSearch(boardState, -beta, -alpha, depth + 1, maxDepth);
                
                boardState[move.row][move.col] = EMPTY;
                
                if (score >= beta) return beta;
                if (score > alpha) alpha = score;
            }
            
            return alpha;
        }
        
        function getCaptureMoves(boardState, player) {
            const opponent = player === BLACK ? WHITE : BLACK;
            const captures = [];
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === EMPTY) {
                        boardState[i][j] = player;
                        const myPatterns = analyzePatternsAdvanced(boardState, player);
                        boardState[i][j] = opponent;
                        const oppPatterns = analyzePatternsAdvanced(boardState, opponent);
                        boardState[i][j] = EMPTY;
                        
                        if (myPatterns.patterns.liveFour > 0 || myPatterns.patterns.jumpFour > 0 ||
                            myPatterns.patterns.five > 0 || oppPatterns.patterns.liveFour > 0 ||
                            oppPatterns.patterns.jumpFour > 0 || oppPatterns.patterns.five > 0) {
                            captures.push({ row: i, col: j });
                        }
                    }
                }
            }
            
            return captures;
        }
        
        function orderCaptureMoves(captures, boardState, player) {
            const scores = captures.map(move => {
                boardState[move.row][move.col] = player;
                const patterns = analyzePatternsAdvanced(boardState, player);
                boardState[move.row][move.col] = EMPTY;
                
                let score = 0;
                if (patterns.patterns.five > 0) score += 10000;
                if (patterns.patterns.liveFour > 0) score += 5000;
                if (patterns.patterns.jumpFour > 0) score += 4000;
                if (patterns.patterns.liveThree > 0) score += 1000;
                
                return { move, score };
            });
            
            return scores.sort((a, b) => b.score - a.score).map(s => s.move);
        }
        
        function evaluatePositionAdvanced(boardState, player, depth) {
            let score = 0;
            const opponent = player === BLACK ? WHITE : BLACK;
            
            const myEval = analyzePatternsAdvanced(boardState, player);
            const oppEval = analyzePatternsAdvanced(boardState, opponent);
            
            score += myEval.score;
            score -= oppEval.score;
            
            if (myEval.patterns.five > 0) score += SCORES.FIVE;
            if (oppEval.patterns.five > 0) score -= SCORES.FIVE;
            
            const fourCount = myEval.patterns.liveFour + myEval.patterns.jumpFour;
            const oppFourCount = oppEval.patterns.liveFour + oppEval.patterns.jumpFour;
            const fourAttack = myEval.patterns.fourAttack;
            const oppFourAttack = oppEval.patterns.fourAttack;
            
            if (fourCount > 0) score += SCORES.LIVE_FOUR * (1 + fourCount * 0.5);
            if (oppFourCount > 0) score -= SCORES.LIVE_FOUR * (1 + oppFourCount * 0.5);
            
            if (fourAttack > 0) score += SCORES.LIVE_FOUR * 1.5;
            if (oppFourAttack > 0) score -= SCORES.LIVE_FOUR * 1.5;
            
            const threeCount = myEval.patterns.liveThree + myEval.patterns.jumpThree;
            const oppThreeCount = oppEval.patterns.liveThree + oppEval.patterns.jumpThree;
            const threeAttack = myEval.patterns.threeAttack;
            const oppThreeAttack = oppEval.patterns.threeAttack;
            
            if (threeCount > 1) score += SCORES.LIVE_THREE * (1 + (threeCount - 1) * 0.8);
            if (oppThreeCount > 1) score -= SCORES.LIVE_THREE * (1 + (oppThreeCount - 1) * 0.8);
            
            if (threeAttack > 0) score += SCORES.LIVE_THREE * 1.2;
            if (oppThreeAttack > 0) score -= SCORES.LIVE_THREE * 1.2;
            
            const twoCount = myEval.patterns.liveTwo + myEval.patterns.jumpTwo;
            const oppTwoCount = oppEval.patterns.liveTwo + oppEval.patterns.jumpTwo;
            
            if (twoCount > 0) score += SCORES.LIVE_TWO * (1 + twoCount * 0.3);
            if (oppTwoCount > 0) score -= SCORES.LIVE_TWO * (1 + oppTwoCount * 0.3);
            
            if (myEval.patterns.openFour > 0) score += SCORES.LIVE_FOUR * 2;
            if (oppEval.patterns.openFour > 0) score -= SCORES.LIVE_FOUR * 2;
            
            if (myEval.patterns.openThree > 0) score += SCORES.LIVE_THREE * 1.5;
            if (oppEval.patterns.openThree > 0) score -= SCORES.LIVE_THREE * 1.5;
            
            if (depth > 0) {
                score *= (1 - depth * 0.02);
            }
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === player) {
                        score += CENTER_WEIGHT[i][j] * 3;
                    } else if (boardState[i][j] === opponent) {
                        score -= CENTER_WEIGHT[i][j] * 3;
                    }
                }
            }
            
            return score;
        }
        
        function analyzePatternsAdvanced(boardState, player) {
            let score = 0;
            let fiveCount = 0;
            let liveFourCount = 0, jumpFourCount = 0, sleepFourCount = 0;
            let fourAttackCount = 0;
            let liveThreeCount = 0, jumpThreeCount = 0, sleepThreeCount = 0;
            let threeAttackCount = 0;
            let liveTwoCount = 0, jumpTwoCount = 0, sleepTwoCount = 0;
            let openFourCount = 0, openThreeCount = 0;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === player || boardState[i][j] === EMPTY) {
                        for (const [dr, dc] of DIRECTIONS) {
                            const result = analyzeDirectionAdvanced(boardState, i, j, dr, dc, player);
                            if (result) {
                                score += result.score;
                                
                                if (result.five) fiveCount++;
                                if (result.liveFour) liveFourCount++;
                                if (result.jumpFour) jumpFourCount++;
                                if (result.sleepFour) sleepFourCount++;
                                if (result.liveThree) liveThreeCount++;
                                if (result.jumpThree) jumpThreeCount++;
                                if (result.sleepThree) sleepThreeCount++;
                                if (result.liveTwo) liveTwoCount++;
                                if (result.jumpTwo) jumpTwoCount++;
                                if (result.sleepTwo) sleepTwoCount++;
                                if (result.openFour) openFourCount++;
                                if (result.openThree) openThreeCount++;
                                if (result.fourAttack) fourAttackCount++;
                                if (result.threeAttack) threeAttackCount++;
                            }
                        }
                    }
                }
            }
            
            return {
                score,
                patterns: {
                    five: fiveCount,
                    liveFour: liveFourCount,
                    jumpFour: jumpFourCount,
                    sleepFour: sleepFourCount,
                    liveThree: liveThreeCount,
                    jumpThree: jumpThreeCount,
                    sleepThree: sleepThreeCount,
                    liveTwo: liveTwoCount,
                    jumpTwo: jumpTwoCount,
                    sleepTwo: sleepTwoCount,
                    openFour: openFourCount,
                    openThree: openThreeCount,
                    fourAttack: fourAttackCount,
                    threeAttack: threeAttackCount
                }
            };
        }
        
        function analyzeDirectionAdvanced(boardState, row, col, dr, dc, player) {
            const opponent = player === BLACK ? WHITE : BLACK;
            
            const cells = [];
            for (let i = -5; i <= 5; i++) {
                const r = row + i * dr;
                const c = col + i * dc;
                if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE) {
                    cells.push(boardState[r][c]);
                } else {
                    cells.push(null);
                }
            }
            
            let score = 0;
            let patterns = {};
            
            if (cells[5] !== player) return null;
            
            const lineStr = cells.map(c => {
                if (c === player) return '1';
                if (c === EMPTY) return '0';
                return '2';
            }).join('');
            
            let myCount = 0;
            for (let i = 0; i < lineStr.length; i++) {
                if (lineStr[i] === '1') myCount++;
            }
            
            if (myCount >= 5) {
                patterns.five = true;
                score = SCORES.FIVE;
            }
            
            for (let i = 0; i < lineStr.length - 4; i++) {
                const window = lineStr.substring(i, i + 5);
                const counts = { '1': 0, '0': 0 };
                for (let j = 0; j < 5; j++) {
                    counts[window[j]] = (counts[window[j]] || 0) + 1;
                }
                
                if (counts['1'] === 4 && counts['0'] === 1) {
                    const before = i > 0 ? lineStr[i - 1] : null;
                    const after = i + 5 < lineStr.length ? lineStr[i + 5] : null;
                    
                    const beforeIsEmpty = before === null || before === '0';
                    const afterIsEmpty = after === null || after === '0';
                    
                    if (beforeIsEmpty && afterIsEmpty) {
                        if (!patterns.openFour) {
                            patterns.openFour = true;
                            patterns.liveFour = true;
                            score = Math.max(score, SCORES.LIVE_FOUR * 2);
                        }
                    } else if (beforeIsEmpty || afterIsEmpty) {
                        if (!patterns.jumpFour) {
                            patterns.jumpFour = true;
                            score = Math.max(score, SCORES.JUMP_FOUR);
                        }
                    } else if (!patterns.sleepFour) {
                        patterns.sleepFour = true;
                        patterns.fourAttack = true;
                        score = Math.max(score, SCORES.SLEEP_FOUR);
                    }
                }
                
                if (counts['1'] === 3 && counts['0'] === 2) {
                    const before = i > 0 ? lineStr[i - 1] : null;
                    const after = i + 5 < lineStr.length ? lineStr[i + 5] : null;
                    
                    const beforeIsEmpty = before === null || before === '0';
                    const afterIsEmpty = after === null || after === '0';
                    
                    if (beforeIsEmpty && afterIsEmpty) {
                        if (!patterns.liveThree) {
                            patterns.openThree = true;
                            patterns.liveThree = true;
                            score = Math.max(score, SCORES.LIVE_THREE * 1.5);
                        }
                    } else if (beforeIsEmpty || afterIsEmpty) {
                        patterns.jumpThree = true;
                        score = Math.max(score, SCORES.JUMP_THREE);
                    } else if (!patterns.sleepThree) {
                        patterns.sleepThree = true;
                        patterns.threeAttack = true;
                        score = Math.max(score, SCORES.SLEEP_THREE);
                    }
                }
                
                if (counts['1'] === 2 && counts['0'] === 3) {
                    const before = i > 0 ? lineStr[i - 1] : null;
                    const after = i + 5 < lineStr.length ? lineStr[i + 5] : null;
                    
                    const beforeIsEmpty = before === null || before === '0';
                    const afterIsEmpty = after === null || after === '0';
                    
                    if (beforeIsEmpty && afterIsEmpty) {
                        patterns.liveTwo = true;
                        score = Math.max(score, SCORES.LIVE_TWO);
                    } else if (beforeIsEmpty || afterIsEmpty) {
                        patterns.jumpTwo = true;
                        score = Math.max(score, SCORES.JUMP_TWO);
                    }
                }
            }
            
            for (let i = 0; i < lineStr.length - 3; i++) {
                const window = lineStr.substring(i, i + 4);
                const counts = { '1': 0, '0': 0 };
                for (let j = 0; j < 4; j++) {
                    counts[window[j]] = (counts[window[j]] || 0) + 1;
                }
                
                if (counts['1'] === 2 && counts['0'] === 2) {
                    const before = i > 0 ? lineStr[i - 1] : null;
                    const after = i + 4 < lineStr.length ? lineStr[i + 4] : null;
                    
                    const beforeIsEmpty = before === null || before === '0';
                    const afterIsEmpty = after === null || after === '0';
                    
                    if (beforeIsEmpty && afterIsEmpty) {
                        if (!patterns.liveTwo) {
                            patterns.liveTwo = true;
                            score = Math.max(score, SCORES.LIVE_TWO);
                        }
                    }
                }
            }
            
            for (let i = 0; i < lineStr.length - 5; i++) {
                const window = lineStr.substring(i, i + 6);
                const counts = { '1': 0, '0': 0 };
                for (let j = 0; j < 6; j++) {
                    counts[window[j]] = (counts[window[j]] || 0) + 1;
                }
                
                if (counts['1'] === 4 && counts['0'] === 2) {
                    const before = i > 0 ? lineStr[i - 1] : null;
                    const after = i + 6 < lineStr.length ? lineStr[i + 6] : null;
                    
                    const beforeIsEmpty = before === null || before === '0';
                    const afterIsEmpty = after === null || after === '0';
                    
                    if ((beforeIsEmpty || i === 0) && (afterIsEmpty || i + 6 >= lineStr.length)) {
                        if (!patterns.liveThree) {
                            patterns.openThree = true;
                            patterns.liveThree = true;
                            score = Math.max(score, SCORES.LIVE_THREE);
                        }
                    } else if (beforeIsEmpty || afterIsEmpty) {
                        patterns.jumpThree = true;
                        score = Math.max(score, SCORES.JUMP_THREE);
                    }
                }
            }
            
            if (patterns.liveOne === undefined && patterns.liveTwo === undefined && 
                patterns.liveThree === undefined && patterns.liveFour === undefined) {
                if (myCount >= 1) {
                    patterns.liveOne = true;
                    score = Math.max(score, SCORES.LIVE_ONE);
                }
            }
            
            if (Object.keys(patterns).length > 0) {
                patterns.score = score;
                return patterns;
            }
            
            return null;
        }
        
        function getCandidateMovesAdvanced(boardState, player) {
            const candidates = new Map();
            const range = 3;
            let hasPieces = false;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] !== EMPTY) {
                        hasPieces = true;
                        for (let di = -range; di <= range; di++) {
                            for (let dj = -range; dj <= range; dj++) {
                                const ni = i + di;
                                const nj = j + dj;
                                if (ni >= 0 && ni < BOARD_SIZE && nj >= 0 && nj < BOARD_SIZE && boardState[ni][nj] === EMPTY) {
                                    const score = CENTER_WEIGHT[ni][nj] + 
                                        evaluateNeighbor(boardState, ni, nj, player);
                                    const key = `${ni},${nj}`;
                                    if (!candidates.has(key) || candidates.get(key) < score) {
                                        candidates.set(key, score);
                                    }
                                }
                            }
                        }
                    }
                }
            }
            
            if (!hasPieces) {
                return [{ row: 7, col: 7, score: 1000 }];
            }
            
            const result = Array.from(candidates.entries())
                .sort((a, b) => b[1] - a[1])
                .slice(0, 30)
                .map(([key, score]) => {
                    const [row, col] = key.split(',').map(Number);
                    return { row, col, baseScore: score };
                });
            
            return result;
        }
        
        function evaluateNeighbor(boardState, row, col, player) {
            let score = 0;
            const opponent = player === BLACK ? WHITE : BLACK;
            const range = 2;
            
            for (let di = -range; di <= range; di++) {
                for (let dj = -range; dj <= range; dj++) {
                    if (di === 0 && dj === 0) continue;
                    const ni = row + di;
                    const nj = col + dj;
                    if (ni >= 0 && ni < BOARD_SIZE && nj >= 0 && nj < BOARD_SIZE) {
                        if (boardState[ni][nj] === player) score += 5;
                        else if (boardState[ni][nj] === opponent) score += 3;
                    }
                }
            }
            
            return score;
        }
        
        function orderMovesAdvanced(moves, boardState, player, depth) {
            const scored = moves.map(m => {
                let moveScore = m.baseScore || 0;
                boardState[m.row][m.col] = player;
                
                const myEval = analyzePatternsAdvanced(boardState, player);
                const opponent = player === BLACK ? WHITE : BLACK;
                
                moveScore += myEval.score * 0.5;
                
                if (myEval.patterns.five > 0) moveScore += SCORES.FIVE * 100;
                if (myEval.patterns.liveFour > 0 || myEval.patterns.openFour > 0) {
                    moveScore += SCORES.LIVE_FOUR * 50;
                }
                if (myEval.patterns.jumpFour > 0) moveScore += SCORES.JUMP_FOUR * 30;
                if (myEval.patterns.sleepFour > 0) moveScore += SCORES.SLEEP_FOUR * 10;
                if (myEval.patterns.liveThree > 0 || myEval.patterns.openThree > 0) {
                    moveScore += SCORES.LIVE_THREE * 20;
                }
                if (myEval.patterns.jumpThree > 0) moveScore += SCORES.JUMP_THREE * 10;
                if (myEval.patterns.liveTwo > 0) moveScore += SCORES.LIVE_TWO * 5;
                
                boardState[m.row][m.col] = opponent;
                const oppEval = analyzePatternsAdvanced(boardState, opponent);
                
                moveScore -= oppEval.score * 0.6;
                
                if (oppEval.patterns.five > 0) moveScore -= SCORES.FIVE * 100;
                if (oppEval.patterns.liveFour > 0 || oppEval.patterns.openFour > 0) {
                    moveScore -= SCORES.LIVE_FOUR * 60;
                }
                if (oppEval.patterns.jumpFour > 0) moveScore -= SCORES.JUMP_FOUR * 40;
                if (oppEval.patterns.sleepFour > 0) moveScore -= SCORES.SLEEP_FOUR * 15;
                if (oppEval.patterns.liveThree > 0 || oppEval.patterns.openThree > 0) {
                    moveScore -= SCORES.LIVE_THREE * 25;
                }
                if (oppEval.patterns.jumpThree > 0) moveScore -= SCORES.JUMP_THREE * 15;
                if (oppEval.patterns.liveTwo > 0) moveScore -= SCORES.LIVE_TWO * 8;
                
                boardState[m.row][m.col] = EMPTY;
                
                const killerScore = getKillerMoveScore(m, depth);
                moveScore += killerScore;
                
                moveScore += getHistoryScore(m) * 0.1;
                
                const centerDist = Math.abs(m.row - 7) + Math.abs(m.col - 7);
                moveScore -= centerDist * 2;
                
                return { ...m, score: moveScore };
            });
            
            return scored.sort((a, b) => b.score - a.score);
        }
        
        function getKillerMoveScore(move, depth) {
            if (depth < killerMoves.length) {
                if (killerMoves[depth][0] && 
                    killerMoves[depth][0].row === move.row && 
                    killerMoves[depth][0].col === move.col) {
                    return SCORES.FIVE * 0.5;
                }
                if (killerMoves[depth][1] && 
                    killerMoves[depth][1].row === move.row && 
                    killerMoves[depth][1].col === move.col) {
                    return SCORES.FIVE * 0.3;
                }
            }
            return 0;
        }

        function findWinningMove(boardState, player) {
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (boardState[i][j] === EMPTY) {
                        boardState[i][j] = player;
                        if (checkWinFast(boardState, i, j)) {
                            boardState[i][j] = EMPTY;
                            return { row: i, col: j };
                        }
                        boardState[i][j] = EMPTY;
                    }
                }
            }
            return null;
        }

        function findBlockMove(boardState, opponent) {
            const winMove = findWinningMove(boardState, opponent);
            if (winMove) return winMove;
            
            const candidates = getCandidateMoves(boardState);
            
            for (const move of candidates) {
                boardState[move.row][move.col] = opponent;
                const oppEval = analyzePatterns(boardState, opponent);
                boardState[move.row][move.col] = EMPTY;
                
                if (oppEval.patterns.four > 0 || oppEval.patterns.liveFour > 0) {
                    return { row: move.row, col: move.col };
                }
            }
            
            for (const move of candidates) {
                boardState[move.row][move.col] = opponent;
                const oppEval = analyzePatterns(boardState, opponent);
                boardState[move.row][move.col] = EMPTY;
                
                if (oppEval.patterns.three > 0 || oppEval.patterns.liveThree > 0) {
                    return { row: move.row, col: move.col };
                }
            }
            
            return null;
        }

        function findSetupMove(boardState, player) {
            const candidates = getCandidateMoves(boardState);
            let bestMove = null;
            let bestScore = -Infinity;
            
            for (const move of candidates) {
                boardState[move.row][move.col] = player;
                const myEval = analyzePatterns(boardState, player);
                boardState[move.row][move.col] = EMPTY;
                
                let score = 0;
                if (myEval.patterns.liveFour > 0) score += 100000;
                else if (myEval.patterns.sleepFour > 0) score += 50000;
                else if (myEval.patterns.liveThree > 0) score += 10000;
                else if (myEval.patterns.jumpThreeCount > 0) score += 8000;
                else if (myEval.patterns.sleepThree > 0) score += 3000;
                else if (myEval.patterns.liveTwo > 0) score += 1000;
                
                if (score > bestScore) {
                    bestScore = score;
                    bestMove = move;
                }
            }
            
            return bestScore > 5000 ? bestMove : null;
        }

        function findCriticalThreat(boardState, player) {
            const candidates = getCandidateMoves(boardState);
            let bestThreat = null;
            let bestPriority = -1;
            
            for (const move of candidates) {
                boardState[move.row][move.col] = player;
                const myEval = analyzePatterns(boardState, player);
                boardState[move.row][move.col] = EMPTY;
                
                let priority = 0;
                if (myEval.patterns.liveFour > 0) priority = 100;
                else if (myEval.patterns.sleepFour > 0 || myEval.patterns.jumpFour > 0) priority = 80;
                else if (myEval.patterns.liveThree > 0) priority = 60;
                else if (myEval.patterns.jumpThreeCount > 0) priority = 50;
                else if (myEval.patterns.sleepThree > 0) priority = 30;
                
                if (priority > bestPriority) {
                    bestPriority = priority;
                    bestThreat = { row: move.row, col: move.col, type: 'THREAT', priority };
                }
            }
            
            return bestThreat;
        }

        function makeAIMove() {
            if (gameMode !== 'ai' || gameOver || aiThinking) return;
            
            aiThinking = true;
            document.getElementById('aiThinking').classList.add('show');
            
            setTimeout(() => {
                initAITables();
                searchStartTime = Date.now();
                nodesSearched = 0;
                
                const player = aiColor;
                const opponent = player === BLACK ? WHITE : BLACK;
                
                const originalBoard = board.map(row => [...row]);
                
                const pieceCount = countPieces(board);
                const useOpeningBook = pieceCount <= 8;
                
                if (useOpeningBook) {
                    const openingMove = getOpeningBookMove(board, player);
                    if (openingMove) {
                        board[openingMove.row][openingMove.col] = player;
                        moveHistory.push({ row: openingMove.row, col: openingMove.col, player });
                        updateBoardDisplay();
                        
                        if (checkWin(openingMove.row, openingMove.col)) {
                            gameOver = true;
                            showWinner(player);
                        } else if (isBoardFull()) {
                            gameOver = true;
                            showDraw();
                        } else {
                            currentPlayer = player === BLACK ? WHITE : BLACK;
                            updateStatus();
                        }
                        updateMoveCount();
                        
                        aiThinking = false;
                        document.getElementById('aiThinking').classList.remove('show');
                        return;
                    }
                }
                
                const immediateWin = findWinningMove(board, player);
                if (immediateWin) {
                    executeAIMove(immediateWin.row, immediateWin.col);
                    aiThinking = false;
                    document.getElementById('aiThinking').classList.remove('show');
                    return;
                }
                
                const immediateBlock = findWinningMove(board, opponent);
                if (immediateBlock) {
                    executeAIMove(immediateBlock.row, immediateBlock.col);
                    aiThinking = false;
                    document.getElementById('aiThinking').classList.remove('show');
                    return;
                }
                
                const doubleThreat = findDoubleThreat(board, player);
                if (doubleThreat) {
                    executeAIMove(doubleThreat.row, doubleThreat.col);
                    aiThinking = false;
                    document.getElementById('aiThinking').classList.remove('show');
                    return;
                }
                
                const oppDoubleThreat = findDoubleThreat(board, opponent);
                if (oppDoubleThreat) {
                    executeAIMove(oppDoubleThreat.row, oppDoubleThreat.col);
                    aiThinking = false;
                    document.getElementById('aiThinking').classList.remove('show');
                    return;
                }
                
                const forcedBlock = findForcedBlock(board, opponent);
                if (forcedBlock) {
                    executeAIMove(forcedBlock.row, forcedBlock.col);
                    aiThinking = false;
                    document.getElementById('aiThinking').classList.remove('show');
                    return;
                }
                
                const attackMove = findAttackMove(board, player);
                if (attackMove) {
                    executeAIMove(attackMove.row, attackMove.col);
                    aiThinking = false;
                    document.getElementById('aiThinking').classList.remove('show');
                    return;
                }
                
                let bestMove = null;
                let bestValue = -Infinity;
                
                const maxDepth = ELITE_AI_CONFIG.searchDepth;
                const timeLimit = ELITE_AI_CONFIG.searchTime;
                searchTimeLimit = timeLimit;
                
                const candidates = getCandidateMovesAdvanced(board, player);
                let orderedMoves = orderMovesAdvanced(candidates, board, player, 0);
                
                if (ELITE_AI_CONFIG.useIterativeDeepening) {
                    orderedMoves = orderedMoves.slice(0, 15);
                    
                    let currentDepth = 1;
                    const aspirationWindow = ELITE_AI_CONFIG.aspirationWindow;
                    let searchCompleted = false;
                    
                    try {
                        for (currentDepth = 1; currentDepth <= maxDepth; currentDepth++) {
                            let depthBestMove = null;
                            let depthBestValue = -Infinity;
                            let alpha = bestValue - aspirationWindow;
                            let beta = bestValue + aspirationWindow;
                            
                            if (currentDepth === 1) {
                                alpha = -Infinity;
                                beta = Infinity;
                            }
                            
                            for (const move of orderedMoves) {
                                board[move.row][move.col] = player;
                                const value = alphaBetaeta(board, 1, alpha, beta, false, currentDepth);
                                board[move.row][move.col] = EMPTY;
                                
                                if (value > depthBestValue) {
                                    depthBestValue = value;
                                    depthBestMove = move;
                                }
                                
                                if (Date.now() - searchStartTime > timeLimit * 0.85) {
                                    break;
                                }
                            }
                            
                            if (depthBestMove && (currentDepth === 1 || 
                                (depthBestValue > bestValue - aspirationWindow && 
                                 depthBestValue < bestValue + aspirationWindow))) {
                                bestMove = depthBestMove;
                                bestValue = depthBestValue;
                            }
                            
                            if (Date.now() - searchStartTime > timeLimit * 0.75) {
                                break;
                            }
                        }
                        searchCompleted = true;
                    } catch (e) {
                        console.log('Search exception:', e);
                    }
                    
                    for (let i = 0; i < BOARD_SIZE; i++) {
                        for (let j = 0; j < BOARD_SIZE; j++) {
                            if (board[i][j] !== originalBoard[i][j]) {
                                board[i][j] = originalBoard[i][j];
                            }
                        }
                    }
                    
                    if (!searchCompleted && bestMove === null && orderedMoves.length > 0) {
                        bestMove = orderedMoves[0];
                    }
                } else {
                    const searchCount = Math.min(20, orderedMoves.length);
                    for (const move of orderedMoves.slice(0, searchCount)) {
                        board[move.row][move.col] = player;
                        const value = alphaBetaeta(board, 1, -Infinity, Infinity, false, maxDepth);
                        board[move.row][move.col] = EMPTY;
                        
                        if (value > bestValue) {
                            bestValue = value;
                            bestMove = move;
                        }
                        
                        if (Date.now() - searchStartTime > timeLimit * 0.8) {
                            break;
                        }
                    }
                }
                
                if (!bestMove && orderedMoves.length > 0) {
                    bestMove = orderedMoves[0];
                }
                
                if (bestMove) {
                    executeAIMove(bestMove.row, bestMove.col);
                }
                
                aiThinking = false;
                document.getElementById('aiThinking').classList.remove('show');
            }, 50);
        }
        
        function findDoubleThreat(boardState, player) {
            const candidates = getCandidateMovesAdvanced(boardState, player);
            let doubleThreat = null;
            let threatCount = 0;
            
            for (const move of candidates.slice(0, 15)) {
                boardState[move.row][move.col] = player;
                const eval = analyzePatternsAdvanced(boardState, player);
                boardState[move.row][move.col] = EMPTY;
                
                const fourCount = eval.patterns.liveFour + eval.patterns.jumpFour + eval.patterns.openFour;
                const threeCount = eval.patterns.liveThree + eval.patterns.jumpThree + eval.patterns.openThree;
                
                if (fourCount >= 2 || (fourCount >= 1 && threeCount >= 1)) {
                    return move;
                }
                
                if (fourCount >= 1) {
                    threatCount++;
                    if (threatCount >= 2) return move;
                    doubleThreat = move;
                }
            }
            
            return null;
        }
        
        function findForcedBlock(boardState, opponent) {
            const candidates = getCandidateMovesAdvanced(boardState, opponent);
            
            for (const move of candidates.slice(0, 10)) {
                boardState[move.row][move.col] = opponent;
                const eval = analyzePatternsAdvanced(boardState, opponent);
                boardState[move.row][move.col] = EMPTY;
                
                const fourCount = eval.patterns.liveFour + eval.patterns.jumpFour + eval.patterns.openFour;
                if (fourCount >= 1) {
                    return move;
                }
            }
            
            return null;
        }
        
        function findAttackMove(boardState, player) {
            const candidates = getCandidateMovesAdvanced(boardState, player);
            let bestMove = null;
            let bestScore = -Infinity;
            
            for (const move of candidates.slice(0, 20)) {
                boardState[move.row][move.col] = player;
                const eval = analyzePatternsAdvanced(boardState, player);
                boardState[move.row][move.col] = EMPTY;
                
                let score = 0;
                if (eval.patterns.five > 0) score = 1000000;
                else if (eval.patterns.liveFour > 0 || eval.patterns.openFour > 0) score = 100000;
                else if (eval.patterns.jumpFour > 0) score = 50000;
                else if (eval.patterns.liveThree > 0 || eval.patterns.openThree > 0) score = 10000;
                else if (eval.patterns.jumpThree > 0) score = 5000;
                else if (eval.patterns.liveTwo > 0) score = 1000;
                
                score += eval.score * 0.1;
                
                if (score > bestScore) {
                    bestScore = score;
                    bestMove = move;
                }
            }
            
            return bestScore >= 50000 ? bestMove : null;
        }

        function executeAIMove(row, col) {
            board[row][col] = aiColor;
            moveHistory.push({ row, col, player: aiColor });
            
            updateBoardDisplay();
            
            if (checkWin(row, col)) {
                gameOver = true;
                showWinner(aiColor);
            } else if (isBoardFull()) {
                gameOver = true;
                showDraw();
            } else {
                currentPlayer = aiColor === BLACK ? WHITE : BLACK;
                updateStatus();
            }
            
            updateMoveCount();
        }

        function createBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    cell.addEventListener('click', () => handleCellClick(i, j));
                    boardElement.appendChild(cell);
                }
            }
        }

        function updateBoardDisplay() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const row = parseInt(cell.dataset.row);
                const col = parseInt(cell.dataset.col);
                
                cell.innerHTML = '';
                cell.classList.remove('occupied', 'last-move');
                
                if (board[row][col] !== EMPTY) {
                    cell.classList.add('occupied');
                    const piece = document.createElement('div');
                    piece.className = `piece ${board[row][col] === BLACK ? 'black' : 'white'}`;
                    
                    if (moveHistory.length > 0) {
                        const lastMove = moveHistory[moveHistory.length - 1];
                        if (lastMove.row === row && lastMove.col === col) {
                            piece.classList.add('last-move');
                        }
                    }
                    
                    cell.appendChild(piece);
                }
            });
        }

        function handleCellClick(row, col) {
            if (gameOver || board[row][col] !== EMPTY || aiThinking) {
                return;
            }
            
            const isPlayerMove = gameMode === 'pvp' || currentPlayer !== aiColor;
            
            if (!isPlayerMove) return;
            
            board[row][col] = currentPlayer;
            moveHistory.push({ row, col, player: currentPlayer });
            
            updateBoardDisplay();
            
            if (checkWin(row, col)) {
                gameOver = true;
                showWinner(currentPlayer);
            } else if (isBoardFull()) {
                gameOver = true;
                showDraw();
            } else {
                currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
                updateStatus();
            }
            
            updateMoveCount();
            
            if (gameMode === 'ai' && !gameOver && currentPlayer === aiColor) {
                makeAIMove();
            }
        }

        function checkWin(row, col) {
            const directions = [
                [0, 1],   // 水平
                [1, 0],   // 垂直
                [1, 1],   // 对角线
                [1, -1]   // 反对角线
            ];

            for (const [dr, dc] of directions) {
                if (countInDirection(row, col, dr, dc) + countInDirection(row, col, -dr, -dc) + 1 >= 5) {
                    return true;
                }
            }
            return false;
        }

        function countInDirection(row, col, dr, dc) {
            const player = board[row][col];
            let count = 0;
            let r = row + dr;
            let c = col + dc;

            while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === player) {
                count++;
                r += dr;
                c += dc;
            }

            return count;
        }

        function isBoardFull() {
            return board.every(row => row.every(cell => cell !== EMPTY));
        }

        function updateStatus() {
            const indicator = document.getElementById('playerIndicator');
            const text = document.getElementById('playerText');
            
            indicator.className = `player-indicator ${currentPlayer === BLACK ? 'black' : 'white'}`;
            text.textContent = currentPlayer === BLACK ? '黑方' : '白方';
        }

        function updateMoveCount() {
            document.getElementById('moveCount').textContent = `步数：${moveHistory.length}`;
        }

        function showWinner(player) {
            const modal = document.getElementById('winnerModal');
            const winnerText = document.getElementById('winnerText');
            const winnerMessage = document.getElementById('winnerMessage');
            
            const winnerName = player === BLACK ? '黑方' : '白方';
            winnerText.textContent = `${winnerName} 获胜！`;
            winnerText.className = `winner-text ${player === BLACK ? 'black' : 'white'}`;
            winnerMessage.textContent = `恭喜${winnerName}获得了胜利！`;
            
            modal.classList.add('show');
        }

        function showDraw() {
            const modal = document.getElementById('winnerModal');
            const winnerText = document.getElementById('winnerText');
            const winnerMessage = document.getElementById('winnerMessage');
            
            winnerText.textContent = '平局！';
            winnerText.className = 'winner-text';
            winnerMessage.textContent = '棋盘已满，双方势均力敌！';
            
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('winnerModal').classList.remove('show');
        }

        function restartGame() {
            initBoard();
            currentPlayer = BLACK;
            gameOver = false;
            moveHistory = [];
            
            if (gameMode === 'ai') {
                if (firstMovePreference === 'random') {
                    aiColor = Math.random() < 0.5 ? BLACK : WHITE;
                } else if (firstMovePreference === 'ai') {
                    aiColor = BLACK;
                } else {
                    aiColor = WHITE;
                }
                
                if (aiColor === BLACK) {
                    setTimeout(makeAIMove, 500);
                }
            }
            
            createBoard();
            updateStatus();
            updateMoveCount();
            closeModal();
        }

        function undoMove() {
            if (moveHistory.length === 0 || gameOver) {
                return;
            }
            
            if (gameMode === 'ai') {
                if (moveHistory.length < 2) return;
                
                const aiMove = moveHistory.pop();
                board[aiMove.row][aiMove.col] = EMPTY;
                
                const playerMove = moveHistory.pop();
                board[playerMove.row][playerMove.col] = EMPTY;
                
                currentPlayer = BLACK;
            } else {
                if (moveHistory.length < 2) return;
                
                const whiteMove = moveHistory.pop();
                board[whiteMove.row][whiteMove.col] = EMPTY;
                
                const blackMove = moveHistory.pop();
                board[blackMove.row][blackMove.col] = EMPTY;
                
                currentPlayer = BLACK;
            }
            
            updateBoardDisplay();
            updateStatus();
            updateMoveCount();
        }

        function surrender() {
            if (gameOver) return;
            
            gameOver = true;
            const winner = currentPlayer === BLACK ? WHITE : BLACK;
            showWinner(winner);
        }

        document.getElementById('winnerModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
            if (e.key === 'r' || e.key === 'R') {
                if (!e.ctrlKey && !e.metaKey) {
                    restartGame();
                }
            }
            if ((e.key === 'z' || e.key === 'Z') && (e.ctrlKey || e.metaKey)) {
                undoMove();
            }
        });

        initBoard();
        createBoard();
        updateStatus();
        updateMoveCount();
    </script>
</body>
</html>
