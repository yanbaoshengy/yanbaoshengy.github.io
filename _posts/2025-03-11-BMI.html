<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI和体脂率计算器</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .calculator {
            background-color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="number"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .gender-group {
            display: flex;
            gap: 15px;
        }
        .gender-option {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result {
            margin-top: 25px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 5px;
            border-left: 4px solid #3498db;
        }
        .result-item {
            margin-bottom: 10px;
        }
        .result-value {
            font-weight: bold;
            color: #2c3e50;
        }
        .hidden {
            display: none;
        }
        .bmi-category {
            font-weight: bold;
            margin-top: 5px;
        }
        .underweight { color: #3498db; }
        .normal { color: #2ecc71; }
        .overweight { color: #f39c12; }
        .obese { color: #e74c3c; }
    </style>
</head>
<body>
    <h1>BMI和体脂率计算器</h1>
    
    <div class="calculator">
        <div class="form-group">
            <label for="height">身高 (cm):</label>
            <input type="number" id="height" min="50" max="250" step="0.1" placeholder="请输入身高，例如：170">
        </div>
        
        <div class="form-group">
            <label for="weight">体重 (kg):</label>
            <input type="number" id="weight" min="20" max="300" step="0.1" placeholder="请输入体重，例如：65">
        </div>
        
        <div class="form-group">
            <label for="age">年龄:</label>
            <input type="number" id="age" min="18" max="120" placeholder="请输入年龄，例如：25">
        </div>
        
        <div class="form-group">
            <label>性别:</label>
            <div class="gender-group">
                <div class="gender-option">
                    <input type="radio" id="male" name="gender" value="male" checked>
                    <label for="male">男</label>
                </div>
                <div class="gender-option">
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">女</label>
                </div>
            </div>
        </div>
        
        <button id="calculate">计算</button>
        
        <div id="result" class="result hidden">
            <div class="result-item">
                <div>BMI值: <span id="bmi-value" class="result-value"></span></div>
                <div id="bmi-category" class="bmi-category"></div>
            </div>
            <div class="result-item">
                <div>体脂率: <span id="body-fat-value" class="result-value"></span></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('calculate').addEventListener('click', function() {
            // 获取输入值
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const age = parseInt(document.getElementById('age').value);
            const gender = document.querySelector('input[name="gender"]:checked').value;
            
            // 验证输入
            if (isNaN(height) || isNaN(weight) || isNaN(age)) {
                alert('请填写所有必填项！');
                return;
            }
            
            // 计算BMI
            const heightInMeters = height / 100;
            const bmi = weight / (heightInMeters * heightInMeters);
            
            // 计算体脂率
            // 使用美海军体脂率公式
            let bodyFat;
            if (gender === 'male') {
                // 男性体脂率公式
                bodyFat = 1.2 * bmi + 0.23 * age - 16.2;
            } else {
                // 女性体脂率公式
                bodyFat = 1.2 * bmi + 0.23 * age - 5.4;
            }
            
            // 显示结果
            document.getElementById('bmi-value').textContent = bmi.toFixed(2);
            document.getElementById('body-fat-value').textContent = bodyFat.toFixed(2) + '%';
            
            // 设置BMI分类
            let bmiCategory = '';
            let categoryClass = '';
            
            if (bmi < 18.5) {
                bmiCategory = '体重过轻';
                categoryClass = 'underweight';
            } else if (bmi >= 18.5 && bmi < 24) {
                bmiCategory = '正常范围';
                categoryClass = 'normal';
            } else if (bmi >= 24 && bmi < 28) {
                bmiCategory = '超重';
                categoryClass = 'overweight';
            } else {
                bmiCategory = '肥胖';
                categoryClass = 'obese';
            }
            
            const bmiCategoryElement = document.getElementById('bmi-category');
            bmiCategoryElement.textContent = '分类: ' + bmiCategory;
            bmiCategoryElement.className = 'bmi-category ' + categoryClass;
            
            // 显示结果区域
            document.getElementById('result').classList.remove('hidden');
        });
    </script>
</body>
</html>
