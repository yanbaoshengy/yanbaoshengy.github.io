<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魔方游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        body {
            overflow: hidden;
            touch-action: none;
            background-color: #FFFFFF;
            font-family: Arial, sans-serif;
            perspective: 1000px;
        }
        .cube-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            transform: translate(-50%, -50%);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px) rotate(0deg); }
            50% { transform: translate(-50%, -50%) translateY(-20px) rotate(2deg); }
        }
        .cube {
            width: 280px;
            height: 280px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.4);
            backface-visibility: hidden;
            transform: rotateX(-25deg) rotateY(-45deg);
        }
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            background: #000000;
            padding: 4px;
            border-radius: 12px;
            backface-visibility: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
        .cell {
            background: var(--color);
            border-radius: 6px;
            box-shadow: 
                inset 0 0 15px rgba(0, 0, 0, 0.7),
                0 0 2px rgba(255, 255, 255, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1.5px solid rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        .cell::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
        }
        .face.front { transform: translateZ(150px); }
        .face.back { transform: translateZ(-150px) rotateY(180deg); }
        .face.right { transform: translateX(150px) rotateY(90deg); }
        .face.left { transform: translateX(-150px) rotateY(-90deg); }
        .face.top { transform: translateY(-150px) rotateX(90deg); }
        .face.bottom { transform: translateY(150px) rotateX(-90deg); }
        #timer {
            position: fixed;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: #333;
            z-index: 10;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-family: 'Roboto Mono', monospace;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 10;
        }
        .control-button {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 8px;
            font-size: 20px;
            color: #333;
            cursor: pointer;
            padding: 12px 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .control-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            background: rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body>
    <div class="cube-container">
        <div class="cube" id="cube"></div>
    </div>
    <div id="timer">0:00</div>
    <div id="controls">
        <button class="control-button" id="resetBtn">↻ 重置</button>
        <button class="control-button" id="scrambleBtn">⟳ 打乱</button>
    </div>

    <script>
        // 魔方状态和常量
        const COLORS = {
            UP: '#FAFAFA',    // 更柔和的白色
            FRONT: '#00B300', // 更深的绿色
            RIGHT: '#E60000', // 更深的红色
            LEFT: '#FF8000',  // 更深的橙色
            BACK: '#0000E6',  // 更深的蓝色
            DOWN: '#E6E600'   // 更柔和的黄色
        };

        const FACES = ['front', 'back', 'right', 'left', 'top', 'bottom'];
        const cube = document.getElementById('cube');
        let cubeState = {};
        let rotationX = 0;
        let rotationY = 0;
        let startX, startY;
        let isDragging = false;
        let selectedLayer = null;
        let isLayerRotation = false;

        // 初始化魔方
        function initCube() {
            FACES.forEach(face => {
                const faceElement = document.createElement('div');
                faceElement.className = `face ${face}`;
                const color = COLORS[face.toUpperCase()];
                cubeState[face] = Array(9).fill(color);

                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.index = i;
                    cell.dataset.face = face;
                    cell.style.setProperty('--color', color);
                    cell.addEventListener('mousedown', handleCellClick);
                    cell.addEventListener('touchstart', handleCellClick, { passive: false });
                    faceElement.appendChild(cell);
                }

                cube.appendChild(faceElement);
            });
        }

        // 处理单元格点击
        function handleCellClick(e) {
            e.preventDefault();
            e.stopPropagation();
            const cell = e.target;
            selectedLayer = {
                face: cell.dataset.face,
                index: parseInt(cell.dataset.index)
            };
            isLayerRotation = true;
            startX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            startY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
        }

        // 处理层级旋转
        function handleLayerRotation(deltaX, deltaY) {
            if (!selectedLayer) return;
            const sensitivity = 0.1;
            const angle = Math.abs(deltaX) > Math.abs(deltaY) ? deltaX * sensitivity : deltaY * sensitivity;
            
            if (Math.abs(angle) > 90) {
                const direction = angle > 0 ? 1 : -1;
                rotateLayer(selectedLayer.face, selectedLayer.index, direction);
                selectedLayer = null;
                isLayerRotation = false;
                updateCubeState();
            }
        }

        // 旋转魔方层
        function rotateLayer(face, index, direction) {
            // 获取受影响的面和边缘
            const affectedFaces = getAffectedFaces(face, index);
            const tempColors = {};
            
            // 保存当前状态
            affectedFaces.forEach(f => {
                tempColors[f.face] = [...cubeState[f.face]];
            });
            
            // 更新状态
            affectedFaces.forEach((f, i) => {
                const nextFace = affectedFaces[(i + (direction > 0 ? 1 : 3)) % 4];
                f.indices.forEach((targetIndex, j) => {
                    cubeState[f.face][targetIndex] = tempColors[nextFace.face][nextFace.indices[j]];
                });
            });
            
            // 如果是整面旋转，还需要旋转该面
            if (index % 3 === 1) {
                rotateFace(face, direction);
            }
        }

        // 获取受影响的面和边缘
        function getAffectedFaces(face, index) {
            const row = Math.floor(index / 3);
            const col = index % 3;
            let faces = [];
            
            switch(face) {
                case 'front':
                    if (row === 0) faces = [
                        {face: 'top', indices: [6, 7, 8]},
                        {face: 'right', indices: [0, 3, 6]},
                        {face: 'bottom', indices: [2, 1, 0]},
                        {face: 'left', indices: [8, 5, 2]}
                    ];
                    else if (row === 2) faces = [
                        {face: 'top', indices: [0, 1, 2]},
                        {face: 'left', indices: [0, 3, 6]},
                        {face: 'bottom', indices: [8, 7, 6]},
                        {face: 'right', indices: [8, 5, 2]}
                    ];
                    if (col === 0) faces = [
                        {face: 'top', indices: [0, 3, 6]},
                        {face: 'back', indices: [8, 5, 2]},
                        {face: 'bottom', indices: [0, 3, 6]},
                        {face: 'front', indices: [0, 3, 6]}
                    ];
                    else if (col === 2) faces = [
                        {face: 'top', indices: [2, 5, 8]},
                        {face: 'front', indices: [2, 5, 8]},
                        {face: 'bottom', indices: [2, 5, 8]},
                        {face: 'back', indices: [6, 3, 0]}
                    ];
                    break;
                case 'back':
                    if (row === 0) faces = [
                        {face: 'top', indices: [2, 1, 0]},
                        {face: 'left', indices: [0, 3, 6]},
                        {face: 'bottom', indices: [6, 7, 8]},
                        {face: 'right', indices: [8, 5, 2]}
                    ];
                    else if (row === 2) faces = [
                        {face: 'top', indices: [8, 7, 6]},
                        {face: 'right', indices: [0, 3, 6]},
                        {face: 'bottom', indices: [0, 1, 2]},
                        {face: 'left', indices: [8, 5, 2]}
                    ];
                    break;
                case 'right':
                    if (row === 0) faces = [
                        {face: 'top', indices: [8, 5, 2]},
                        {face: 'back', indices: [0, 3, 6]},
                        {face: 'bottom', indices: [8, 5, 2]},
                        {face: 'front', indices: [8, 5, 2]}
                    ];
                    else if (row === 2) faces = [
                        {face: 'top', indices: [0, 3, 6]},
                        {face: 'front', indices: [0, 3, 6]},
                        {face: 'bottom', indices: [0, 3, 6]},
                        {face: 'back', indices: [8, 5, 2]}
                    ];
                    break;
                case 'left':
                    if (row === 0) faces = [
                        {face: 'top', indices: [0, 3, 6]},
                        {face: 'front', indices: [0, 3, 6]},
                        {face: 'bottom', indices: [0, 3, 6]},
                        {face: 'back', indices: [8, 5, 2]}
                    ];
                    else if (row === 2) faces = [
                        {face: 'top', indices: [8, 5, 2]},
                        {face: 'back', indices: [0, 3, 6]},
                        {face: 'bottom', indices: [8, 5, 2]},
                        {face: 'front', indices: [8, 5, 2]}
                    ];
                    break;
                case 'top':
                    if (row === 0) faces = [
                        {face: 'back', indices: [0, 1, 2]},
                        {face: 'right', indices: [0, 1, 2]},
                        {face: 'front', indices: [0, 1, 2]},
                        {face: 'left', indices: [0, 1, 2]}
                    ];
                    else if (row === 2) faces = [
                        {face: 'back', indices: [6, 7, 8]},
                        {face: 'left', indices: [6, 7, 8]},
                        {face: 'front', indices: [6, 7, 8]},
                        {face: 'right', indices: [6, 7, 8]}
                    ];
                    break;
                case 'bottom':
                    if (row === 0) faces = [
                        {face: 'front', indices: [0, 1, 2]},
                        {face: 'right', indices: [0, 1, 2]},
                        {face: 'back', indices: [0, 1, 2]},
                        {face: 'left', indices: [0, 1, 2]}
                    ];
                    else if (row === 2) faces = [
                        {face: 'front', indices: [6, 7, 8]},
                        {face: 'left', indices: [6, 7, 8]},
                        {face: 'back', indices: [6, 7, 8]},
                        {face: 'right', indices: [6, 7, 8]}
                    ];
                    break;
            }
            return faces;
        }

        // 旋转单个面
        function rotateFace(face, direction) {
            const temp = [...cubeState[face]];
            if (direction > 0) {
                // 顺时针旋转
                cubeState[face][0] = temp[6];
                cubeState[face][1] = temp[3];
                cubeState[face][2] = temp[0];
                cubeState[face][3] = temp[7];
                cubeState[face][5] = temp[1];
                cubeState[face][6] = temp[8];
                cubeState[face][7] = temp[5];
                cubeState[face][8] = temp[2];
            } else {
                // 逆时针旋转
                cubeState[face][0] = temp[2];
                cubeState[face][1] = temp[5];
                cubeState[face][2] = temp[8];
                cubeState[face][3] = temp[1];
                cubeState[face][5] = temp[7];
                cubeState[face][6] = temp[0];
                cubeState[face][7] = temp[3];
                cubeState[face][8] = temp[6];
            }
        }

        // 更新事件处理函数
        function handleMove(e) {
            if (!isDragging && !isLayerRotation) return;
            e.preventDefault();
            const currentX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            const currentY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            const deltaX = currentX - startX;
            const deltaY = currentY - startY;
            
            if (isLayerRotation) {
                handleLayerRotation(deltaX, deltaY);
            } else {
                rotateCube(deltaX, deltaY);
            }
            
            startX = currentX;
            startY = currentY;
        }

        function handleEnd() {
            isDragging = false;
            isLayerRotation = false;
            selectedLayer = null;
        }

        // 更新魔方状态
        function updateCubeState() {
            FACES.forEach(face => {
                const faceElement = document.querySelector(`.face.${face}`);
                const cells = faceElement.getElementsByClassName('cell');
                for (let i = 0; i < 9; i++) {
                    cells[i].style.setProperty('--color', cubeState[face][i]);
                }
            });
            
            // 检查是否完成
            checkCompletion();
        }

        // 检查魔方是否完成
        function checkCompletion() {
            const isComplete = FACES.every(face => {
                const colors = cubeState[face];
                return colors.every(color => color === colors[0]);
            });
            
            if (isComplete) {
                setTimeout(() => {
                    alert('恭喜！你已经完成了魔方！');
                }, 500);
            }
        }

        // 打乱魔方
        function scrambleCube() {
            const moves = 20;
            const faces = ['front', 'back', 'right', 'left', 'top', 'bottom'];
            
            for (let i = 0; i < moves; i++) {
                const face = faces[Math.floor(Math.random() * faces.length)];
                const index = Math.floor(Math.random() * 9);
                const direction = Math.random() > 0.5 ? 1 : -1;
                rotateLayer(face, index, direction);
            }
            
            updateCubeState();
        }

        // 初始化事件监听
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseup', handleEnd);
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('touchend', handleEnd);

        // 初始化按钮事件
        document.getElementById('scrambleBtn').addEventListener('click', scrambleCube);
        document.getElementById('resetBtn').addEventListener('click', () => {
            initCube();
            updateCubeState();
        });

        // 初始化魔方
        initCube();
        startTimer();
    </script>
</body>
</html>
