<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线秒表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            color: #fff;
            margin: 0 auto;
            max-width: 800px;
        }

        @media (min-width: 1024px) {
            body {
                margin-left: 35%;
                margin-right: 10%;
                align-items: flex-start;
                padding: 60px;
            }
        }

        .timer {
            font-size: 5rem;
            font-weight: 300;
            margin: 2rem 0 3rem;
            font-family: 'Courier New', monospace;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
            letter-spacing: 4px;
        }

        .buttons {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .btn {
            padding: 1rem 2.5rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
            color: #fff;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            font-weight: 500;
        }

        .btn:active {
            transform: translateY(2px);
        }

        .btn-start {
            background-color: #4CAF50;
        }

        .btn-start:hover {
            background-color: #45a049;
        }

        .btn-lap {
            background-color: #2196F3;
        }

        .btn-lap:hover {
            background-color: #1e88e5;
        }

        .btn-reset {
            background-color: #f44336;
        }

        .btn-reset:hover {
            background-color: #e53935;
        }

        .laps {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 1rem;
            backdrop-filter: blur(10px);
        }

        .lap-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .lap-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Courier New', monospace;
        }

        .lap-item:last-child {
            border-bottom: none;
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.5rem;
            }

            .timer {
                font-size: 2.5rem;
            }

            .buttons {
                flex-direction: column;
                width: 100%;
                max-width: 200px;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1 class="title">在线秒表</h1>
    <div class="timer" id="timer">00:00:000</div>
    <div class="buttons">
        <button class="btn btn-start" id="startBtn">▶ 开始</button>
        <button class="btn btn-lap" id="lapBtn">🚩 计次</button>
        <button class="btn btn-reset" id="resetBtn">↺ 复位</button>
    </div>
    <div class="laps">
        <div class="lap-title">计次记录</div>
        <div id="lapList"></div>
    </div>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let isRunning = false;
        let lapCount = 0;

        const timer = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const lapBtn = document.getElementById('lapBtn');
        const resetBtn = document.getElementById('resetBtn');
        const lapList = document.getElementById('lapList');

        function formatTime(ms) {
            const minutes = Math.floor(ms / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            const milliseconds = ms % 1000;
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}:${milliseconds.toString().padStart(3, '0')}`;
        }

        function updateTimer() {
            const currentTime = Date.now();
            elapsedTime = currentTime - startTime;
            timer.textContent = formatTime(elapsedTime);
        }

        startBtn.addEventListener('click', () => {
            if (!isRunning) {
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateTimer, 10);
                startBtn.textContent = '⏸ 暂停';
                startBtn.classList.remove('btn-start');
                startBtn.classList.add('btn-lap');
            } else {
                clearInterval(timerInterval);
                startBtn.textContent = '▶ 开始';
                startBtn.classList.remove('btn-lap');
                startBtn.classList.add('btn-start');
            }
            isRunning = !isRunning;
        });

        lapBtn.addEventListener('click', () => {
            if (isRunning) {
                lapCount++;
                const lapItem = document.createElement('div');
                lapItem.className = 'lap-item';
                lapItem.innerHTML = `
                    <span>第 ${lapCount} 次</span>
                    <span>${formatTime(elapsedTime)}</span>
                `;
                lapList.insertBefore(lapItem, lapList.firstChild);
            }
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(timerInterval);
            isRunning = false;
            elapsedTime = 0;
            lapCount = 0;
            timer.textContent = '00:00:000';
            lapList.innerHTML = '';
            startBtn.textContent = '▶ 开始';
            startBtn.classList.remove('btn-lap');
            startBtn.classList.add('btn-start');
        });
    </script>
</body>
</html>
