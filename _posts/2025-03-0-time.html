<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京时间校验</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #2c3e50;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: clamp(1rem, 4vw, 2.5rem);
            border-radius: clamp(12px, 2vw, 20px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15), 0 5px 15px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 650px;
            width: 92%;
            margin: clamp(0.5rem, 2vw, 1.5rem);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2), 0 8px 20px rgba(0,0,0,0.12);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 2.5rem;
            font-size: clamp(1.8rem, 3.5vw, 2.5rem);
            letter-spacing: 0.5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .time-box {
            background: linear-gradient(to bottom right, #ffffff, #f8f9fa);
            padding: clamp(1rem, 3vw, 2rem);
            border-radius: clamp(10px, 2vw, 15px);
            margin: clamp(1rem, 2vw, 1.5rem) 0;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .time-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .time {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: bold;
            color: #2c3e50;
            white-space: nowrap;
            letter-spacing: 1px;
            margin: 1rem 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .date {
            font-size: clamp(1.2rem, 2.5vw, 1.5rem);
            color: #34495e;
            margin-bottom: 1.5rem;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .timezone {
            color: #7f8c8d;
            font-size: 1rem;
            margin-top: 0.5rem;
            letter-spacing: 0.3px;
            opacity: 0.9;
        }

        h2 {
            color: #34495e;
            font-size: clamp(1.2rem, 2.5vw, 1.6rem);
            margin-bottom: 1rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .difference {
            color: #e74c3c;
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 5px;
            font-weight: bold;
        }
        @media screen and (max-width: 480px) {
            body {
                padding: 0.5rem;
            }
            .container {
                width: 96%;
                margin: 0.5rem;
            }
            .time-box {
                padding: 1rem;
            }
            .timezone {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>北京时间校验</h1>
        
        <div class="date" id="date"></div>
        
        <div class="time-box">
            <h2>北京标准时间</h2>
            <div class="time" id="beijingTime"></div>
            <div class="timezone">UTC/GMT+8小时 (东八区)</div>
        </div>


    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const beijingOffset = 8 * 60; // 北京时区偏移（分钟）
            
            // 计算北京时间
            const beijingTime = new Date(now.getTime());
            
            // 格式化时间显示
            const formatTime = (date) => {
                return date.toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    fractionalSecondDigits: 3,
                    hour12: false
                });
            };

            // 更新显示
            document.getElementById('beijingTime').textContent = formatTime(beijingTime);
            // 更新日期
            document.getElementById('date').textContent = beijingTime.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });


        }

        // 初始更新
        updateTime();

        // 每0.15秒更新一次
        setInterval(updateTime, 150);
    </script>
</body>
</html>
