<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气查询</title>
    <style>
        :root {
            --primary-color: #007aff; /* Modern blue */
            --secondary-color: #6c757d; /* Neutral gray */
            --light-bg: #f8f9fa;
            --dark-bg: #1c1c1e;
            --light-card-bg: #ffffff;
            --dark-card-bg: #2c2c2e;
            --light-text: #212529;
            --dark-text: #f8f9fa;
            --light-border: #e0e0e0; /* Softer border */
            --dark-border: #555; /* Softer dark border */
            --shadow-color: rgba(0, 0, 0, 0.08); /* Softer shadow */
            --shadow-color-hover: rgba(0, 0, 0, 0.12);
            --shadow-color-dark: rgba(0, 0, 0, 0.25);
            --shadow-color-dark-hover: rgba(0, 0, 0, 0.35);
            --hover-bg-light: #f0f0f0; /* Slightly lighter hover */
            --hover-bg-dark: #3f3f41;
            --border-radius-main: 16px; /* More rounded */
            --border-radius-item: 10px; /* More rounded items */
            --transition-speed: 0.25s;
        }

        html {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }
        *, *:before, *:after {
            box-sizing: inherit;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            margin: 0;
            background-color: var(--light-bg);
            color: var(--light-text);
            transition: background-color var(--transition-speed) ease, background-image var(--transition-speed) ease, color var(--transition-speed) ease;
            min-height: 100vh;
            padding: 15px; /* Adjusted padding for mobile first */
            line-height: 1.6;
        }
        .container {
            background-color: var(--light-card-bg);
            padding: 25px;
            border-radius: var(--border-radius-main);
            box-shadow: 0 6px 18px var(--shadow-color);
            max-width: 800px; /* Slightly reduced max-width */
            width: 100%;
            margin: 20px auto;
            transition: background-color var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
        }
        h1, h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 1.2em;
            font-weight: 700; /* Bolder headings */
        }
        h1 {
            font-size: 2em; /* Responsive font size base */
        }
        h2 {
             margin-top: 1.5em;
             font-size: 1.3em; /* Responsive font size base */
        }
        .weather-info, .forecast-section {
            margin-bottom: 20px;
            padding: 18px;
            background-color: var(--light-bg);
            border-radius: var(--border-radius-item);
            transition: background-color var(--transition-speed) ease;
            border: 1px solid var(--light-border); /* Add subtle border */
        }
        .weather-info p, .forecast-item p, .hourly-forecast-item p {
            margin: 6px 0;
            line-height: 1.7; /* Increased for better readability */
        }
        .forecast-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); /* Adjusted minmax */
            gap: 12px;
        }
        .hourly-forecast-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 12px 5px;
            scrollbar-width: thin;
            scrollbar-color: var(--secondary-color) var(--light-bg);
            border-radius: var(--border-radius-item);
            margin-bottom: 8px;
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
        }
        .hourly-forecast-container::-webkit-scrollbar {
            height: 8px;
        }
        .hourly-forecast-container::-webkit-scrollbar-track {
            background: var(--light-bg);
            border-radius: 4px;
        }
        .hourly-forecast-container::-webkit-scrollbar-thumb {
            background-color: var(--secondary-color);
            border-radius: 4px;
            border: 2px solid var(--light-bg);
        }
        .hourly-forecast-item, .forecast-item { /* Combined common styles */
            background-color: var(--light-card-bg);
            padding: 12px;
            border-radius: var(--border-radius-item);
            text-align: center;
            transition: transform var(--transition-speed) ease, box-shadow var(--transition-speed) ease;
            box-shadow: 0 3px 6px var(--shadow-color);
            border: 1px solid transparent; /* Placeholder for hover border */
        }
        .hourly-forecast-item {
            flex: 0 0 auto;
            min-width: 120px; /* Adjusted width */
        }
        .hourly-forecast-item:hover, .forecast-item:hover {
            transform: translateY(-4px) scale(1.02); /* More engaging hover */
            box-shadow: 0 5px 10px var(--shadow-color-hover);
            border-color: var(--primary-color);
        }
        #loading, #error {
            text-align: center;
            color: var(--secondary-color);
            font-weight: 500;
            margin-top: 25px;
            padding: 12px;
            border-radius: var(--border-radius-item);

        #error {

        #loading {
            color: var(--primary-color);

        strong {
            /* color: var(--light-text); Removed, will inherit */

        /* 夜间模式样式 */
        body.dark-mode {
            background-color: var(--dark-bg);
            color: var(--dark-text);

        .dark-mode .container {

        .dark-mode #loading {
            color: var(--primary-color);
        }

        .dark-mode .hourly-forecast-container {

        }
        .dark-mode .hourly-forecast-container::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }
        .dark-mode .hourly-forecast-container::-webkit-scrollbar-thumb {
            background-color: var(--secondary-color);
             border-color: var(--dark-bg);
        }

        /* Dynamic Weather Backgrounds (Keep existing, they are fine for now, might need adjustment if they clash) */
        body.weather-sunny { background: linear-gradient(to bottom, #87CEEB, #f0f9ff); }
        body.weather-cloudy { background: linear-gradient(to bottom, #bdc3c7, #eef2f3); }
        body.weather-overcast { background: linear-gradient(to bottom, #a9a9a9, #dcdcdc); }
        body.weather-rainy { background: linear-gradient(to bottom, #778899, #b0c4de); }
        body.weather-snowy { background: linear-gradient(to bottom, #e6e9f0, #ffffff); }
        body.weather-foggy { background: linear-gradient(to bottom, #d3d3d3, #f5f5f5); }
        body.dark-mode.weather-sunny { background: linear-gradient(to bottom, #0b1a2e, #1a3a5e); }
        body.dark-mode.weather-cloudy { background: linear-gradient(to bottom, #4a4e54, #2c3e50); }
        body.dark-mode.weather-overcast { background: linear-gradient(to bottom, #3a3a3a, #5a5a5a); }
        body.dark-mode.weather-rainy { background: linear-gradient(to bottom, #2c3e50, #465669); }
        body.dark-mode.weather-snowy { background: linear-gradient(to bottom, #4a4e54, #6e7f8f); }
        body.dark-mode.weather-foggy { background: linear-gradient(to bottom, #4a4e54, #7f8c8d); }

        /* Ensure container stands out against dynamic backgrounds */

        .dark-mode .container {
            background-color: rgba(44, 44, 46, 0.92); /* Adjusted dark alpha */

        #location-selection {

            background-color: var(--light-bg);

        #location-selection h2 {

    <script>
        // 删除不再需要的旧函数

        // 格式化日期时间
        // 修改格式化日期时间函数
        function formatDateTime(isoString) {
            if (!isoString) return 'N/A';
            try {
                const date = new Date(isoString);
                return date.toLocaleString('zh-CN', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric', 
                    hour: '2-digit', 
                    minute: '2-digit',
                    second: '2-digit'  // 添加秒的显示
                });
            } catch (e) {
                return isoString;
            }
        }

        // 格式化日期
        function formatDate(isoString) {
             if (!isoString) return 'N/A';
            try {
                const date = new Date(isoString);
                return date.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' });
            } catch (e) {
                return isoString; // Fallback if parsing fails
            }
        }

        // 格式化小时
        function formatHour(isoString) {
            if (!isoString) return 'N/A';
            try {
                const date = new Date(isoString);
                return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } catch (e) {
                return isoString; // Fallback if parsing fails
            }
        }

        // 格式化日期和小时 (例如: 4/26 14:00)
        function formatShortDateTime(isoString) {
            if (!isoString) return 'N/A';
            try {
                const date = new Date(isoString);
                return date.toLocaleString('zh-CN', {
                    month: 'numeric',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            } catch (e) {
                return isoString;
            }
        }

        const predefinedLocations = {

        // 填充地区选择列表 (已优化)
        function populateLocationList(searchTerm = '') {
            const listElement = document.getElementById('locationList');
            listElement.className = 'location-grid';
            listElement.innerHTML = '';
            const lowerSearchTerm = searchTerm.toLowerCase();
            const regex = searchTerm ? new RegExp(searchTerm, 'gi') : null;

            for (const province in predefinedLocations) {
                const provinceLower = province.toLowerCase();
                const provinceData = predefinedLocations[province];
                let citiesAndDistrictsForThisProvince = []; // Store {name, id, originalProvince, groupKey}

                // Step 1: Collect all cities/districts for the province and determine their group key
                for (const cityName in provinceData) {
                    const cityId = provinceData[cityName];
                    // Heuristic: Location IDs like 101010100 (Beijing city) vs 101010200 (Haidian district)
                    // For provinces like Hebei, 101090101 (Shijiazhuang city) vs 101090102 (Jingxing county) share prefix 1010901
                    // Beijing is special, its districts have different 7-digit prefixes.
                    // The logic will handle Beijing correctly when searching for "北京市" (province) which lists all its constituents.
                    const groupKey = cityId.substring(0, 7); 
                    citiesAndDistrictsForThisProvince.push({
                        name: cityName,
                        id: cityId,
                        originalProvince: province,
                        groupKey: groupKey
                    });
                }

                let itemsToShowForThisProvince = [];
                let provinceHeaderShouldBeShown = false;

                // Option A: Search term matches province name (e.g., "河北省" or "北京市")
                if (searchTerm && provinceLower.includes(lowerSearchTerm)) {
                    provinceHeaderShouldBeShown = true;
                    itemsToShowForThisProvince = citiesAndDistrictsForThisProvince.map(cityInfo => ({
                        ...cityInfo,
                        // Highlight city name if it also matches the search term (e.g. search "市", province "北京市", city "北京市")
                        displayName: regex && cityInfo.name.toLowerCase().includes(lowerSearchTerm) 
                                     ? cityInfo.name.replace(regex, match => `<span class="highlight">${match}</span>`)
                                     : cityInfo.name
                    }));
                } else {
                    // Option B: Search term matches a city/district name or implies a city group
                    let matchedGroupKeys = new Set();
                    let directMatchCities = [];

                    citiesAndDistrictsForThisProvince.forEach(cityInfo => {
                        if (cityInfo.name.toLowerCase().includes(lowerSearchTerm)) {
                            matchedGroupKeys.add(cityInfo.groupKey);
                            directMatchCities.push(cityInfo.name); // Keep track of direct matches for highlighting
                        }
                    });

                    if (matchedGroupKeys.size > 0) {
                        provinceHeaderShouldBeShown = true;
                        citiesAndDistrictsForThisProvince.forEach(cityInfo => {
                            if (matchedGroupKeys.has(cityInfo.groupKey)) {
                                let highlightedName = cityInfo.name;
                                // Highlight only if this city name was a direct match for the search term
                                if (regex && cityInfo.name.toLowerCase().includes(lowerSearchTerm)) {
                                    highlightedName = cityInfo.name.replace(regex, match => `<span class="highlight">${match}</span>`);
                                }
                                itemsToShowForThisProvince.push({
                                    ...cityInfo,
                                    displayName: highlightedName
                                });
                            }
                        });
                    }
                }
                
                // Default case: if no search term, show all
                if (!searchTerm && citiesAndDistrictsForThisProvince.length > 0) {
                    provinceHeaderShouldBeShown = true;
                    itemsToShowForThisProvince = citiesAndDistrictsForThisProvince.map(cityInfo => ({
                        ...cityInfo,
                        displayName: cityInfo.name
                    }));
                }


                if (provinceHeaderShouldBeShown && itemsToShowForThisProvince.length > 0) {
                    const provinceHeader = document.createElement('div');
                    let displayProvinceName = province;
                    if (regex && provinceLower.includes(lowerSearchTerm)) {
                         displayProvinceName = province.replace(regex, match => `<span class="highlight">${match}</span>`);
                    }
                    provinceHeader.innerHTML = displayProvinceName; // Use innerHTML for potential highlight
                    provinceHeader.className = 'province-header';
                    listElement.appendChild(provinceHeader);

                    // Sort items based on administrative level and name
                    // Level 0: 地级市 (市, 盟)
                    // Level 1: 区县级 (区, 县, 旗, and entries without specific suffixes under a province)
                    function getLocationLevel(name) {
                        if (name.endsWith('盟')) return 0; 
                        if (name.endsWith('市')) return 0; 
                        if (name.endsWith('区') || name.endsWith('县') || name.endsWith('旗')) return 1;
                        // Default for entries like "井陉" under "河北省", considered county-level for sorting
                        return 1; 
                    }

                    itemsToShowForThisProvince.sort((a, b) => {
                        const levelA = getLocationLevel(a.name);
                        const levelB = getLocationLevel(b.name);

                        if (levelA !== levelB) {
                            return levelA - levelB; // Lower level (0) comes first
                        }
                        // Same level, sort by name
                        return a.name.localeCompare(b.name, 'zh-CN');
                    });

                    itemsToShowForThisProvince.forEach(cityInfo => {
                        const cityItem = document.createElement('div');
                        cityItem.innerHTML = cityInfo.displayName;
                        cityItem.className = 'city-item';
                        cityItem.dataset.locationId = cityInfo.id;
                        cityItem.dataset.locationName = `${cityInfo.originalProvince} - ${cityInfo.name}`; // Use original name for dataset
                        cityItem.addEventListener('click', handleLocationSelection);
                        listElement.appendChild(cityItem);
                    });
                }
            }
        }

        // 处理地区选择 (已修复)
        function handleLocationSelection(event) {
            // IMPORTANT FIX: Use event.currentTarget instead of event.target
            const locationId = event.currentTarget.dataset.locationId;
            const locationName = event.currentTarget.dataset.locationName;

            if (!locationId) {
                console.error("错误：在点击的元素上未找到Location ID。", event.currentTarget);
                const errorDiv = document.getElementById('error');
                errorDiv.textContent = '选择地点时发生错误，无法获取地点ID。请重试。';
                errorDiv.style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                document.getElementById('weather-display').style.display = 'none';
                // Optionally, re-display location selection
                // document.getElementById('location-selection').style.display = 'block';
                return;
            }

            document.getElementById('location-selection').style.display = 'none';
            fetchWeatherForLocation(locationId, locationName);
        }

        async function fetchWeatherForLocation(locationParam, locationName) {
            const apiKey = '3fc0349919754c0289521bd69b065d8c'; 
            const apiHost = 'jy65nm68e3.re.qweatherapi.com'; 
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const weatherDisplayDiv = document.getElementById('weather-display');

            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            weatherDisplayDiv.style.display = 'none';

            try {
                
                const nowUrl = `https://${apiHost}/v7/weather/now?location=${locationParam}&key=${apiKey}&lang=zh`;
                const forecastUrl = `https://${apiHost}/v7/weather/7d?location=${locationParam}&key=${apiKey}&lang=zh`;
                const hourlyUrl = `https://${apiHost}/v7/weather/72h?location=${locationParam}&key=${apiKey}&lang=zh`;
                const warningUrl = `https://${apiHost}/v7/warning/now?location=${locationParam}&key=${apiKey}&lang=zh`;

                const [nowResponse, forecastResponse, hourlyResponse, warningResponse] = await Promise.all([
                    fetch(nowUrl),
                    fetch(forecastUrl),
                    fetch(hourlyUrl),
                    fetch(warningUrl)
                ]);

                // 检查响应状态
                if (!nowResponse.ok || !forecastResponse.ok || !hourlyResponse.ok || !warningResponse.ok) {
                    let errorMsg = 'API请求失败: ';
                    if (!nowResponse.ok) errorMsg += `实时天气(${nowResponse.status}) `;
                    if (!forecastResponse.ok) errorMsg += `7天预报(${forecastResponse.status}) `;
                    if (!hourlyResponse.ok) errorMsg += `逐小时预报(${hourlyResponse.status}) `;
                    if (!warningResponse.ok) errorMsg += `天气预警(${warningResponse.status}) `;
                    // 尝试获取更详细的错误信息
                    try {
                        if (!nowResponse.ok) errorMsg += ` Details: ${await nowResponse.text()};`;
                        if (!forecastResponse.ok) errorMsg += ` Details: ${await forecastResponse.text()};`;
                        if (!hourlyResponse.ok) errorMsg += ` Details: ${await hourlyResponse.text()};`;
                        if (!warningResponse.ok) errorMsg += ` Details: ${await warningResponse.text()};`;
                    } catch (e) { console.error("Error parsing error response text:", e); }
                    throw new Error(errorMsg);
                }

                const [nowData, forecastData, hourlyData, warningData] = await Promise.all([
                    nowResponse.json(),
                    forecastResponse.json(),
                    hourlyResponse.json(),
                    warningResponse.json()
                ]);

                
                if (nowData.code !== '200' || forecastData.code !== '200' || hourlyData.code !== '200' || warningData.code !== '200') {
                    let errorMsg = 'API返回错误码: ';
                    if (nowData.code !== '200') errorMsg += `实时天气(${nowData.code}) `;
                    if (forecastData.code !== '200') errorMsg += `7天预报(${forecastData.code}) `;
                    if (hourlyData.code !== '200') errorMsg += `逐小时预报(${hourlyData.code}) `;
                    if (warningData.code !== '200') errorMsg += `天气预警(${warningData.code}) `;
                    throw new Error(errorMsg);
                }
                // 显示天气预警
                displayWeatherAlerts(warningData.warning, hourlyData.hourly);

                const now = nowData.now;
                document.getElementById('locationName').textContent = locationName; // 使用传入的地点名称
                document.getElementById('obsTime').textContent = formatDateTime(now.obsTime);
                document.getElementById('currentTemp').textContent = `${now.temp}℃`;
                document.getElementById('feelsLike').textContent = `${now.feelsLike}℃`;
                document.getElementById('currentWeatherText').textContent = now.text;
                document.getElementById('currentWindDir').textContent = now.windDir;
                document.getElementById('currentWindScale').textContent = now.windScale;
                document.getElementById('currentHumidity').textContent = `${now.humidity}%`;
                document.getElementById('precip').textContent = `${now.precip} mm`;
                document.getElementById('pressure').textContent = `${now.pressure} hPa`;

                
                const todayForecast = forecastData.daily[0];
                document.getElementById('weather').textContent = todayForecast.textDay;
                document.getElementById('temperature').textContent = `${todayForecast.tempMin}℃ ~ ${todayForecast.tempMax}℃`;
                document.getElementById('windDirection').textContent = todayForecast.windDirDay;
                document.getElementById('windScale').textContent = `${todayForecast.windScaleDay}级`;
                document.getElementById('pubTime').textContent = formatDateTime(forecastData.updateTime);
                document.getElementById('humidity').textContent = `${todayForecast.humidity}%`;

                
                // 处理24小时预报数据
                const forecastHourlyDiv = document.getElementById('forecastHourly');
                forecastHourlyDiv.innerHTML = '';
                hourlyData.hourly.forEach(hour => {
                    const item = document.createElement('div');
                    item.classList.add('hourly-forecast-item');
                    item.innerHTML = `
                        <p><strong>${formatShortDateTime(hour.fxTime)}</strong></p>
                        <p>${hour.text}</p>
                        <p style="font-size: 1.2em; color: #0056b3;">${hour.temp}℃</p>
                        <p>${hour.windDir} ${hour.windScale}级</p>
                        <p>湿度: ${hour.humidity}%</p>
                        <p>降水: ${hour.precip}mm</p>
                        <p>降水概率: ${hour.pop}%</p>
                    `;
                    forecastHourlyDiv.appendChild(item);
                });

                const forecastDailyDiv = document.getElementById('forecastDaily');
                forecastDailyDiv.innerHTML = '';
                forecastData.daily.slice(1).forEach(day => {
                    const item = document.createElement('div');
                    item.classList.add('forecast-item');
                    item.innerHTML = `
                        <p><strong>日期:</strong> ${day.fxDate}</p>
                        <p><strong>天气:</strong> ${day.textDay}</p>
                        <p><strong>温度:</strong> ${day.tempMin}℃ ~ ${day.tempMax}℃</p>
                        <p><strong>风向:</strong> ${day.windDirDay} ${day.windScaleDay}级</p>
                    `;
                    forecastDailyDiv.appendChild(item);
                });

                
                weatherDisplayDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
            } catch (error) {
                console.error('获取天气数据失败:', error);
                errorDiv.textContent = `加载天气数据失败: ${error.message}`;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
                // 如果是因为获取特定地点天气失败，可以选择显示地区选择列表
                // populateLocationList();
                // document.getElementById('location-selection').style.display = 'block';
            }
        }

        // 显示天气预警函数
        function displayWeatherAlerts(warnings, hourlyForecasts) {
            const alertsContainerDiv = document.getElementById('alertsContainer');
            const weatherAlertsSectionDiv = document.getElementById('weatherAlerts');
            alertsContainerDiv.innerHTML = ''; // 清空旧的预警
            let hasAlerts = false;

            if (warnings && warnings.length > 0) {
                hasAlerts = true;
                warnings.forEach(alert => {
                    const alertItem = document.createElement('div');
                    alertItem.classList.add('alert-item');
                    
                    // 尝试根据API提供的颜色或预警级别设定边框颜色
                    let borderColor = 'var(--primary-color)'; // 默认颜色
                    if (alert.color) { // 和风天气API有时会直接提供颜色代码
                        borderColor = alert.color;
                    } else if (alert.severityColor) { // 或者 severityColor
                         borderColor = alert.severityColor;
                    } else { // 根据常见的预警级别文本判断
                        const levelText = alert.level ? alert.level.toLowerCase() : '';
                        if (levelText.includes('蓝色')) borderColor = '#007bff';
                        else if (levelText.includes('黄色')) borderColor = '#ffc107';
                        else if (levelText.includes('橙色')) borderColor = '#fd7e14';
                        else if (levelText.includes('红色')) borderColor = '#dc3545';
                    }
                    alertItem.style.borderLeftColor = borderColor;
                    
                    // 如果有标题颜色，也一并设置
                    const titleElement = alertItem.querySelector('h4');
                    if (titleElement) {
                        titleElement.style.color = borderColor;
                    }


                    let timeInfo = `发布时间: ${formatDateTime(alert.pubTime)}`;
                    if (alert.startTime && alert.endTime) {
                        timeInfo += `<br>开始: ${formatDateTime(alert.startTime)} | 结束: ${formatDateTime(alert.endTime)}`;
                    } else if (alert.startTime) {
                         timeInfo += `<br>开始: ${formatDateTime(alert.startTime)}`;
                    }

                    alertItem.innerHTML = `
                        <h4 style="color: ${borderColor};">${alert.title} ( ${alert.typeName} - ${alert.level} )</h4>
                        <p class="alert-time">${timeInfo}</p>
                        <p>${alert.text}</p>
                    `;
                    alertsContainerDiv.appendChild(alertItem);
                });
            }

            // 添加未来重要天气提醒 (已优化为综合显示)
            const specialWeatherKeywords = {
                rain: ["雨", "雷阵雨", "阵雨", "小雨", "中雨", "大雨", "暴雨", "大暴雨", "特大暴雨"],
                snow: ["雪", "雨夹雪", "小雪", "中雪", "大雪", "暴雪"],
                thunder: ["雷"],
                fog: ["雾"],
                strongWindMinScale: 6 // 定义大风的最低等级
            };

            let hourlySummary = {
                rainPeriods: [],
                snowPeriods: [],
                thunderPeriods: [],
                fogPeriods: [],
                strongWindPeriods: [],
                maxPrecip: 0,
                maxWindScale: 0,
                firstSignificantTime: null
            };

            if (hourlyForecasts && hourlyForecasts.length > 0) {
                let currentRainPeriod = null;
                let currentSnowPeriod = null;
                // ... (可以为其他天气类型添加类似 currentXXXPeriod 变量)

                hourlyForecasts.forEach((hour, index) => {
                    const hourText = hour.text || "";
                    const hourPrecip = parseFloat(hour.precip || 0);
                    let windScaleNumber = 0;
                    if (hour.windScale) {
                        const scaleMatch = hour.windScale.match(/\d+/);
                        if (scaleMatch) windScaleNumber = parseInt(scaleMatch[0], 10);
                    }

                    const fxTime = new Date(hour.fxTime);
                    if (!hourlySummary.firstSignificantTime) hourlySummary.firstSignificantTime = fxTime;


                    // 降雨
                    if (hourPrecip > 0 || specialWeatherKeywords.rain.some(keyword => hourText.includes(keyword))) {
                        if (!currentRainPeriod) {
                            currentRainPeriod = { start: fxTime, end: fxTime, details: [hourText], totalPrecip: hourPrecip, maxHourPrecip: hourPrecip };
                        } else {
                            currentRainPeriod.end = fxTime;
                            currentRainPeriod.details.push(hourText);
                            currentRainPeriod.totalPrecip += hourPrecip;
                            currentRainPeriod.maxHourPrecip = Math.max(currentRainPeriod.maxHourPrecip, hourPrecip);
                        }
                        hourlySummary.maxPrecip = Math.max(hourlySummary.maxPrecip, hourPrecip);
                    } else if (currentRainPeriod) {
                        hourlySummary.rainPeriods.push(currentRainPeriod);
                        currentRainPeriod = null;
                    }

                    // 降雪 (类似降雨逻辑)
                    if (specialWeatherKeywords.snow.some(keyword => hourText.includes(keyword))) {
                         if (!currentSnowPeriod) {
                            currentSnowPeriod = { start: fxTime, end: fxTime, details: [hourText] };
                        } else {
                            currentSnowPeriod.end = fxTime;
                            currentSnowPeriod.details.push(hourText);
                        }
                    } else if (currentSnowPeriod) {
                        hourlySummary.snowPeriods.push(currentSnowPeriod);
                        currentSnowPeriod = null;
                    }
                    
                    // 雷电
                    if (specialWeatherKeywords.thunder.some(keyword => hourText.includes(keyword))) {
                        hourlySummary.thunderPeriods.push({ time: fxTime, text: hourText });
                    }
                    // 雾
                    if (specialWeatherKeywords.fog.some(keyword => hourText.includes(keyword))) {
                        hourlySummary.fogPeriods.push({ time: fxTime, text: hourText });
                    }
                    // 大风
                    if (windScaleNumber >= specialWeatherKeywords.strongWindMinScale) {
                        hourlySummary.strongWindPeriods.push({ time: fxTime, text: `${hour.windDir}${hour.windScale}`, scale: windScaleNumber });
                        hourlySummary.maxWindScale = Math.max(hourlySummary.maxWindScale, windScaleNumber);
                    }

                    // 确保在循环结束时将最后一个时段加入
                    if (index === hourlyForecasts.length - 1) {
                        if (currentRainPeriod) hourlySummary.rainPeriods.push(currentRainPeriod);
                        if (currentSnowPeriod) hourlySummary.snowPeriods.push(currentSnowPeriod);
                    }
                });

                let summaryMessageText = ""; 
                let detailsAdded = false;

                if (hourlySummary.rainPeriods.length > 0) {
                    summaryMessageText += "降雨提醒：";
                    hourlySummary.rainPeriods.forEach(period => {
                        const uniqueRainDetails = [...new Set(period.details)].join('转'); // 更清晰地描述转变
                        summaryMessageText += `从 ${formatShortDateTime(period.start)} 至 ${formatShortDateTime(period.end)} 有${uniqueRainDetails}，期间最大小时降水量约 ${period.maxHourPrecip.toFixed(1)}mm。`;
                    });
                    detailsAdded = true;
                    hasAlerts = true;
                }

                if (hourlySummary.snowPeriods.length > 0) {
                    if (detailsAdded) summaryMessageText += "<br>"; else summaryMessageText += "降雪提醒：";
                    hourlySummary.snowPeriods.forEach(period => {
                        const uniqueSnowDetails = [...new Set(period.details)].join('转');
                        summaryMessageText += `从 ${formatShortDateTime(period.start)} 至 ${formatShortDateTime(period.end)} 可能有${uniqueSnowDetails}。`;
                    });
                    detailsAdded = true;
                    hasAlerts = true;
                }

                if (hourlySummary.strongWindPeriods.length > 0) {
                    if (detailsAdded) summaryMessageText += "<br>"; else summaryMessageText += "大风提醒：";
                    let windMsg = `将有大风天气，`;
                    let windTimes = [];
                    let maxReportedScale = 0;
                    let windDetails = [];
                    hourlySummary.strongWindPeriods.forEach(wp => {
                        windTimes.push(formatShortDateTime(wp.time));
                        maxReportedScale = Math.max(maxReportedScale, wp.scale);
                        if (!windDetails.some(d => d.includes(wp.text))) { //避免重复风力描述
                            windDetails.push(wp.text);
                        }
                    });
                    if (windTimes.length > 0) {
                         windMsg += `主要影响时段包括 ${[...new Set(windTimes)].slice(0,3).join('、')} 等，最大风力可达 ${maxReportedScale}级 (${[...new Set(windDetails)].join('/')})。`;
                    }
                    summaryMessageText += windMsg;
                    detailsAdded = true;
                    hasAlerts = true;
                }
                
                if (hourlySummary.thunderPeriods.length > 0) {
                    if (detailsAdded) summaryMessageText += "<br>"; else summaryMessageText += "雷电提醒：";
                    let thunderTimes = hourlySummary.thunderPeriods.map(tp => formatShortDateTime(tp.time));
                    summaryMessageText += `在 ${[...new Set(thunderTimes)].slice(0,3).join('、')} 等时段局部可能伴有雷电。`;
                    detailsAdded = true;
                    hasAlerts = true;
                }

                if (hourlySummary.fogPeriods.length > 0) {
                    if (detailsAdded) summaryMessageText += "<br>"; else summaryMessageText += "雾天提醒：";
                    let fogTimes = hourlySummary.fogPeriods.map(fp => formatShortDateTime(fp.time));
                     summaryMessageText += `在 ${[...new Set(fogTimes)].slice(0,3).join('、')} 等时段可能出现雾，请注意交通安全。`;
                    detailsAdded = true;
                    hasAlerts = true;
                }

                if (summaryMessageText) { 
                    const alertItem = document.createElement('div');
                    // 使用更简洁的样式，或者可以定义一个新的CSS类
                    alertItem.style.padding = "10px";
                    alertItem.style.marginTop = "10px";
                    alertItem.style.border = "1px solid var(--light-border)";
                    alertItem.style.borderRadius = "var(--border-radius-item)";
                    alertItem.style.backgroundColor = "var(--light-bg)";
                    // 对于暗黑模式，可以添加一个类或直接判断
                    if (document.body.classList.contains('dark-mode')) {
                        alertItem.style.borderColor = "var(--dark-border)";
                        alertItem.style.backgroundColor = "var(--dark-bg)";
                    }

                    alertItem.innerHTML = `
                        <h4 style="color: var(--primary-color); margin-bottom: 5px; font-size: 1em;">未来天气关注</h4>
                        <p style="font-size: 0.9em; line-height: 1.5;">${summaryMessageText}</p> 
                    `; // 修改变量名
                    alertsContainerDiv.appendChild(alertItem);
                }

                // --- 新增：在综合提醒下方列出未来几小时的详细天气点 ---
                let detailedHourlyPointsHTML = "";
                const hoursToDetail = 12; // 列出未来12小时内的详细点，或根据实际数据调整
                let detailedPointsCount = 0;

                if (hourlyForecasts && hourlyForecasts.length > 0) {
                    const now = new Date();
                    for (let i = 0; i < hourlyForecasts.length && detailedPointsCount < hoursToDetail; i++) {
                        const hour = hourlyForecasts[i];
                        const fxTime = new Date(hour.fxTime);
                        // 只显示未来的时间点
                        if (fxTime < now && i < hourlyForecasts.length -1 ) continue; // 如果是过去时间点且不是最后一个，跳过

                        const hourText = hour.text || "";
                        const hourPrecip = parseFloat(hour.precip || 0);
                        let windScaleNumber = 0;
                        if (hour.windScale) {
                            const scaleMatch = hour.windScale.match(/\d+/);
                            if (scaleMatch) windScaleNumber = parseInt(scaleMatch[0], 10);
                        }

                        let isSignificant = false;
                        if (hourPrecip > 0 || specialWeatherKeywords.rain.some(keyword => hourText.includes(keyword))) isSignificant = true;
                        if (specialWeatherKeywords.snow.some(keyword => hourText.includes(keyword))) isSignificant = true;
                        if (specialWeatherKeywords.thunder.some(keyword => hourText.includes(keyword))) isSignificant = true;
                        if (specialWeatherKeywords.fog.some(keyword => hourText.includes(keyword))) isSignificant = true;
                        if (windScaleNumber >= specialWeatherKeywords.strongWindMinScale) isSignificant = true;
                        
                        // 如果该小时有显著天气，或者即使没有显著天气但也想列出一些（可选逻辑）
                        // 当前逻辑：只列出有显著天气的点，或者如果还没有列出任何点，则列出第一个未来的点
                        if (isSignificant || (detailedPointsCount === 0 && fxTime >= now) ) {
                             if (detailedPointsCount === 0 && summaryMessageText) { // 如果有总结，且是第一个详细点，加个标题
                                detailedHourlyPointsHTML += `<h5 style="margin-top: 15px; margin-bottom: 5px; color: var(--secondary-color); font-size:0.95em;">具体天气点关注:</h5><ul style="list-style-type: none; padding-left: 0; font-size: 0.85em; line-height: 1.6;">`;
                            } else if (detailedPointsCount === 0) { // 没有总结，直接开始列表
                                detailedHourlyPointsHTML += `<ul style="list-style-type: none; padding-left: 0; font-size: 0.85em; line-height: 1.6; margin-top:10px;">`;
                            }
                            detailedHourlyPointsHTML += `<li style="padding: 3px 0; border-bottom: 1px dashed var(--light-border);">`;
                            detailedHourlyPointsHTML += `<strong>${formatShortDateTime(hour.fxTime)}:</strong> ${hour.text}`;
                            if (hourPrecip > 0) detailedHourlyPointsHTML += ` (降水${hour.precip}mm)`;
                            detailedHourlyPointsHTML += `, ${hour.windDir} ${hour.windScale}级`;
                            detailedHourlyPointsHTML += `</li>`;
                            detailedPointsCount++;
                            hasAlerts = true; // 确保天气预警区域会显示
                        }
                    }
                    if (detailedPointsCount > 0) {
                        detailedHourlyPointsHTML += "</ul>";
                        // 将详细列表添加到 alertsContainerDiv
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = detailedHourlyPointsHTML;
                        while(tempDiv.firstChild){
                            alertsContainerDiv.appendChild(tempDiv.firstChild);
                        }
                    }
                }
            }


            if (!hasAlerts) {
                weatherAlertsSectionDiv.style.display = 'block'; // 确保区域可见
                alertsContainerDiv.innerHTML = '<p>当前无生效预警或重要天气提醒。</p>';
            } else {
                weatherAlertsSectionDiv.style.display = 'block';
            }
        }

        // 尝试获取地理位置并获取天气
        async function fetchWeatherData() {
            const apiKey = '3fc0349919754c0289521bd69b065d8c';
            const apiHost = 'jy65nm68e3.re.qweatherapi.com';
            let locationParam = '101010100'; //
            let locationName = '北京 (默认)';
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const weatherDisplayDiv = document.getElementById('weather-display');
            const locationSelectionDiv = document.getElementById('location-selection');

            loadingDiv.style.display = 'block';
            errorDiv.style.display = 'none';
            weatherDisplayDiv.style.display = 'none';
            locationSelectionDiv.style.display = 'none';

            try {
                // 1. 获取地理位置 (保持不变)
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
                    });
                    locationParam = `${position.coords.longitude.toFixed(2)},${position.coords.latitude.toFixed(2)}`;
                    locationName = `经度: ${position.coords.longitude.toFixed(2)}, 纬度: ${position.coords.latitude.toFixed(2)}`;
                    console.log('Using geolocation:', locationParam);
                    // 使用获取到的经纬度获取天气
                    fetchWeatherForLocation(locationParam, `当前位置 (${locationName})`);
                } catch (geoError) {
                    console.warn('Geolocation failed or timed out, showing location selection:', geoError.message);
                    // 地理位置获取失败或超时，显示地区选择列表
                    loadingDiv.style.display = 'none';
                    populateLocationList(); // Populate initially without search term
                    locationSelectionDiv.style.display = 'block';

                    // Add event listener for search input
                    const locationSearchInput = document.getElementById('locationSearch');
                    locationSearchInput.addEventListener('input', (event) => {
                        populateLocationList(event.target.value);
                    });

                    // 此处不再继续执行后续的天气获取逻辑，等待用户选择
                    return; // 退出函数
                }

                // // 后续代码移至 fetchWeatherForLocation 函数中，这里不再需要
                // // 2. 构建实时天气和7天预报的 API URL
                // const nowUrl = `https://${apiHost}/v7/weather/now?location=${locationParam}&key=${apiKey}&lang=zh`;
                // const forecastUrl = `https://${apiHost}/v7/weather/7d?location=${locationParam}&key=${apiKey}&lang=zh`;
                // ... (省略移走的代码)
            } catch (error) { // 恢复对 fetchWeatherData 中可能发生的其他错误的捕获 (虽然主要逻辑已移走)
                console.error('在 fetchWeatherData 中发生意外错误:', error);
                errorDiv.textContent = `加载初始化过程失败: ${error.message}`;
                errorDiv.style.display = 'block';
                loadingDiv.style.display = 'none';
            }
        }

        // 检测系统夜间模式
        function checkDarkMode() {
            const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (isDark) {
                document.body.classList.add('dark-mode');
            }

            // 监听系统主题变化
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (e.matches) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
            });
        }

        // 页面加载完成后获取默认数据
        document.addEventListener('DOMContentLoaded', () => {
            checkDarkMode();
            fetchWeatherData(); // Start the process: try geolocation first
        });
    </script>
