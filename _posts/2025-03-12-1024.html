<!DOCTYPE html>

    <style>
        * {

        }
        .score-box {
            background: #bbada0;

            font-size: 14px;

        .score-value {
            font-size: 24px;

        .game-container {
            width: 400px;

        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 30px; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 30px; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 25px; }

            position: absolute;

            display: flex;
        }
        .game-over h2 {

        .new-game-btn {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>1024</h1>
        <div class="scores">
            <div class="score-box">
                <div class="score-title">分数</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-title">最高分</div>
                <div class="score-value" id="best-score">0</div>
            </div>
        </div>
        <button class="new-game-header-btn" onclick="startNewGame()">新游戏</button>
    </div>
    
    <div class="game-container">
        <div class="grid" id="grid"></div>
        <div class="game-over" id="game-over">
            <h2>游戏结束!</h2>
            <button class="new-game-btn" onclick="startNewGame()">新游戏</button>
        </div>
    </div>

    <script>
        class Game {
            constructor() {
                this.grid = Array(4).fill().map(() => Array(4).fill(0));
                this.score = 0;
                this.bestScore = parseInt(localStorage.getItem('bestScore')) || 0;
                this.gameOver = false;
                this.init();
            }

            init() {
                this.createGrid();
                this.addRandomTile();
                this.addRandomTile();
                this.updateDisplay();
                document.addEventListener('keydown', this.handleKeyPress.bind(this));
                // 添加触摸事件支持
                let touchStartX = 0;
                let touchStartY = 0;
                document.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                });
                document.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                });
                document.addEventListener('touchend', (e) => {
                    if (this.gameOver) return;
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    const deltaX = touchEndX - touchStartX;
                    const deltaY = touchEndY - touchStartY;
                    const minSwipeDistance = 30;
                    let moved = false;
                    if (Math.abs(deltaX) > Math.abs(deltaY)) {
                        if (Math.abs(deltaX) > minSwipeDistance) {
                            if (deltaX > 0) {
                                moved = this.moveRight();
                            } else {
                                moved = this.moveLeft();
                            }
                        }
                    } else {
                        if (Math.abs(deltaY) > minSwipeDistance) {
                            if (deltaY > 0) {
                                moved = this.moveDown();
                            } else {
                                moved = this.moveUp();
                            }
                        }
                    }
                    if (moved) {
                        this.addRandomTile();
                        if (this.checkGameOver()) {
                            this.gameOver = true;
                            if (this.score > this.bestScore) {
                                this.bestScore = this.score;
                                localStorage.setItem('bestScore', this.bestScore);
                            }
                        }
                        this.updateDisplay();
                    }
                });
            }

            createGrid() {
                const gridElement = document.getElementById('grid');
                gridElement.innerHTML = '';
                for (let i = 0; i < 16; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    gridElement.appendChild(cell);
                }
            }

            addRandomTile() {
                const emptyCells = [];
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (this.grid[i][j] === 0) {
                            emptyCells.push({x: i, y: j});
                        }
                    }
                }
                if (emptyCells.length > 0) {
                    const {x, y} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.grid[x][y] = Math.random() < 0.9 ? 2 : 4;
                }
            }

            updateDisplay() {
                const gridElement = document.getElementById('grid');
                gridElement.innerHTML = '';
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if (this.grid[i][j] !== 0) {
                            const tile = document.createElement('div');
                            tile.className = `tile tile-${this.grid[i][j]}`;
                            tile.textContent = this.grid[i][j];
                            cell.appendChild(tile);
                        }
                        gridElement.appendChild(cell);
                    }
                }
                document.getElementById('score').textContent = this.score;
                document.getElementById('best-score').textContent = this.bestScore;
                document.getElementById('game-over').className = 
                    this.gameOver ? 'game-over show' : 'game-over';
            }

            handleKeyPress(event) {
                if (this.gameOver) return;
                let moved = false;
                const oldGrid = JSON.stringify(this.grid);

                switch(event.key) {
                    case 'ArrowUp':
                        moved = this.moveUp();
                        break;
                    case 'ArrowDown':
                        moved = this.moveDown();
                        break;
                    case 'ArrowLeft':
                        moved = this.moveLeft();
                        break;
                    case 'ArrowRight':
                        moved = this.moveRight();
                        break;
                    default:
                        return;
                }

                if (moved) {
                    this.addRandomTile();
                    if (this.checkGameOver()) {
                        this.gameOver = true;
                        if (this.score > this.bestScore) {
                            this.bestScore = this.score;
                            localStorage.setItem('bestScore', this.bestScore);
                        }
                    }
                    this.updateDisplay();
                }
            }

            moveLeft() {
                let moved = false;
                for (let i = 0; i < 4; i++) {
                    let row = this.grid[i].filter(x => x !== 0);
                    for (let j = 0; j < row.length - 1; j++) {
                        if (row[j] === row[j + 1]) {
                            row[j] *= 2;
                            this.score += row[j];
                            row.splice(j + 1, 1);
                            moved = true;
                        }
                    }
                    const newRow = row.concat(Array(4 - row.length).fill(0));
                    if (JSON.stringify(this.grid[i]) !== JSON.stringify(newRow)) {
                        moved = true;
                    }
                    this.grid[i] = newRow;
                }
                return moved;
            }

            moveRight() {
                let moved = false;
                for (let i = 0; i < 4; i++) {
                    let row = this.grid[i].filter(x => x !== 0);
                    for (let j = row.length - 1; j > 0; j--) {
                        if (row[j] === row[j - 1]) {
                            row[j] *= 2;
                            this.score += row[j];
                            row.splice(j - 1, 1);
                            moved = true;
                        }
                    }
                    const newRow = Array(4 - row.length).fill(0).concat(row);
                    if (JSON.stringify(this.grid[i]) !== JSON.stringify(newRow)) {
                        moved = true;
                    }
                    this.grid[i] = newRow;
                }
                return moved;
            }

            moveUp() {
                let moved = false;
                for (let j = 0; j < 4; j++) {
                    let column = [];
                    for (let i = 0; i < 4; i++) {
                        if (this.grid[i][j] !== 0) {
                            column.push(this.grid[i][j]);
                        }
                    }
                    for (let i = 0; i < column.length - 1; i++) {
                        if (column[i] === column[i + 1]) {
                            column[i] *= 2;
                            this.score += column[i];
                            column.splice(i + 1, 1);
                            moved = true;
                        }
                    }
                    column = column.concat(Array(4 - column.length).fill(0));
                    for (let i = 0; i < 4; i++) {
                        if (this.grid[i][j] !== column[i]) {
                            moved = true;
                        }
                        this.grid[i][j] = column[i];
                    }
                }
                return moved;
            }

            moveDown() {
                let moved = false;
                for (let j = 0; j < 4; j++) {
                    let column = [];
                    for (let i = 0; i < 4; i++) {
                        if (this.grid[i][j] !== 0) {
                            column.push(this.grid[i][j]);
                        }
                    }
                    for (let i = column.length - 1; i > 0; i--) {
                        if (column[i] === column[i - 1]) {
                            column[i] *= 2;
                            this.score += column[i];
                            column.splice(i - 1, 1);
                            moved = true;
                        }
                    }
                    column = Array(4 - column.length).fill(0).concat(column);
                    for (let i = 0; i < 4; i++) {
                        if (this.grid[i][j] !== column[i]) {
                            moved = true;
                        }
                        this.grid[i][j] = column[i];
                    }
                }
                return moved;
            }

            checkGameOver() {
                // 检查是否有空格
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (this.grid[i][j] === 0) return false;
                    }
                }
                
                // 检查是否有相邻的相同数字
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        if (j < 3 && this.grid[i][j] === this.grid[i][j + 1]) return false;
                        if (i < 3 && this.grid[i][j] === this.grid[i + 1][j]) return false;
                    }
                }
                
                return true;
            }
        }

        function startNewGame() {
            game = new Game();
        }

        let game = new Game();
    </script>
</body>
</html>
