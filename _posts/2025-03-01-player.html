<script>
    // 获取所有视频项
    const videoItems = document.querySelectorAll('.video-item');
    let currentVideoIndex = 0; // 当前播放的视频索引
    let videoSources = []; // 存储所有视频源和标题
    let touchStartY = 0; // 触摸开始位置
    let touchEndY = 0; // 触摸结束位置
    const SWIPE_THRESHOLD = 50; // 滑动阈值，超过这个值才触发切换
    
    // 切换视频列表显示/隐藏
    function toggleVideoList() {
        const videoList = document.querySelector('.video-list');
        videoList.classList.toggle('show');
        
        // 如果显示了列表，自动聚焦到搜索框
        if (videoList.classList.contains('show')) {
            document.querySelector('.search-input').focus();
        }
    }
    
    // 初始化视频源数组
    function initVideoSources() {
        videoSources = [];
        videoItems.forEach(item => {
            // 从onclick属性中提取视频源和标题
            const onclickAttr = item.getAttribute('onclick');
            if (onclickAttr) {
                const match = onclickAttr.match(/changeVideo\('([^']+)',\s*'([^']+)'\)/i);
                if (match && match.length === 3) {
                    videoSources.push({
                        src: match[1],
                        title: match[2],
                        element: item
                    });
                }
            }
        });
        
        // 找到当前播放的视频索引
        const currentSrc = document.getElementById('mainVideo').querySelector('source').src;
        currentVideoIndex = videoSources.findIndex(item => item.src === currentSrc);
        if (currentVideoIndex === -1) currentVideoIndex = 0;
    }
    
    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
        initVideoSources();
        setupSwipeEvents();
    });
    
    // 设置滑动事件
    function setupSwipeEvents() {
        const videoWrapper = document.querySelector('.video-wrapper');
        
        // 触摸开始事件
        videoWrapper.addEventListener('touchstart', function(e) {
            touchStartY = e.touches[0].clientY;
            e.preventDefault(); // 阻止默认滚动行为
        }, false);
        
        // 触摸移动事件，阻止页面滚动
        videoWrapper.addEventListener('touchmove', function(e) {
            e.preventDefault(); // 阻止默认滚动行为
        }, false);
        
        // 触摸结束事件
        videoWrapper.addEventListener('touchend', function(e) {
            touchEndY = e.changedTouches[0].clientY;
            e.preventDefault(); // 阻止默认滚动行为
            handleSwipe();
        }, false);
        
        // 鼠标事件（用于桌面端）
        let isMouseDown = false;
        
        videoWrapper.addEventListener('mousedown', function(e) {
            isMouseDown = true;
            touchStartY = e.clientY;
            e.preventDefault(); // 防止拖动视频和页面滚动
        }, false);
        
        videoWrapper.addEventListener('mousemove', function(e) {
            if (isMouseDown) {
                e.preventDefault(); // 阻止默认滚动行为
            }
        }, false);
        
        videoWrapper.addEventListener('mouseup', function(e) {
            if (isMouseDown) {
                touchEndY = e.clientY;
                handleSwipe();
                isMouseDown = false;
                e.preventDefault(); // 阻止默认滚动行为
            }
        }, false);
        
        videoWrapper.addEventListener('mouseleave', function(e) {
            if (isMouseDown) {
                touchEndY = e.clientY;
                handleSwipe();
                isMouseDown = false;
                e.preventDefault(); // 阻止默认滚动行为
            }
        }, false);
    }
    
    // 处理滑动
    function handleSwipe() {
        const swipeDistance = touchEndY - touchStartY;
        
        // 检查滑动距离是否超过阈值
        if (Math.abs(swipeDistance) > SWIPE_THRESHOLD) {
            if (swipeDistance > 0) {
                // 向下滑动，播放上一个视频
                playPreviousVideo();
            } else {
                // 向上滑动，播放下一个视频
                playNextVideo();
            }
        }
    }
    
    // 播放下一个视频
    function playNextVideo() {
        if (videoSources.length === 0) return;
        
        currentVideoIndex = (currentVideoIndex + 1) % videoSources.length;
        const nextVideo = videoSources[currentVideoIndex];
        changeVideo(nextVideo.src, nextVideo.title);
        
        // 移除视觉反馈
        // addVisualFeedback('up');
    }
    
    // 播放上一个视频
    function playPreviousVideo() {
        if (videoSources.length === 0) return;
        
        currentVideoIndex = (currentVideoIndex - 1 + videoSources.length) % videoSources.length;
        const prevVideo = videoSources[currentVideoIndex];
        changeVideo(prevVideo.src, prevVideo.title);
        
        // 移除视觉反馈
        // addVisualFeedback('down');
    }
    
    // 添加视觉反馈 - 保留函数但不调用它
    function addVisualFeedback(direction) {
        // 注释掉视觉反馈代码
        // const videoWrapper = document.querySelector('.video-wrapper');
        // videoWrapper.classList.add('swiping-' + direction);
        
        // 移除类名以结束动画
        // setTimeout(() => {
        //     videoWrapper.classList.remove('swiping-up', 'swiping-down');
        // }, 300);
    }
    
    function changeVideo(videoSrc, videoTitle) {
        const mainVideo = document.getElementById('mainVideo');
        const videoTitleElement = document.querySelector('.video-title');
        const videoList = document.querySelector('.video-list');
        
        // 修改视频切换逻辑
        mainVideo.querySelector('source').src = videoSrc;
        videoTitleElement.textContent = videoTitle;
        mainVideo.load();
        mainVideo.play().catch(function(error) {
            console.log("视频播放失败:", error);
        });
        
        // 隐藏视频列表，回到主页面
        videoList.classList.remove('show');
        
        // 更新当前索引
        currentVideoIndex = videoSources.findIndex(item => item.src === videoSrc);
        if (currentVideoIndex === -1) currentVideoIndex = 0;
        
        // 滚动到页面顶部，让用户看到视频
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 添加搜索功能
    function searchVideos(keyword) {
        const videoItems = document.querySelectorAll('.video-item');
        keyword = keyword.toLowerCase();
        
        videoItems.forEach(item => {
            const title = item.querySelector('.video-item-title').textContent.toLowerCase();
            if (title.includes(keyword)) {
                item.classList.remove('hidden');
            } else {
                item.classList.add('hidden');
            }
        });
        
        // 重新初始化视频源数组，因为可见的视频项可能已经改变
        initVideoSources();
    }
</script>
