<script>

    const videos = [

        {

        {

        },
        {

            title: "地铁随拍",
            likes: 321,
            comments: 18
        }
    ];

    let currentVideoIndex = 0;
    const videoContainer = document.getElementById('videoContainer');
    const searchButton = document.getElementById('searchButton');
    const homeButton = document.getElementById('homeButton');
    const searchOverlay = document.getElementById('searchOverlay');
    const closeSearch = document.getElementById('closeSearch');
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    
    // 初始化视频播放器
    function initializePlayer() {
        // 清空容器
        videoContainer.innerHTML = '';
        
        // 创建前一个、当前和下一个视频的slide
        const prevIndex = (currentVideoIndex - 1 + videos.length) % videos.length;
        const nextIndex = (currentVideoIndex + 1) % videos.length;
        
        createVideoSlide(prevIndex, 'prev');
        createVideoSlide(currentVideoIndex, 'active');
        createVideoSlide(nextIndex, 'next');
        
        // 添加滑动事件监听
        setupSwipeListeners();
    }
    
    // 创建视频slide
    function createVideoSlide(index, position) {
        const video = videos[index];
        const slide = document.createElement('div');
        slide.className = `video-slide ${position}`;
        slide.dataset.index = index;
        
        slide.innerHTML = `
            <div class="video-wrapper">
                <video playsinline webkit-playsinline ${position === 'active' ? 'autoplay' : ''} loop muted>
                    <source src="${video.src}" type="video/mp4">
                    您的浏览器不支持 HTML5 视频播放。
                </video>
                <div class="progress-bar"></div>
            </div>
            <div class="video-info">
                <div class="video-title">${video.title}</div>
            </div>
            <div class="video-actions">
                <div class="action-button like-button">❤️</div>
                <div class="action-count">${video.likes}</div>
                <div class="action-button comment-button">💬</div>
                <div class="action-count">${video.comments}</div>
                <div class="action-button share-button">↗️</div>
            </div>
        `;
        
        videoContainer.appendChild(slide);
        
        // 如果是当前活动视频，设置进度条更新
        if (position === 'active') {
            const videoElement = slide.querySelector('video');
            const progressBar = slide.querySelector('.progress-bar');
            
            videoElement.muted = false; // 取消静音当前视频
            
            videoElement.addEventListener('timeupdate', () => {
                const progress = (videoElement.currentTime / videoElement.duration) * 100;
                progressBar.style.width = `${progress}%`;
            });
            
            videoElement.addEventListener('ended', () => {
                // 视频结束时自动播放下一个
                navigateToNextVideo();
            });
            
            // 自动播放当前视频
            videoElement.play().catch(error => {
                console.log("视频自动播放失败:", error);
                // 添加点击播放功能作为备选
                slide.addEventListener('click', () => {
                    videoElement.play();
                });
            });
        }
        
        // 添加点击事件到操作按钮
        const likeButton = slide.querySelector('.like-button');
        const commentButton = slide.querySelector('.comment-button');
        const shareButton = slide.querySelector('.share-button');
        
        likeButton.addEventListener('click', (e) => {
            e.stopPropagation();
            const countElement = likeButton.nextElementSibling;
            let count = parseInt(countElement.textContent);
            countElement.textContent = count + 1;
            likeButton.style.color = '#ff4d4d';
        });
        
        commentButton.addEventListener('click', (e) => {
            e.stopPropagation();
            alert('评论功能即将上线！');
        });
        
        shareButton.addEventListener('click', (e) => {
            e.stopPropagation();
            alert('分享功能即将上线！');
        });
    }
    
    // 设置滑动事件监听
    function setupSwipeListeners() {
        let startY = 0;
        let endY = 0;
        
        videoContainer.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
        });
        
        videoContainer.addEventListener('touchend', (e) => {
            endY = e.changedTouches[0].clientY;
            handleSwipe();
        });
        
        // 鼠标滑动支持
        videoContainer.addEventListener('mousedown', (e) => {
            startY = e.clientY;
        });
        
        videoContainer.addEventListener('mouseup', (e) => {
            endY = e.clientY;
            handleSwipe();
        });
        
        function handleSwipe() {
            const diffY = endY - startY;
            
            if (Math.abs(diffY) > 50) { // 滑动距离阈值
                if (diffY > 0) {
                    // 向下滑动，显示上一个视频
                    navigateToPrevVideo();
                } else {
                    // 向上滑动，显示下一个视频
                    navigateToNextVideo();
                }
            }
        }
    }
    
    // 导航到上一个视频
    function navigateToPrevVideo() {
        currentVideoIndex = (currentVideoIndex - 1 + videos.length) % videos.length;
        initializePlayer();
    }
    
    // 导航到下一个视频
    function navigateToNextVideo() {
        currentVideoIndex = (currentVideoIndex + 1) % videos.length;
        initializePlayer();
    }
    
    // 搜索功能
    function setupSearchFunctionality() {
        searchButton.addEventListener('click', () => {
            searchOverlay.style.display = 'flex';
            searchInput.focus();
            populateSearchResults(videos);
        });
        
        closeSearch.addEventListener('click', () => {
            searchOverlay.style.display = 'none';
        });
        
        searchInput.addEventListener('input', () => {
            const keyword = searchInput.value.toLowerCase();
            const filteredVideos = videos.filter(video => 
                video.title.toLowerCase().includes(keyword)
            );
            populateSearchResults(filteredVideos);
        });
        
        homeButton.addEventListener('click', () => {
            currentVideoIndex = 0;
            initializePlayer();
        });
    }
    
    // 填充搜索结果
    function populateSearchResults(results) {
        searchResults.innerHTML = '';
        
        results.forEach((video, index) => {
            const resultItem = document.createElement('div');
            resultItem.className = 'search-result-item';
            resultItem.innerHTML = `
                <div class="search-result-title">${video.title}</div>
            `;
            
            resultItem.addEventListener('click', () => {
                currentVideoIndex = videos.findIndex(v => v.src === video.src);
                initializePlayer();
                searchOverlay.style.display = 'none';
            });
            
            searchResults.appendChild(resultItem);
        });
    }
    
    // 初始化应用
    function initApp() {
        initializePlayer();
        setupSearchFunctionality();
    }
    
    // 页面加载完成后初始化应用
    document.addEventListener('DOMContentLoaded', initApp);
</script>
