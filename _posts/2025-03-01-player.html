    // 预加载配置
    const preloadConfig = {
        enabled: true,       // 是否启用预加载

    // 检测网络状况
    function checkNetworkStatus() {
        return new Promise((resolve) => {
            // 使用Navigator.connection API检测网络状况（如果可用）
            if (navigator.connection) {
                const connection = navigator.connection;
                const type = connection.effectiveType;
                
                // 根据网络类型返回状态
                if (type === '4g') {
                    resolve('good');
                } else if (type === '3g') {
                    resolve('medium');
                } else {
                    resolve('poor');
                }
            } else {
                // 如果API不可用，使用简单的速度测试
                const startTime = Date.now();
                const testImage = new Image();
                testImage.onload = function() {
                    const endTime = Date.now();
                    const duration = endTime - startTime;
                    
                    if (duration < 200) {
                        resolve('good');
                    } else if (duration < 600) {
                        resolve('medium');
                    } else {
                        resolve('poor');
                    }
                };
                testImage.onerror = function() {
                    resolve('poor');
                };
                // 使用小图片进行测试
                testImage.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
            }
        });
    }
    
    // 根据网络状况获取适合的视频源
    async function getAdaptiveVideoSource(videoSrc) {
        const networkStatus = await checkNetworkStatus();
        
        // 如果网络状况不佳，尝试使用更低质量的视频
        if (networkStatus === 'poor') {
            // 尝试使用七牛云或其他国内CDN的低质量版本
            // 这里使用URL参数模拟不同质量版本
            return videoSrc + '?quality=low';
        } else if (networkStatus === 'medium') {
            return videoSrc + '?quality=medium';
        } else {
            return videoSrc;
        }
    }
    
    // 初始化视频播放器
    async function initializePlayer() {
        // 清空容器
        videoContainer.innerHTML = '';
        
        // 创建前一个、当前和下一个视频的slide
        const prevIndex = (currentVideoIndex - 1 + videos.length) % videos.length;
        const nextIndex = (currentVideoIndex + 1) % videos.length;
        
        createVideoSlide(prevIndex, 'prev');
        createVideoSlide(currentVideoIndex, 'active');
        createVideoSlide(nextIndex, 'next');
        
        // 添加滑动事件监听
        setupSwipeListeners();
    }
    
    // 预加载视频资源
    function preloadVideos(currentIndex) {
        if (!preloadConfig.enabled) return;
        
        const preloadCount = preloadConfig.preloadCount;
        const videosToPreload = [];
        
        // 计算需要预加载的视频索引
        for (let i = 1; i <= preloadCount; i++) {
            // 预加载后面的视频
            const nextIndex = (currentIndex + i) % videos.length;
            videosToPreload.push(nextIndex);
            
            // 预加载前面的视频
            const prevIndex = (currentIndex - i + videos.length) % videos.length;
            videosToPreload.push(prevIndex);
        }
        
        // 执行预加载
        videosToPreload.forEach(index => {
            const videoSrc = videos[index].src;
            const preloadLink = document.createElement('link');
            preloadLink.rel = 'preload';
            preloadLink.as = 'video';
            preloadLink.href = videoSrc;
            document.head.appendChild(preloadLink);
            
            // 创建一个隐藏的视频元素进行预缓冲
            const preloadVideo = document.createElement('video');
            preloadVideo.style.display = 'none';
            preloadVideo.src = videoSrc;
            preloadVideo.preload = 'auto';
            preloadVideo.load();
            
            // 5秒后移除预加载元素以节省内存
            setTimeout(() => {
                document.head.removeChild(preloadLink);
                preloadVideo.remove();
            }, 5000);
        });
    }
    
    // 备用CDN列表 - 当主CDN失败时尝试使用这些备用源
    const backupCDNs = [
        'https://fastly.jsdelivr.net/gh/Yan-ziJun/Data@main/', // Fastly CDN
        'https://gcore.jsdelivr.net/gh/Yan-ziJun/Data@main/',  // Gcore CDN
        'https://cdn.staticaly.com/gh/Yan-ziJun/Data/main/'    // Staticaly CDN
    ];
    
    // 创建视频slide
    function createVideoSlide(index, position) {
        const video = videos[index];
        const slide = document.createElement('div');
        slide.className = `video-slide ${position}`;
        slide.dataset.index = index;
        
        // 从视频URL中提取相对路径
        const videoPath = video.src.split('@main/')[1] || video.src.split('/main/')[1] || video.src;
        
        // 添加加载指示器
        slide.innerHTML = `
            <div class="video-wrapper">
                <div class="loading-indicator" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:white;z-index:5;display:flex;flex-direction:column;align-items:center;">
                    <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:white;animation:spin 1s linear infinite;"></div>
                    <div style="margin-top:10px;">加载中...</div>
                </div>
                <video playsinline webkit-playsinline autoplay loop muted>
                    <source src="${video.src}" type="video/mp4">
                    您的浏览器不支持 HTML5 视频播放。
                </video>
                <div class="progress-bar"></div>
            </div>
            <div class="video-info">
                <div class="video-title">${video.title}</div>
            </div>
            <div class="video-actions">
                <div class="action-button share-button">↗️</div>
                <div class="action-button fullscreen-button">⛶</div>
            </div>
        `;
        
        videoContainer.appendChild(slide);
        
        // 如果是当前活动视频，设置进度条更新并预加载其他视频
        if (position === 'active') {
            const videoElement = slide.querySelector('video');
            const sourceElement = videoElement.querySelector('source');
            const progressBar = slide.querySelector('.progress-bar');
            const loadingIndicator = slide.querySelector('.loading-indicator');
            const videoPath = video.src.split('@main/')[1] || video.src.split('/main/')[1] || video.src;
            
            videoElement.muted = false; // 取消静音当前视频
            
            // 视频可以播放时隐藏加载指示器
            videoElement.addEventListener('canplay', () => {
                loadingIndicator.style.display = 'none';
            });
            
            // 视频加载中显示加载指示器
            videoElement.addEventListener('waiting', () => {
                loadingIndicator.style.display = 'flex';
            });
            
            // 视频加载失败时尝试切换CDN
            let cdnIndex = 0;
            let retryCount = 0;
            const maxRetries = 3;
            
            videoElement.addEventListener('error', () => {
                if (retryCount < maxRetries) {
                    retryCount++;
                    loadingIndicator.style.display = 'flex';
                    loadingIndicator.querySelector('div:nth-child(2)').textContent = `加载失败，正在切换线路... (${retryCount}/${maxRetries})`;
                    
                    // 尝试使用下一个CDN
                    if (cdnIndex < backupCDNs.length) {
                        const newSrc = backupCDNs[cdnIndex] + videoPath;
                        console.log(`尝试使用备用CDN: ${newSrc}`);
                        sourceElement.src = newSrc;
                        videoElement.load();
                        cdnIndex++;
                    } else {
                        // 所有CDN都尝试过，降低视频质量
                        console.log('所有CDN都尝试过，降低视频质量');
                        sourceElement.src = video.src + '?quality=low';
                        videoElement.load();
                    }
                } else {
                    loadingIndicator.style.display = 'flex';
                    loadingIndicator.querySelector('div:nth-child(2)').textContent = '视频加载失败，请检查网络连接';
                }
            }, true);
            
            videoElement.addEventListener('timeupdate', () => {
                const progress = (videoElement.currentTime / videoElement.duration) * 100;
                progressBar.style.width = `${progress}%`;
            });
            
            videoElement.addEventListener('ended', () => {
                // 视频结束时自动播放下一个
                navigateToNextVideo();
            });
            
            // 添加点击播放/暂停功能
            let isPlaying = true;
            slide.querySelector('.video-wrapper').addEventListener('click', (e) => {
                e.stopPropagation();
                if (isPlaying) {
                    videoElement.pause();
                    isPlaying = false;
                } else {
                    videoElement.play();
                    isPlaying = true;
                }
            });
            
            // 自动播放当前视频
            videoElement.play().catch(error => {
                console.log("视频自动播放失败:", error);
                // 尝试再次播放
                setTimeout(() => {
                    videoElement.play().catch(e => {
                        console.log("再次尝试播放失败:", e);
                        isPlaying = false;
                    });
                }, 1000);
            });
            
            // 预加载其他视频
            preloadVideos(index);
        }
        
        // 添加点击事件到操作按钮
        const shareButton = slide.querySelector('.share-button');
        const fullscreenButton = slide.querySelector('.fullscreen-button');
        
        
        shareButton.addEventListener('click', (e) => {
            e.stopPropagation();
            alert('分享功能即将上线！');
        });
        
        fullscreenButton.addEventListener('click', (e) => {
            e.stopPropagation();
            const videoElement = slide.querySelector('video');
            
            if (document.fullscreenElement) {
                document.exitFullscreen();
            } else if (videoElement.requestFullscreen) {
                videoElement.requestFullscreen();
            } else if (videoElement.webkitRequestFullscreen) { // Safari
                videoElement.webkitRequestFullscreen();
            } else if (videoElement.msRequestFullscreen) { // IE11
                videoElement.msRequestFullscreen();
            }
        });
    }
    
    // 设置滑动事件监听
    function setupSwipeListeners() {
        let startY = 0;
        let endY = 0;
        let startTime = 0;
        let isSwiping = false;
        
        videoContainer.addEventListener('touchstart', (e) => {
            startY = e.touches[0].clientY;
            startTime = new Date().getTime();
            isSwiping = true;
        }, {passive: true});
        
        videoContainer.addEventListener('touchmove', (e) => {
            if (!isSwiping) return;
            
            const currentY = e.touches[0].clientY;
            const diffY = currentY - startY;
            
            // 如果滑动距离超过阈值，阻止其他事件
            if (Math.abs(diffY) > 30) {
                e.preventDefault();
            }
        }, {passive: false});
        
        videoContainer.addEventListener('touchend', (e) => {
            if (!isSwiping) return;
            
            endY = e.changedTouches[0].clientY;
            const endTime = new Date().getTime();
            const timeElapsed = endTime - startTime;
            
            handleSwipe(timeElapsed);
            isSwiping = false;
        }, {passive: true});
        
        // 鼠标滑动支持
        videoContainer.addEventListener('mousedown', (e) => {
            startY = e.clientY;
            startTime = new Date().getTime();
            isSwiping = true;
        });
        
        videoContainer.addEventListener('mousemove', (e) => {
            if (!isSwiping) return;
        });
        
        videoContainer.addEventListener('mouseup', (e) => {
            if (!isSwiping) return;
            
            endY = e.clientY;
            const endTime = new Date().getTime();
            const timeElapsed = endTime - startTime;
            
            handleSwipe(timeElapsed);
            isSwiping = false;
        });
        
        function handleSwipe(timeElapsed) {
            const diffY = endY - startY;
            const velocity = Math.abs(diffY) / timeElapsed;
            
            // 考虑滑动速度和距离
            if (Math.abs(diffY) > 50 || (Math.abs(diffY) > 20 && velocity > 0.5)) {
                if (diffY > 0) {
                    // 向下滑动，显示上一个视频
                    navigateToPrevVideo();
                } else {
                    // 向上滑动，显示下一个视频
                    navigateToNextVideo();
                }
            }
        }
    }
    
    // 导航到上一个视频
    function navigateToPrevVideo() {
        currentVideoIndex = (currentVideoIndex - 1 + videos.length) % videos.length;
        initializePlayer();
    }
    
    // 导航到下一个视频
    function navigateToNextVideo() {
        currentVideoIndex = (currentVideoIndex + 1) % videos.length;
        initializePlayer();
    }
    
    // 搜索功能
    function setupSearchFunctionality() {
        searchButton.addEventListener('click', () => {
            searchOverlay.style.display = 'flex';
            searchInput.focus();
            populateSearchResults(videos);
        });
        
        closeSearch.addEventListener('click', () => {
            searchOverlay.style.display = 'none';
        });
        
        searchInput.addEventListener('input', () => {
            const keyword = searchInput.value.toLowerCase();
            const filteredVideos = videos.filter(video => 
                video.title.toLowerCase().includes(keyword)
            );
            populateSearchResults(filteredVideos);
        });
    }
    
    // 填充搜索结果
    function populateSearchResults(results) {
        searchResults.innerHTML = '';
        
        results.forEach((video, index) => {
            const resultItem = document.createElement('div');
            resultItem.className = 'search-result-item';
            resultItem.innerHTML = `
                <div class="search-result-title">${video.title}</div>
            `;
            
            resultItem.addEventListener('click', () => {
                currentVideoIndex = videos.findIndex(v => v.src === video.src);
                initializePlayer();
                searchOverlay.style.display = 'none';
            });
            
            searchResults.appendChild(resultItem);
        });
    }
    
    // 初始化应用
    function initApp() {
        initializePlayer();
        setupSearchFunctionality();
    }
    
    // 页面加载完成后初始化应用
    document.addEventListener('DOMContentLoaded', initApp);
</script>
