<script>
    function changeVideo(videoSrc, videoTitle) {
        const mainVideo = document.getElementById('mainVideo');
        const videoTitleElement = document.querySelector('.video-title');
        
        // 修改视频切换逻辑
        mainVideo.querySelector('source').src = videoSrc;
        videoTitleElement.textContent = videoTitle;
        mainVideo.load();
        mainVideo.play().catch(function(error) {
            console.log("视频播放失败:", error);
        });
    }

    // 添加搜索功能
    function searchVideos(keyword) {
        const videoItems = document.querySelectorAll('.video-item');
        keyword = keyword.toLowerCase();
        
        videoItems.forEach(item => {
            const title = item.querySelector('.video-item-title').textContent.toLowerCase();
            if (title.includes(keyword)) {
                item.classList.remove('hidden');
            } else {
                item.classList.add('hidden');
            }
        });
    }
</script>
