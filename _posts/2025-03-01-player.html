<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        .video-container {
            width: 90%;
            max-width: 1000px;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 宽高比 */
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 8px;
        }

        .video-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: #333;
        }

        /* 添加视频列表样式 */
        .video-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .video-item {
            cursor: pointer;
            background: white;
            padding: 12px 15px;
            border-radius: 6px;
            transition: background-color 0.2s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .video-item:hover {
            background-color: #e9ecef;
        }

        .video-item-title {
            font-size: 1rem;
            color: #333;
        }

        @media (max-width: 768px) {
            .video-container {
                width: 95%;
                padding: 10px;
            }

            .video-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <h1 class="video-title">PUBG舞王</h1>
        <div class="video-wrapper">
            <video controls id="mainVideo">
                <source src="https://raw.githubusercontent.com/Yan-ziJun/Data/main/movie/PUBGwuwang.mp4" type="video/mp4">
                您的浏览器不支持 HTML5 视频播放。
            </video>
        </div>

        <!-- 添加视频列表 -->
        <div class="video-list">
            <div class="video-item" onclick="changeVideo('https://raw.githubusercontent.com/Yan-ziJun/Data/main/movie/PUBGwuwang.mp4', 'PUBG舞王')">
                <div class="video-item-title">PUBG舞王</div>
            </div>
            <div class="video-item" onclick="changeVideo('视频2的链接', '视频2标题')">
                <div class="video-item-title">视频2标题</div>
            </div>
            <div class="video-item" onclick="changeVideo('视频3的链接', '视频3标题')">
                <div class="video-item-title">视频3标题</div>
            </div>
        </div>
    </div>

    <!-- 添加 JavaScript 代码 -->
    <script>
        function changeVideo(videoSrc, videoTitle) {
            const mainVideo = document.getElementById('mainVideo');
            const videoTitleElement = document.querySelector('.video-title');
            
            mainVideo.src = videoSrc;
            videoTitleElement.textContent = videoTitle;
            mainVideo.load();
            mainVideo.play();
        }
    </script>
</body>
</html>
