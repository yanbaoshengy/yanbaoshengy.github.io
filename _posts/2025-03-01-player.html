<style>
    .video-container {
        width: 90%;
        max-width: 1000px;
        background: white;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        margin: 20px auto;
    }

    .video-wrapper {
        position: relative;
        width: 100%;
        padding-bottom: 56.25%;
        background: #000;
    }

    video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 8px;
        object-fit: contain;
    }

    .video-title {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        color: #333;
    }

    .video-list {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 8px;
        max-height: 300px;
        overflow-y: auto;
    }

    .video-item {
        cursor: pointer;
        background: white;
        padding: 12px 15px;
        border-radius: 6px;
        transition: background-color 0.2s;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    .video-item:hover {
        background-color: #e9ecef;
    }

    .video-item-title {
        font-size: 1rem;
        color: #333;

    @media (max-width: 768px) {
        .video-container {
            width: 95%;

        }
    }
</style>

<div class="video-container">
    <h1 class="video-title">PUBG舞王</h1>
    <div class="video-wrapper">
        <video controls playsinline webkit-playsinline id="mainVideo">
            <source src="https://github.com/Yan-ziJun/Data/raw/main/movie/PUBGwuwang.mp4" type="video/mp4">
            您的浏览器不支持 HTML5 视频播放。
        </video>
    </div>

    <div class="video-list">
        <div class="video-item" onclick="changeVideo('https://github.com/Yan-ziJun/Data/raw/main/movie/PUBGwuwang.mp4', 'PUBG舞王')">
            <div class="video-item-title">PUBG舞王</div>
        </div>
        <div class="video-item" onclick="changeVideo('https://github.com/Yan-ziJun/Data/raw/main/movie/yilushenghua.mp4', '华中师-一路生花')">
            <div class="video-item-title">华中师-一路生花</div>
        </div>
    </div>
</div>

<script>
    function changeVideo(videoSrc, videoTitle) {
        const mainVideo = document.getElementById('mainVideo');
        const videoTitleElement = document.querySelector('.video-title');
        
        // 修改视频切换逻辑
        mainVideo.querySelector('source').src = videoSrc;
        videoTitleElement.textContent = videoTitle;
        mainVideo.load();
        mainVideo.play().catch(function(error) {
            console.log("视频播放失败:", error);
        });
    }
</script>
