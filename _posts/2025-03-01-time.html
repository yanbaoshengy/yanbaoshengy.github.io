<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京时间校验</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: #2c3e50;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: clamp(1rem, 4vw, 2.5rem);
            border-radius: clamp(12px, 2vw, 20px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
            max-width: 650px;
            width: 85%;
            margin: clamp(0.5rem, 2vw, 1.5rem);
            margin-left: auto;
            margin-right: auto;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: all 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 45px 0 rgba(31, 38, 135, 0.47);
        }

        h1 {
            color: #ffffff;
            margin-bottom: 2.5rem;
            font-size: clamp(1.8rem, 3.5vw, 2.5rem);
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            animation: fadeInDown 1s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .time-box {
            background: rgba(255, 255, 255, 0.15);
            padding: clamp(1rem, 3vw, 2rem);
            border-radius: clamp(10px, 2vw, 15px);
            margin: clamp(1rem, 2vw, 1.5rem) 0;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .time-box:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: rgba(255, 255, 255, 0.2);
        }

        .time {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: bold;
            color: #ffffff;
            white-space: nowrap;
            letter-spacing: 2px;
            margin: 1rem 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            animation: pulse 1s infinite ease-in-out alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.02); }
        }

        .date {
            font-size: clamp(1.2rem, 2.5vw, 1.5rem);
            color: #ffffff;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
            animation: fadeIn 1s ease;
        }

        .timezone {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
            opacity: 0.9;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        h2 {
            color: #ffffff;
            font-size: clamp(1.2rem, 2.5vw, 1.6rem);
            margin-bottom: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .difference {
            color: #e74c3c;
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 5px;
            font-weight: bold;
        }
        @media screen and (max-width: 480px) {
            body {
                padding: 0.5rem;
            }
            .container {
                width: 90%;
                margin: 0.5rem auto;
            }
            .time-box {
                padding: 1rem;
            }
            .timezone {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>北京时间校验</h1>
        
        <div class="date" id="date"></div>
        
        <div class="time-box">
            <h2>北京标准时间</h2>
            <div class="time" id="beijingTime"></div>
            <div class="timezone">UTC/GMT+8小时 (东八区)</div>
        </div>


    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const beijingOffset = 8 * 60; // 北京时区偏移（分钟）
            
            // 计算北京时间
            const beijingTime = new Date(now.getTime());
            
            // 格式化时间显示
            const formatTime = (date) => {
                return date.toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    fractionalSecondDigits: 3,
                    hour12: false
                });
            };

            // 更新显示
            document.getElementById('beijingTime').textContent = formatTime(beijingTime);
            // 更新日期
            document.getElementById('date').textContent = beijingTime.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });


        }

        // 初始更新
        updateTime();

        // 每0.15秒更新一次
        setInterval(updateTime, 150);
    </script>
</body>
</html>
